name: Refresh M&A dashboard data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python -m ma_dashboard.refresh
      - name: Commit refreshed data
        run: |
          git config user.name "ma-dashboard-bot"
          git config user.email "ma-dashboard-bot@users.noreply.github.com"
          git add docs/ma_dashboard/data/candidates.json docs/ma_dashboard/data/last_updated.json
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "Refresh M&A dashboard data [skip ci]"
            git push
          fi
