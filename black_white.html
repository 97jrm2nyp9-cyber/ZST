<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black &amp; White</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Georgia', serif; touch-action: none; }
canvas { display: block; }
@media (pointer: fine) { canvas { cursor: none; } }

#ui {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 10;
}

/* Touch miracle buttons */
#miracle-grid {
  position: absolute; bottom: 90px; right: 12px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  pointer-events: auto;
}
.mbtn {
  width: 64px; height: 64px; border-radius: 12px;
  border: 1.5px solid rgba(255,255,255,0.3);
  background: rgba(0,0,0,0.55); color: #fff;
  font-size: 11px; letter-spacing: 0.5px; text-transform: uppercase;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; cursor: pointer; user-select: none; -webkit-user-select: none;
  transition: background 0.1s, transform 0.1s;
}
.mbtn:active { background: rgba(255,255,255,0.2); transform: scale(0.93); }
.mbtn span { font-size: 22px; }

/* Creature buttons */
#creature-btns {
  position: absolute; bottom: 90px; left: 12px;
  display: flex; flex-direction: column; gap: 8px;
  pointer-events: auto;
}
.cbtn {
  width: 64px; height: 64px; border-radius: 12px;
  border: 1.5px solid rgba(255,255,255,0.3);
  background: rgba(0,0,0,0.55); color: #fff;
  font-size: 10px; letter-spacing: 0.5px; text-transform: uppercase;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; cursor: pointer; user-select: none; -webkit-user-select: none;
  transition: background 0.1s, transform 0.1s;
}
.cbtn:active { transform: scale(0.93); }
#btn-reward { border-color: rgba(255,220,0,0.5); }
#btn-reward:active { background: rgba(255,200,0,0.3); }
#btn-punish { border-color: rgba(255,60,60,0.5); }
#btn-punish:active { background: rgba(255,60,60,0.3); }

/* Draw spell button */
#draw-btn {
  position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
  width: 100px; height: 44px; border-radius: 22px;
  border: 1.5px solid rgba(255,255,200,0.4);
  background: rgba(0,0,0,0.55); color: rgba(255,255,200,0.85);
  font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; user-select: none; -webkit-user-select: none;
  pointer-events: auto; transition: background 0.1s;
}
#draw-btn.active { background: rgba(255,255,150,0.25); border-color: rgba(255,255,150,0.8); }

/* Alignment bar */
#align-bar {
  position: absolute; bottom: 148px; left: 50%; transform: translateX(-50%);
  width: 220px; text-align: center;
}
#align-label {
  color: rgba(255,255,255,0.7); font-size: 11px; letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 6px; text-shadow: 0 0 8px #000;
}
#align-track {
  width: 100%; height: 10px; border-radius: 5px;
  background: linear-gradient(to right, #8B0000, #555, #FFD700);
  position: relative; border: 1px solid rgba(255,255,255,0.2);
}
#align-thumb {
  position: absolute; top: -4px; width: 18px; height: 18px;
  border-radius: 50%; background: #fff;
  border: 2px solid rgba(0,0,0,0.5);
  transform: translateX(-50%);
  transition: left 0.3s ease;
  box-shadow: 0 0 8px rgba(255,255,255,0.8);
  left: 50%;
}

/* Faith meter */
#faith-bar {
  position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
  width: 16px; height: 180px;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
#faith-label {
  color: rgba(255,255,255,0.6); font-size: 10px; letter-spacing: 1px;
  writing-mode: vertical-rl; text-transform: uppercase; margin-bottom: 4px;
  text-shadow: 0 0 6px #000;
}
#faith-track {
  flex: 1; width: 8px; border-radius: 4px;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  position: relative; overflow: hidden;
}
#faith-fill {
  position: absolute; bottom: 0; width: 100%;
  background: linear-gradient(to top, #4488ff, #aaccff);
  border-radius: 4px; transition: height 0.5s ease;
  height: 10%;
}

/* Creature panel */
#creature-panel {
  position: absolute; left: 16px; top: 16px;
  background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px; padding: 10px 14px; min-width: 140px;
}
#creature-panel h3 {
  color: rgba(255,255,255,0.8); font-size: 11px; letter-spacing: 1px;
  text-transform: uppercase; margin-bottom: 8px;
}
.trait-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
.trait-name { color: rgba(255,255,255,0.5); font-size: 10px; width: 70px; }
.trait-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
.trait-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
#bar-friendly .trait-fill { background: #44cc88; width: 50%; }
#bar-aggress  .trait-fill { background: #cc4444; width: 30%; }
#bar-curious  .trait-fill { background: #cc88ff; width: 40%; }

/* Controls hint */
#controls {
  position: absolute; bottom: 60px; right: 16px;
  background: rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px; padding: 8px 12px;
  color: rgba(255,255,255,0.5); font-size: 10px; line-height: 1.7;
}

/* Tutorial overlay */
#tutorial {
  position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
  text-align: center; color: rgba(255,255,255,0.85);
  text-shadow: 0 2px 12px rgba(0,0,0,0.9);
  pointer-events: none;
  transition: opacity 2s ease;
}
#tutorial h1 {
  font-size: 42px; letter-spacing: 6px; text-transform: uppercase;
  margin-bottom: 12px; font-weight: 300;
}
#tutorial p { font-size: 14px; letter-spacing: 1px; opacity: 0.7; }

/* Miracle feedback */
#miracle-flash {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 18px; letter-spacing: 3px; text-transform: uppercase;
  color: #fff; text-shadow: 0 0 20px currentColor;
  opacity: 0; transition: opacity 0.15s;
  pointer-events: none;
}

/* Gesture canvas overlay */
#gesture-canvas {
  position: absolute; top: 0; left: 0; pointer-events: none;
}
/* Civilization panel */
#civ-panel {
  position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px; padding: 6px 18px; text-align: center;
  pointer-events: none;
}
#civ-era  { font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: #ffdd88; }
#civ-time { font-size: 10px; letter-spacing: 1px; color: rgba(255,255,255,0.55); margin-top: 2px; }
#weather-badge { position:absolute; top:50px; left:50%; transform:translateX(-50%); font-size:13px; color:rgba(255,255,255,0.7); pointer-events:none; text-shadow:0 1px 6px #000; letter-spacing:1px; transition:opacity 1s; }
.prayer-bubble { position:absolute; font-size:16px; pointer-events:none; transform:translate(-50%,-100%); white-space:nowrap; text-shadow:0 0 8px rgba(255,220,120,0.9); animation:prayFloat 0.4s ease-out; }
@keyframes prayFloat { from{opacity:0;transform:translate(-50%,-80%)} to{opacity:1;transform:translate(-50%,-100%)} }
#resource-panel { position:absolute; left:20px; bottom:180px; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.12); border-radius:6px; padding:6px 10px; pointer-events:none; }
.res-row { display:flex; align-items:center; gap:6px; color:rgba(255,255,255,0.7); font-size:11px; letter-spacing:1px; }
</style>
</head>

<script>

// ─── Noise ───────────────────────────────────────────────────────────────────
function noise2D(x, z) {
  let v = 0, amp = 1, freq = 1, max = 0;
  const offsets = [[1.7,0.5],[0.4,1.2],[2.1,0.8],[0.9,1.5]];
  const freqs   = [0.28, 0.57, 1.13, 2.27];
  for (let i = 0; i < 4; i++) {
    const f = freqs[i] * freq;
    v   += Math.sin(x * f + offsets[i][0]) * Math.cos(z * f * 1.01 + offsets[i][1]) * amp;
    max += amp;
    amp *= 0.5;
  }
  return v / max;
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * Math.max(0, Math.min(1, t)); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function rand(lo, hi) { return lo + Math.random() * (hi - lo); }
function v3(x, y, z) { return new THREE.Vector3(x, y, z); }

// ─── Procedural canvas textures ──────────────────────────────────────────────
const TEX = {};

function makeTex(w, h, fn) {
  const c = Object.assign(document.createElement('canvas'), { width: w, height: h });
  fn(c.getContext('2d'), w, h);
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  return t;
}

function initTextures() {
  // Stone wall — irregular blocks with mortar lines
  TEX.stone = makeTex(256, 256, (ctx, w, h) => {
    ctx.fillStyle = '#8a8070'; ctx.fillRect(0, 0, w, h);
    const bw = 48, bh = 26;
    for (let row = 0; row <= h/bh + 1; row++) {
      const off = (row & 1) ? bw*0.5 : 0;
      for (let col = -1; col <= w/bw + 1; col++) {
        const v = 108 + Math.random()*50 | 0;
        ctx.fillStyle = `rgb(${v},${v-7},${v-17})`;
        ctx.fillRect(col*bw + off + 1, row*bh + 1, bw - 2, bh - 2);
      }
    }
    ctx.strokeStyle = '#524838'; ctx.lineWidth = 1.5;
    for (let row = 0; row <= h/bh + 1; row++) {
      const off = (row & 1) ? bw*0.5 : 0;
      for (let col = -1; col <= w/bw + 1; col++)
        ctx.strokeRect(col*bw + off, row*bh, bw, bh);
    }
    for (let i = 0; i < 3000; i++) {
      ctx.fillStyle = `rgba(0,0,0,${Math.random()*0.06})`;
      ctx.fillRect(Math.random()*w|0, Math.random()*h|0, 2, 1);
    }
  });

  // Thatched roof — diagonal straw strands
  TEX.thatch = makeTex(256, 256, (ctx, w, h) => {
    ctx.fillStyle = '#b08820'; ctx.fillRect(0, 0, w, h);
    for (let y = -h; y < h*2; y += 5) {
      const v = 138 + Math.random()*45 | 0;
      ctx.strokeStyle = `rgb(${v},${v*0.73|0},${v*0.24|0})`;
      ctx.lineWidth = 1 + Math.random();
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y + w*0.58); ctx.stroke();
    }
    for (let i = 0; i < 1500; i++) {
      ctx.fillStyle = `rgba(0,0,0,${Math.random()*0.07})`;
      ctx.fillRect(Math.random()*w|0, Math.random()*h|0, 1, 3);
    }
  });

  // Tree bark — horizontal grain
  TEX.bark = makeTex(64, 256, (ctx, w, h) => {
    ctx.fillStyle = '#4a2e12'; ctx.fillRect(0, 0, w, h);
    for (let y = 0; y < h; y += 5) {
      ctx.strokeStyle = `rgba(0,0,0,${0.18 + Math.random()*0.3})`;
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(0, y + Math.random()*3);
      for (let x = 0; x <= w; x += 8)
        ctx.lineTo(x, y + Math.random()*5);
      ctx.stroke();
    }
    for (let i = 0; i < 800; i++) {
      ctx.fillStyle = `rgba(220,160,60,${Math.random()*0.04})`;
      ctx.fillRect(Math.random()*w|0, Math.random()*h|0, 1, 1);
    }
  });

  // Creature fur — short directional strokes
  TEX.fur = makeTex(128, 128, (ctx, w, h) => {
    ctx.fillStyle = '#c8a050'; ctx.fillRect(0, 0, w, h);
    for (let i = 0; i < 800; i++) {
      const x = Math.random()*w, y = Math.random()*h;
      const v = 150 + Math.random()*70 | 0;
      ctx.strokeStyle = `rgba(${v},${v*0.68|0},${v*0.28|0},0.55)`;
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + rand(-2,2), y + rand(2,5)); ctx.stroke();
    }
  });
}

function initBlockMats() {
  window.BLK = {
    stone:    new THREE.MeshStandardMaterial({ color:0x8a8070, roughness:0.88, metalness:0.02 }),
    cobble:   new THREE.MeshStandardMaterial({ color:0x707060, roughness:0.95, metalness:0.0  }),
    wood:     new THREE.MeshStandardMaterial({ color:0x7a5020, roughness:0.88, metalness:0.0, map: TEX.bark }),
    plank:    new THREE.MeshStandardMaterial({ color:0xc8922a, roughness:0.82, metalness:0.0  }),
    brick:    new THREE.MeshStandardMaterial({ color:0xb05030, roughness:0.84, metalness:0.0  }),
    marble:   new THREE.MeshStandardMaterial({ color:0xe8e0d0, roughness:0.45, metalness:0.04 }),
    sandstone:new THREE.MeshStandardMaterial({ color:0xd4bc78, roughness:0.78, metalness:0.0  }),
    obsidian: new THREE.MeshStandardMaterial({ color:0x1a0828, roughness:0.30, metalness:0.35,
                emissive:new THREE.Color(0x110022), emissiveIntensity:0.5 }),
    gold:     new THREE.MeshStandardMaterial({ color:0xffd700, roughness:0.20, metalness:0.80,
                emissive:new THREE.Color(0xaa8800), emissiveIntensity:0.3 }),
    crystal:  new THREE.MeshStandardMaterial({ color:0x88ccff, roughness:0.05, metalness:0.6,
                transparent:true, opacity:0.80, emissive:new THREE.Color(0x2244aa), emissiveIntensity:0.6 }),
    thatch:   new THREE.MeshStandardMaterial({ color:0xc8a030, roughness:0.95, metalness:0.0, map: TEX.thatch }),
    darkstone:new THREE.MeshStandardMaterial({ color:0x3a3040, roughness:0.80, metalness:0.08 }),
  };
  // Set repeat on mapped textures
  if (window.BLK.wood.map) window.BLK.wood.map.repeat.set(0.5,0.5);
  if (window.BLK.thatch.map) window.BLK.thatch.map.repeat.set(0.5,0.5);
}

// ─── Constants ───────────────────────────────────────────────────────────────
const ISLAND_RADIUS  = 90;
const TERRAIN_SEGS   = 128;
const TERRAIN_SIZE   = 200;
const SEA_LEVEL      = 0;
const INFLUENCE_BASE = 45;
const INFLUENCE_MAX  = 120;
const VILLAGE_POS    = new THREE.Vector3(18, 0, 10);

// ─── Globals ─────────────────────────────────────────────────────────────────
let renderer, scene, camera, composer;
let camDist  = 150;
let camTheta = 0.0;    // azimuth (radians around Y)
let camPhi   = 0.52;   // elevation above horizon (radians)
let camTarget;         // initialized in initScene after THREE is ready
let _orbitActive = false, _panActive = false;
let _camLastX = 0, _camLastY = 0;
let clock = new THREE.Clock();
let terrainMesh, waterMesh;
let godHand, handGroup;
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();
let worldMouse = new THREE.Vector3();
let prevWorldMouse = new THREE.Vector3();
let grabbedObject = null;
let grabOffset = new THREE.Vector3();

let alignment = 0;       // -1 evil … +1 good
let faithPoints = 0;
let influenceRadius = INFLUENCE_BASE;
let influenceRing;

let villagers = [];
let foodPiles = [];
let projectiles = [];
let particles = [];
let ambientSprites = [];
let creatures = [];
let audioCtx;

// ─── Environment state ────────────────────────────────────────────────────────
let trees          = [];   // all live tree groups
let stumps         = [];   // charred stumps awaiting regrowth
let burningObjects = [];   // currently burning trees
let scorchDecals   = [];   // ground scorch marks
let villageLogCount = 0;   // logs deposited by creatures

// ─── Resource counters ───────────────────────────────────────────────────────
let resStone = 0;
let resWood  = 0;

// ─── Block build queue ────────────────────────────────────────────────────────
let _blockQueue = []; // [{x,y,z,mat,sx,sy,sz}]
let _blockTimer  = 0;
const BLOCK_INTERVAL = 0.10; // seconds between block placements

function queueBlock(x, y, z, mat, sx=1, sy=1, sz=1) {
  _blockQueue.push({ x, y, z, mat, sx, sy, sz });
}

function updateBlockQueue(dt) {
  if (_blockQueue.length === 0) return;
  _blockTimer -= dt;
  if (_blockTimer > 0) return;
  _blockTimer = BLOCK_INTERVAL;

  const b = _blockQueue.shift();
  const geo = new THREE.BoxGeometry(b.sx, b.sy, b.sz);
  const mesh = new THREE.Mesh(geo, b.mat);
  mesh.position.set(b.x, b.y, b.z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  // Pop-in scale animation
  mesh.scale.setScalar(0.01);
  scene.add(mesh);
  const grow = () => {
    mesh.scale.multiplyScalar(1.15);
    if (mesh.scale.x < 1.0) requestAnimationFrame(grow);
    else mesh.scale.setScalar(1.0);
  };
  requestAnimationFrame(grow);
  // Small placement sound + dust
  playTone(rand(180,320), 'triangle', 0.06, 0.08);
  spawnBurst(new THREE.Vector3(b.x, b.y+b.sy*0.5, b.z), 0xccbbaa, 4, 2.5, 0.08, 0.35);
}

function updateResourceUI() {
  const s = document.getElementById('res-stone');
  const w = document.getElementById('res-wood');
  if (s) s.textContent = resStone;
  if (w) w.textContent = resWood;
}

// ─── Civilization & time ──────────────────────────────────────────────────────
let gameTime         = 0;    // total seconds elapsed
let civilizationEra  = 0;    // 0-5
let eraBuildings     = [];   // {type,x,z} already placed
let nextBuildTimer   = rand(20, 40);
let sunAngle         = -Math.PI * 0.5;  // start at noon (-PI/2 = top)
let _daylight        = 1.0;  // 0=night, 1=noon

const ERAS = [
  { id:0, name:'Primitive',   minTime:0,    minLove:0.00, minLevel:0 },
  { id:1, name:'Tribal',      minTime:60,   minLove:0.25, minLevel:1 },
  { id:2, name:'Agrarian',    minTime:180,  minLove:0.45, minLevel:2 },
  { id:3, name:'Ancient',     minTime:360,  minLove:0.60, minLevel:3 },
  { id:4, name:'Classical',   minTime:600,  minLove:0.75, minLevel:4 },
  { id:5, name:'Enlightened', minTime:1200, minLove:0.85, minLevel:5 },
];

// Gesture
let gestureActive = false;
let gesturePath = [];

// ─── SharedMind — collective intelligence ─────────────────────────────────────
const SharedMind = {
  foodLocations:   [],   // known food pile positions
  threatLocations: [],   // {pos, time} of recent danger
  recentCasts:     [],   // {type, time} of recent creature miracle casts

  notifyFood(pos) {
    if (!this.foodLocations.some(p => p.distanceTo(pos) < 6))
      this.foodLocations.push(pos.clone());
    if (this.foodLocations.length > 6) this.foodLocations.shift();
  },

  notifyThreat(pos) {
    this.threatLocations.push({ pos: pos.clone(), time: performance.now() / 1000 });
    if (this.threatLocations.length > 3) this.threatLocations.shift();
    // Broadcast alert to all creatures
    creatures.forEach(c => { c._alertTimer = 5; c._alertPos = pos.clone(); });
  },

  notifyCast(type) {
    this.recentCasts.push({ type, time: performance.now() / 1000 });
    if (this.recentCasts.length > 8) this.recentCasts.shift();
  },

  wasRecentlyCast(type, withinSeconds = 18) {
    const now = performance.now() / 1000;
    return this.recentCasts.some(c => c.type === type && now - c.time < withinSeconds);
  },

  assignRoles() {
    if (creatures.length === 0) return;
    const roleFor = c => {
      if (c.intelligenceLevel >= 5) return 'coordinator';
      if (c.traits.aggression > 0.55) return 'guardian';
      if (c.traits.curiosity  > 0.60) return 'scout';
      return 'provider';
    };
    const roles = creatures.map(roleFor);
    // Guarantee pack coverage when large enough
    if (creatures.length >= 2 && !roles.includes('provider')) roles[1] = 'provider';
    if (creatures.length >= 3 && !roles.includes('guardian')) roles[2] = 'guardian';
    creatures.forEach((c, i) => { c._role = roles[i]; });
  },

  update() {
    const now = performance.now() / 1000;
    this.threatLocations = this.threatLocations.filter(t => now - t.time < 25);
    this.foodLocations   = this.foodLocations.filter(pos =>
      foodPiles.some(f => f.parent && f.position.distanceTo(pos) < 6)
    );
  }
};

// ─── Audio ───────────────────────────────────────────────────────────────────
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playTone(freq, type = 'sine', duration = 0.15, gain = 0.18) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const g   = audioCtx.createGain();
  osc.connect(g); g.connect(audioCtx.destination);
  osc.type = type; osc.frequency.value = freq;
  g.gain.setValueAtTime(gain, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.start(); osc.stop(audioCtx.currentTime + duration);
}
function playGrab()    { playTone(440, 'sine', 0.08, 0.12); }
function playThrow()   { playTone(300, 'triangle', 0.12, 0.15); }
function playHeal()    { playTone(660, 'sine', 0.4, 0.2); setTimeout(()=>playTone(880,'sine',0.3,0.15), 120); }
function playFireball(){ playTone(110, 'sawtooth', 0.3, 0.25); }
function playFood()    { playTone(528, 'sine', 0.25, 0.18); }
function playWood()    { playTone(220, 'triangle', 0.2, 0.2); }
function playReward()  { [528,660,784].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.2,0.15),i*80)); }
function playPunish()  { playTone(120, 'sawtooth', 0.25, 0.3); }

// ─── Terrain heightmap ───────────────────────────────────────────────────────
let terrainHeightData = [];
function buildTerrain() {
  const geo = new THREE.PlaneGeometry(TERRAIN_SIZE, TERRAIN_SIZE, TERRAIN_SEGS, TERRAIN_SEGS);
  geo.rotateX(-Math.PI / 2);
  const pos = geo.attributes.position;
  const segs1 = TERRAIN_SEGS + 1;
  terrainHeightData = new Float32Array(segs1 * segs1);
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i);
    const z = pos.getZ(i);
    const r = Math.sqrt(x * x + z * z) / ISLAND_RADIUS;
    const fade = Math.max(0, 1 - r * r * 1.4);
    const h = (noise2D(x * 0.04, z * 0.04) * 0.5 + noise2D(x * 0.09, z * 0.09) * 0.3 + noise2D(x * 0.18, z * 0.18) * 0.2);
    const height = Math.max(SEA_LEVEL - 2, h * 22 * fade);
    pos.setY(i, height);
    terrainHeightData[i] = height;
  }
  geo.computeVertexNormals();

  const mat = new THREE.ShaderMaterial({
    uniforms: { uAlignment: { value: 0.0 } },
    vertexShader: [
      'varying float vHeight;',
      'varying vec3  vNormal;',
      'varying vec2  vXZ;',
      'varying vec3  vWorldPos;',
      'void main(){',
      '  vHeight   = position.y;',
      '  vNormal   = normalize(normalMatrix * normal);',
      '  vXZ       = vec2(position.x, position.z);',
      '  vWorldPos = (modelMatrix * vec4(position,1.0)).xyz;',
      '  gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);',
      '}'
    ].join('\n'),
    fragmentShader: [
      'precision highp float;',
      'uniform float uAlignment;',
      'varying float vHeight;',
      'varying vec3  vNormal;',
      'varying vec2  vXZ;',
      'varying vec3  vWorldPos;',
      'float h21(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}',
      'float ns(vec2 p){',
      '  vec2 i=floor(p);vec2 f=fract(p);f=f*f*(3.0-2.0*f);',
      '  return mix(mix(h21(i),h21(i+vec2(1,0)),f.x),mix(h21(i+vec2(0,1)),h21(i+vec2(1,1)),f.x),f.y);',
      '}',
      'float fbm(vec2 p){return ns(p)*0.5+ns(p*2.1)*0.25+ns(p*4.4)*0.125+ns(p*9.1)*0.0625;}',
      'void main(){',
      // Biome colours
      '  vec3 wetSand  = vec3(0.62,0.56,0.38);',
      '  vec3 drySand  = vec3(0.92,0.83,0.56);',
      '  vec3 grassLo  = vec3(0.30,0.58,0.18);',
      '  vec3 grassHi  = vec3(0.18,0.42,0.11);',
      '  vec3 rock     = vec3(0.52,0.48,0.42);',
      '  vec3 snow     = vec3(0.94,0.96,1.00);',
      // Slope → rock on steep faces
      '  float slope    = 1.0 - clamp(vNormal.y, 0.0, 1.0);',
      '  float rockBias = smoothstep(0.36, 0.70, slope);',
      // Height blends (smooth, overlapping zones)
      '  float tSand  = smoothstep(1.4, 0.2, vHeight);',
      '  float tWet   = smoothstep(0.0, 1.8, vHeight) * smoothstep(2.8, 0.9, vHeight);',
      '  float tGrass = smoothstep(0.6, 4.8, vHeight) * smoothstep(14.0,9.5,vHeight);',
      '  float tForest= smoothstep(3.2,11.0, vHeight) * smoothstep(17.5,12.5,vHeight);',
      '  float tRock  = smoothstep(9.5,16.5, vHeight);',
      '  float tSnow  = smoothstep(15.0,20.5,vHeight);',
      '  vec3 col = drySand;',
      '  col = mix(col, wetSand, tWet * 0.70);',
      '  col = mix(col, grassLo, tGrass  * (1.0 - rockBias * 0.75));',
      '  col = mix(col, grassHi, tForest * (1.0 - rockBias * 0.75));',
      '  col = mix(col, rock,    tRock   + rockBias * (tGrass + tForest) * 0.88);',
      '  col = mix(col, snow,    tSnow);',
      // Macro + micro detail noise
      '  float det  = fbm(vXZ * 0.37);',
      '  float det2 = ns(vXZ * 2.2)*0.5 + ns(vXZ*4.5)*0.5;',
      '  col *= 0.80 + det*0.26 + det2*0.07;',
      // Evil tint
      '  float evil = clamp(-uAlignment, 0.0, 1.0);',
      '  col = mix(col, col * vec3(0.50,0.32,0.32), evil * 0.68);',
      // Normal perturbation (bump detail)
      '  float ep = 0.80;',
      '  float bx = ns(vXZ*0.68+vec2(ep,0.0)) - ns(vXZ*0.68-vec2(ep,0.0));',
      '  float bz = ns(vXZ*0.68+vec2(0.0,ep)) - ns(vXZ*0.68-vec2(0.0,ep));',
      '  vec3 bN  = normalize(vec3(-bx*1.2, 1.0, -bz*1.2));',
      '  vec3 n   = normalize(vNormal*0.60 + bN*0.40);',
      // Lighting
      '  vec3 sunDir  = normalize(vec3(0.55, 1.0, 0.4));',
      '  vec3 viewDir = normalize(cameraPosition - vWorldPos);',
      '  float diff   = max(dot(n, sunDir), 0.0);',
      // Cool sky bounce from below/sides
      '  float skyBnc = max(dot(n, vec3(-0.25,0.5,-0.15)), 0.0) * 0.16;',
      // Specular — sand catches sun, grass/forest matte
      '  float specAmt = (1.0 - clamp(tGrass + tForest*0.8, 0.0, 1.0)) * 0.08;',
      '  float spec    = pow(max(dot(reflect(-sunDir, n), viewDir), 0.0), 22.0) * specAmt;',
      '  float light   = 0.22 + 0.78*diff + skyBnc;',
      '  gl_FragColor  = vec4(col * light + vec3(spec), 1.0);',
      '}'
    ].join('\n'),
  });

  terrainMesh = new THREE.Mesh(geo, mat);
  terrainMesh.receiveShadow = true;
  terrainMesh.name = 'terrain';
  scene.add(terrainMesh);
}

function getTerrainHeight(x, z) {
  // Bilinear sample from height data
  const half = TERRAIN_SIZE / 2;
  const nx = (x + half) / TERRAIN_SIZE * TERRAIN_SEGS;
  const nz = (z + half) / TERRAIN_SIZE * TERRAIN_SEGS;
  const ix = Math.floor(clamp(nx, 0, TERRAIN_SEGS - 1));
  const iz = Math.floor(clamp(nz, 0, TERRAIN_SEGS - 1));
  const fx = nx - ix, fz = nz - iz;
  const stride = TERRAIN_SEGS + 1;
  const h00 = terrainHeightData[iz * stride + ix]       || 0;
  const h10 = terrainHeightData[iz * stride + ix + 1]   || 0;
  const h01 = terrainHeightData[(iz+1)*stride + ix]     || 0;
  const h11 = terrainHeightData[(iz+1)*stride + ix + 1] || 0;
  return lerp(lerp(h00, h10, fx), lerp(h01, h11, fx), fz);
}

function snapToTerrain(obj, yOffset = 0) {
  obj.position.y = getTerrainHeight(obj.position.x, obj.position.z) + yOffset;
}

// ─── Water ───────────────────────────────────────────────────────────────────
function buildWater() {
  const geo = new THREE.PlaneGeometry(400, 400, 48, 48);
  geo.rotateX(-Math.PI / 2);
  const mat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uAlignment: { value: 0 } },
    transparent: true, depthWrite: false,
    vertexShader: [
      'uniform float uTime;',
      'varying float vWave;',
      'varying vec2  vUV;',
      'varying vec3  vWorldPos;',
      'void main(){',
      '  vec3 p = position;',
      '  float w = sin(p.x*0.22+uTime*1.1)*cos(p.z*0.19+uTime*0.85)*0.55',
      '           +sin(p.x*0.47+uTime*1.6)*0.22',
      '           +sin(p.x*0.88+p.z*0.72+uTime*2.3)*0.10;',
      '  p.y += w; vWave = w; vUV = vec2(p.x, p.z);',
      '  vWorldPos = (modelMatrix * vec4(p,1.0)).xyz;',
      '  gl_Position = projectionMatrix * modelViewMatrix * vec4(p,1.0);',
      '}'
    ].join('\n'),
    fragmentShader: [
      'precision highp float;',
      'uniform float uAlignment;',
      'uniform float uTime;',
      'varying float vWave;',
      'varying vec2  vUV;',
      'varying vec3  vWorldPos;',
      // noise for caustics
      'float h21(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}',
      'float ns(vec2 p){vec2 i=floor(p);vec2 f=fract(p);f=f*f*(3.0-2.0*f);return mix(mix(h21(i),h21(i+vec2(1,0)),f.x),mix(h21(i+vec2(0,1)),h21(i+vec2(1,1)),f.x),f.y);}',
      'void main(){',
      '  float evil = clamp(-uAlignment, 0.0, 1.0);',
      '  vec3 deep  = mix(vec3(0.02,0.10,0.38), vec3(0.14,0.02,0.05), evil*0.7);',
      '  vec3 mid   = mix(vec3(0.05,0.22,0.62), vec3(0.26,0.04,0.08), evil*0.6);',
      '  vec3 crest = mix(vec3(0.44,0.76,0.98), vec3(0.60,0.18,0.18), evil*0.6);',
      '  float foam  = smoothstep(0.12, 0.48, vWave);',
      '  vec3 col    = mix(deep, mid, clamp(vWave*1.9+0.45, 0.0, 1.0));',
      '  col = mix(col, crest, foam * 0.65);',
      // Animated band detail
      '  float band = sin(vUV.x*0.14+uTime*0.55)*sin(vUV.y*0.11+uTime*0.48)*0.5+0.5;',
      '  col += mix(vec3(0.10,0.24,0.58), vec3(0.38,0.04,0.04), evil) * band * 0.07;',
      // Caustics
      '  float caust = ns(vUV*0.28+vec2(uTime*0.12,uTime*0.09))*ns(vUV*0.22-vec2(uTime*0.08,uTime*0.13));',
      '  col += mix(vec3(0.18,0.45,0.9), vec3(0.6,0.1,0.1), evil) * caust * 0.06;',
      // Wave normal via finite differences
      '  float eps = 0.8;',
      '  float wx1=sin((vUV.x+eps)*0.22+uTime*1.1)*cos(vUV.y*0.19+uTime*0.85)*0.55+sin((vUV.x+eps)*0.47+uTime*1.6)*0.22+sin((vUV.x+eps)*0.88+vUV.y*0.72+uTime*2.3)*0.10;',
      '  float wx2=sin((vUV.x-eps)*0.22+uTime*1.1)*cos(vUV.y*0.19+uTime*0.85)*0.55+sin((vUV.x-eps)*0.47+uTime*1.6)*0.22+sin((vUV.x-eps)*0.88+vUV.y*0.72+uTime*2.3)*0.10;',
      '  float wz1=sin(vUV.x*0.22+uTime*1.1)*cos((vUV.y+eps)*0.19+uTime*0.85)*0.55+sin(vUV.x*0.47+uTime*1.6)*0.22+sin(vUV.x*0.88+(vUV.y+eps)*0.72+uTime*2.3)*0.10;',
      '  float wz2=sin(vUV.x*0.22+uTime*1.1)*cos((vUV.y-eps)*0.19+uTime*0.85)*0.55+sin(vUV.x*0.47+uTime*1.6)*0.22+sin(vUV.x*0.88+(vUV.y-eps)*0.72+uTime*2.3)*0.10;',
      '  vec3 wN = normalize(vec3((wx2-wx1)*3.0, 2.0, (wz2-wz1)*3.0));',
      // Sun specular
      '  vec3 sunDir  = normalize(vec3(0.55, 1.0, 0.4));',
      '  vec3 viewDir = normalize(cameraPosition - vWorldPos);',
      '  float spec   = pow(max(dot(reflect(-sunDir,wN), viewDir), 0.0), 80.0) * 2.0;',
      '  col += mix(vec3(1.0,0.95,0.82), vec3(1.0,0.55,0.35), evil) * spec;',
      // Fresnel tinting at glancing angles
      '  float fres = pow(1.0 - max(dot(viewDir, vec3(0,1,0)), 0.0), 5.0) * 0.40;',
      '  col += mix(vec3(0.18,0.38,0.78), vec3(0.48,0.08,0.18), evil) * fres;',
      '  gl_FragColor = vec4(col, 0.84 + foam*0.12);',
      '}'
    ].join('\n'),
  });
  waterMesh = new THREE.Mesh(geo, mat);
  waterMesh.position.y = SEA_LEVEL - 0.4;
  scene.add(waterMesh);
}

// ─── Trees ───────────────────────────────────────────────────────────────────
function buildTrees() {
  for (let i = 0; i < 95; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist  = rand(12, 76);
    const x = Math.cos(angle) * dist, z = Math.sin(angle) * dist;
    const h = getTerrainHeight(x, z);
    if (h < 1.2 || h > 17) continue;
    const scale = rand(0.8, 1.5);
    if (h > 11)       buildPineTree(x, z, h, scale);
    else if (h < 3.0) buildPalmTree(x, z, h, scale);
    else              Math.random() < 0.55 ? buildOakTree(x, z, h, scale) : buildPineTree(x, z, h, scale);
  }
  const rockMat = new THREE.MeshStandardMaterial({ color: 0x888070, roughness: 0.82, metalness: 0.04 });
  for (let i = 0; i < 42; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist  = rand(8, 82);
    const x = Math.cos(angle) * dist, z = Math.sin(angle) * dist;
    const h = getTerrainHeight(x, z);
    if (h < 0.3 || h > 20) continue;
    const s = rand(0.4, 1.2);
    const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(s, 0), rockMat);
    rock.position.set(x, h + s*0.5, z);
    rock.rotation.set(rand(0,Math.PI), rand(0,Math.PI), rand(0,Math.PI));
    rock.userData = { type: 'rock', vel: new THREE.Vector3() };
    rock.castShadow = true;
    scene.add(rock);
  }
}

function buildOakTree(x, z, h, scale) {
  const group = new THREE.Group();
  group.position.set(x, h, z);
  const tMat = new THREE.MeshStandardMaterial({ color: 0x5a3815, map: TEX.bark, roughness: 0.90, metalness: 0 });
  tMat.map.repeat.set(1, scale * 2);
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.22*scale, 0.40*scale, 3.5*scale, 7), tMat);
  trunk.castShadow = true;
  trunk.position.set(0, 1.75*scale, 0);
  group.add(trunk);
  const lH = 0.27 + rand(-0.04, 0.04), lL = 0.22 + rand(0, 0.10);
  const lMat  = new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(lH, 0.75, lL), roughness: 0.95, metalness: 0 });
  const lMat2 = new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(lH, 0.68, lL - 0.06), roughness: 0.95, metalness: 0 });
  const mainR = rand(2.2, 3.0) * scale;
  const main  = new THREE.Mesh(new THREE.SphereGeometry(mainR, 7, 6), lMat);
  main.scale.y = rand(0.72, 0.92);
  main.position.set(0, (3.6 + mainR*0.55)*scale, 0);
  main.castShadow = true;
  group.add(main);
  const numA = 2 + Math.floor(Math.random() * 3);
  for (let j = 0; j < numA; j++) {
    const a2 = (j / numA) * Math.PI * 2 + rand(0, 0.8);
    const ar  = rand(1.3, 1.9) * scale;
    const ao  = rand(mainR * 0.5, mainR * 0.82);
    const acc = new THREE.Mesh(new THREE.SphereGeometry(ar, 6, 5), lMat2);
    acc.position.set(Math.cos(a2)*ao, (3.3 + rand(0,1.4))*scale, Math.sin(a2)*ao);
    acc.scale.y = rand(0.78, 1.08);
    group.add(acc);
  }
  group.userData = { type: 'tree', treeType: 'oak', x, z, h, scale, burning: false, fireTimer: 0 };
  scene.add(group);
  trees.push(group);
  return group;
}

function buildPineTree(x, z, h, scale) {
  const group = new THREE.Group();
  group.position.set(x, h, z);
  const tMat = new THREE.MeshStandardMaterial({ color: 0x4a2a0a, map: TEX.bark, roughness: 0.92, metalness: 0 });
  tMat.map.repeat.set(1, scale * 2);
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15*scale, 0.28*scale, 4.5*scale, 6), tMat);
  trunk.castShadow = true;
  trunk.position.set(0, 2.25*scale, 0);
  group.add(trunk);
  const lH = rand(0.30, 0.38);
  const lMat = new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(lH, 0.65, 0.17 + rand(0,0.08)), roughness: 0.94, metalness: 0 });
  [0, 1, 2].forEach(tier => {
    const r = (2.3 - tier*0.52) * scale;
    const cone = new THREE.Mesh(new THREE.ConeGeometry(r, 3.6*scale, 8), lMat);
    cone.position.set(0, (4.0 + tier*2.6)*scale, 0);
    cone.rotation.y = Math.random() * Math.PI;
    cone.castShadow = true;
    group.add(cone);
  });
  group.userData = { type: 'tree', treeType: 'pine', x, z, h, scale, burning: false, fireTimer: 0 };
  scene.add(group);
  trees.push(group);
  return group;
}

function buildPalmTree(x, z, h, scale) {
  const group = new THREE.Group();
  group.position.set(x, h, z);
  const tMat = new THREE.MeshStandardMaterial({ color: 0x8B6910, roughness: 0.85, metalness: 0 });
  const leanDir = Math.random() * Math.PI * 2;
  const lean    = 0.14 + Math.random() * 0.12;
  for (let seg = 0; seg < 3; seg++) {
    const lx = Math.cos(leanDir) * seg * lean * 1.6 * scale;
    const lz = Math.sin(leanDir) * seg * lean * 1.6 * scale;
    const ly = seg * 1.9 * scale;
    const s = new THREE.Mesh(new THREE.CylinderGeometry(0.17*scale*(1-seg*0.04), 0.22*scale*(1-seg*0.04), 1.9*scale, 7), tMat);
    s.position.set(lx, ly + 0.95*scale, lz);
    s.rotation.z = Math.sin(leanDir) * lean * 0.6;
    s.rotation.x = Math.cos(leanDir) * lean * 0.6;
    group.add(s);
  }
  const tipX = Math.cos(leanDir)*3*lean*1.6*scale;
  const tipZ = Math.sin(leanDir)*3*lean*1.6*scale;
  const tipY = 3*1.9*scale;
  const fMat = new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(0.32, 0.72, 0.26), roughness: 0.90, metalness: 0, side: THREE.DoubleSide });
  for (let f = 0; f < 7; f++) {
    const fa = (f / 7) * Math.PI * 2;
    const frond = new THREE.Mesh(new THREE.PlaneGeometry(0.55*scale, 2.8*scale), fMat);
    frond.position.set(tipX, tipY, tipZ);
    frond.rotation.y = fa;
    frond.rotation.x = -0.55;
    group.add(frond);
  }
  group.userData = { type: 'tree', treeType: 'palm', x, z, h, scale, burning: false, fireTimer: 0 };
  scene.add(group);
  trees.push(group);
  return group;
}

function buildTreeAt(x, z, h, scale, treeType) {
  if (treeType === 'oak')  return buildOakTree(x, z, h, scale);
  if (treeType === 'pine') return buildPineTree(x, z, h, scale);
  if (treeType === 'palm') return buildPalmTree(x, z, h, scale);
  if (h > 11) return buildPineTree(x, z, h, scale);
  if (h < 3)  return buildPalmTree(x, z, h, scale);
  return buildOakTree(x, z, h, scale);
}

function buildTreeAt(x, z, h, scale, treeType) {
  if (treeType === 'oak')  return buildOakTree(x, z, h, scale);
  if (treeType === 'pine') return buildPineTree(x, z, h, scale);
  if (treeType === 'palm') return buildPalmTree(x, z, h, scale);
  if (h > 11) return buildPineTree(x, z, h, scale);
  if (h < 3)  return buildPalmTree(x, z, h, scale);
  return buildOakTree(x, z, h, scale);
}

// ─── Grass billboards ─────────────────────────────────────────────────────────
function buildGrass() {
  const N  = 3500;
  const BH = 0.72;
  // PlaneGeometry lies in XY plane → upright in world with Y-rotation only
  const geo  = new THREE.PlaneGeometry(0.38, BH);
  const mat  = new THREE.MeshBasicMaterial({ side: THREE.DoubleSide, vertexColors: true });
  const mesh = new THREE.InstancedMesh(geo, mat, N);
  mesh.frustumCulled = false;

  const dummy = new THREE.Object3D();
  const color = new THREE.Color();
  let placed  = 0;

  for (let attempt = 0; attempt < N * 8 && placed < N; attempt++) {
    const angle = Math.random() * Math.PI * 2;
    const dist  = rand(3, 77);
    const x = Math.cos(angle) * dist;
    const z = Math.sin(angle) * dist;
    const h = getTerrainHeight(x, z);
    if (h < 1.0 || h > 10.5) continue;  // grass biome only

    dummy.position.set(x, h + BH * 0.5, z);
    dummy.rotation.y = Math.random() * Math.PI * 2;
    dummy.scale.setScalar(0.75 + Math.random() * 0.55);
    dummy.updateMatrix();
    mesh.setMatrixAt(placed, dummy.matrix);

    color.setHSL(0.27 + rand(-0.03, 0.03), 0.65 + rand(-0.1, 0.1), 0.24 + rand(-0.04, 0.04));
    mesh.setColorAt(placed, color);
    placed++;
  }

  mesh.count = placed;
  mesh.instanceMatrix.needsUpdate = true;
  if (mesh.instanceColor) mesh.instanceColor.needsUpdate = true;
  scene.add(mesh);
  window._grassMesh = mesh;
}

    const len = [1.5, 1.8, 1.7, 1.4][i];

function updateHandColor() {
  const t = (alignment + 1) / 2; // 0=evil, 1=good
  const evilColor  = new THREE.Color(0.6, 0.1, 0.1);
  const goodColor  = new THREE.Color(1.0, 0.85, 0.6);
  const color = evilColor.clone().lerp(goodColor, t);
  godHand.children.forEach(c => {
    if (c.material) c.material.color.copy(color);
  });

  const emissive = new THREE.Color(lerp(0.25,0.12,t), lerp(0.0,0.08,t), 0);
  godHand.children.forEach(c => {

}

// ─── Villagers ───────────────────────────────────────────────────────────────
class VillagerAgent {
  constructor(x, z) {
    this.mesh = new THREE.Group();
    this.mesh.userData.type = 'villager';
    this.mesh.userData.agent = this;

    const robeColor = new THREE.Color().setHSL(Math.random(), 0.48, 0.42 + Math.random() * 0.18);
    const robeMat = new THREE.MeshStandardMaterial({ color: robeColor, roughness: 0.80, metalness: 0 });
    const skinMat = new THREE.MeshStandardMaterial({ color: 0xf0c898, roughness: 0.60, metalness: 0 });
    const hatMat  = new THREE.MeshStandardMaterial({ color: robeColor.clone().multiplyScalar(0.7), roughness: 0.85, metalness: 0 });

    const robe = new THREE.Mesh(new THREE.CylinderGeometry(0.27, 0.46, 1.3, 7), robeMat);
    robe.castShadow = true;
    this.mesh.add(robe);

    const head = new THREE.Mesh(new THREE.SphereGeometry(0.27, 8, 8), skinMat);
    head.position.set(0, 0.93, 0);
    head.castShadow = true;
    this.mesh.add(head);

    const hat = new THREE.Mesh(new THREE.ConeGeometry(0.21, 0.38, 7), hatMat);
    hat.position.set(0, 1.27, 0);
    this.mesh.add(hat);

    [-0.36, 0.36].forEach(ax => {
      const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.09, 0.65, 5), robeMat);
      arm.position.set(ax, 0.18, 0);
      arm.rotation.z = ax > 0 ? 0.5 : -0.5;
      this.mesh.add(arm);
    });

    const h = getTerrainHeight(x, z);
    this.mesh.position.set(x, h + 0.65, z);
    scene.add(this.mesh);

    this.state  = 'wander';
    this.target = null;
    this.hunger = Math.random() * 0.3;
    this.fear   = 0;
    this.timer  = rand(0, 3);
    this.velocity = new THREE.Vector3();
    this.alive  = true;
    this.prayerTimer = rand(35, 85);
  }

  update(dt) {
    if (!this.alive) return;
    this.timer -= dt;
    this.hunger = Math.min(1, this.hunger + dt * 0.012);
    this.fear   = Math.max(0, this.fear - dt * 0.3);
    // Prayer
    this.prayerTimer -= dt;
    if (this.prayerTimer <= 0) {
      this.prayerTimer = rand(40, 90);
      if (Math.random() < 0.65) spawnPrayer(this);
    }

    // State transitions
    if (this.fear > 0.5) {
      this.state = 'flee';
    } else if (this.hunger > 0.65) {
      const fp = nearestFood(this.mesh.position);
      if (fp) { this.target = fp; this.state = 'seek_food'; }
      else     this.state = 'worship';
    } else if (this.timer <= 0) {
      this.state = Math.random() < 0.4 ? 'worship' : 'wander';
      this.timer = rand(3, 8);
    }

    const speed = this.state === 'flee' ? 6 : (this.state === 'seek_food' ? 3.5 : 2);

    if (this.state === 'wander') {
      if (!this.target || this.mesh.position.distanceTo(this.target) < 1.5 || this.timer <= 0) {
        const angle = Math.random() * Math.PI * 2;
        const r = rand(3, 12);
        const tx = VILLAGE_POS.x + Math.cos(angle) * r;
        const tz = VILLAGE_POS.z + Math.sin(angle) * r;
        this.target = new THREE.Vector3(tx, 0, tz);
        this.timer = rand(4, 10);
      }
    } else if (this.state === 'worship') {
      this.target = VILLAGE_POS.clone();
    } else if (this.state === 'flee') {
      // Flee away from nearest threat (fireball / evil zone)
      const away = this.mesh.position.clone().sub(VILLAGE_POS).normalize().multiplyScalar(20);
      this.target = this.mesh.position.clone().add(away);
    } else if (this.state === 'seek_food') {
      if (this.target && this.mesh.position.distanceTo(this.target.position || this.target) < 1.5) {
        // Eat
        this.hunger = Math.max(0, this.hunger - 0.5);
        if (this.target.userData) {
          this.target.userData.bites = (this.target.userData.bites || 0) + 1;
          if (this.target.userData.bites > 4) { consumeFood(this.target); this.target = null; }
        }
        this.state = 'wander';
        this.timer = rand(3, 6);
      }
    }

    // Move toward target
    if (this.target) {
      const tp = (this.target.position || this.target);
      const dir = new THREE.Vector3(tp.x - this.mesh.position.x, 0, tp.z - this.mesh.position.z);
      const dist = dir.length();
      if (dist > 0.3) {
        dir.normalize();
        this.mesh.position.x += dir.x * speed * dt;
        this.mesh.position.z += dir.z * speed * dt;
        this.mesh.rotation.y = Math.atan2(dir.x, dir.z);
      }
    }

    // Clamp inside island
    const px = this.mesh.position.x, pz = this.mesh.position.z;
    const r2 = Math.sqrt(px*px + pz*pz);
    if (r2 > ISLAND_RADIUS - 5) {
      this.mesh.position.x *= (ISLAND_RADIUS - 5) / r2;
      this.mesh.position.z *= (ISLAND_RADIUS - 5) / r2;
    }

    snapToTerrain(this.mesh, 0.65);

    // Walk bob / mixer
    if (this._hasGLB && this.mixer) {
      this.mixer.update(dt);
    } else if (this.state !== 'wander' || this.target) {
      const phase = performance.now() * 0.006 + this.timer;
      this.mesh.position.y += Math.abs(Math.sin(phase)) * 0.06;
      this.mesh.rotation.z  = Math.sin(phase * 0.5) * 0.04;
    }
  }

  applyGLBModel(gltf) {
    while (this.mesh.children.length) this.mesh.remove(this.mesh.children[0]);
    const model = THREE.SkeletonUtils.clone(gltf.scene);
    model.scale.setScalar(1.1);
    model.rotation.y = Math.PI;
    // Tint the villager's robe color
    const hue = Math.random();
    model.traverse(c => {
      if (!c.isMesh) return;
      c.castShadow = true;
      c.material = c.material.clone();
      c.material.color.multiplyScalar(0.7 + Math.random() * 0.5);
      if (hue < 0.33)       c.material.color.r *= 1.4;
      else if (hue < 0.66)  c.material.color.g *= 1.4;
      else                   c.material.color.b *= 1.4;
    });
    this.mesh.add(model);
    this.mixer = new THREE.AnimationMixer(model);
    if (gltf.animations.length > 0) {
      const action = this.mixer.clipAction(gltf.animations[0]);
      action.setEffectiveTimeScale(1.2 + Math.random() * 0.4);
      action.play();
    }
    this._hasGLB = true;
  }
}

function nearestFood(pos) {
  let best = null, bestD = 999;
  for (const f of foodPiles) {
    if (!f.parent) continue;
    const d = pos.distanceTo(f.position);
    if (d < bestD) { bestD = d; best = f; }
  }
  return best;
}

function consumeFood(mesh) {
  const idx = foodPiles.indexOf(mesh);
  if (idx !== -1) foodPiles.splice(idx, 1);
  scene.remove(mesh);
}

function updateInfluenceRing() {
  if (!influenceRing) return;
  // Rebuild ring geometry when radius changes
  influenceRing.geometry.dispose();
  const r = influenceRadius;
  const ng = new THREE.RingGeometry(r - 0.4, r + 0.4, 64);
  ng.rotateX(-Math.PI / 2);
  influenceRing.geometry = ng;

  // Color based on alignment
  const t = (alignment + 1) / 2;
  influenceRing.material.color.setRGB(
    lerp(0.8, 0.2, t),
    lerp(0.1, 0.6, t),
    lerp(0.1, 1.0, t)
  );
}

// ─── Creature (Thronglet) ─────────────────────────────────────────────────────
class CreatureAgent {
  constructor(x, z, parentTraits = null) {
    this.generation = parentTraits ? (parentTraits._gen || 1) + 1 : 1;
    if (parentTraits) {
      this.traits = {
        friendliness: clamp(parentTraits.friendliness + rand(-0.12, 0.12), 0.05, 0.95),
        aggression:   clamp(parentTraits.aggression   + rand(-0.10, 0.10), 0.00, 0.90),
        laziness:     clamp(parentTraits.laziness     + rand(-0.18, 0.08), 0.00, 0.85),
        curiosity:    clamp((parentTraits.curiosity || 0.45) + rand(-0.10, 0.12), 0.10, 1.00),
      };
    } else {
      this.traits = { friendliness: 0.5, aggression: 0.3, laziness: 0.6, curiosity: 0.4 };
    }
    this.traits._gen = this.generation;

    this.age           = 0;
    this.experience    = 0;
    this.intelligenceLevel = 0;
    this.xpThresholds  = [0, 35, 100, 220, 420, 700, 1100, 1600, 2200, 3000];
    this.learnedMiracles = new Set();
    this.memory        = [];
    this.autocastTimer = rand(20, 35);
    this.target        = new THREE.Vector3(x + rand(-10, 10), 0, z + rand(-10, 10));
    this._wanderTimer  = 0;
    this._role         = 'provider';
    this._alertTimer   = 0;
    this._alertPos     = null;
    this._coordTimer   = 0;
    this.group         = new THREE.Group();
    this._eyeMats      = [];
    this._intelligenceAura = null;
    this._hasGLB       = false;
    this._levelNames   = ['Newborn', 'Curious', 'Learning', 'Capable', 'Transcendent',
                          'Coordinator', 'Strategist', 'Architect', 'Prophet', 'Omniscient'];
    this._buildMesh();
    const h = getTerrainHeight(x, z);
    this.group.position.set(x, h + 1.5, z);
    scene.add(this.group);
  }

  gainExperience(amount) {
    this.experience += amount;
    const nextThreshold = this.xpThresholds[this.intelligenceLevel + 1];
    if (nextThreshold !== undefined && this.experience >= nextThreshold) {
      this.intelligenceLevel++;
      this._onLevelUp();
    }
  }

  _onLevelUp() {
    const name = this._levelNames[this.intelligenceLevel] || 'Omniscient';
    showMiracleFlash(`Creature: ${name}!`, '#aaffff');
    spawnBurst(this.group.position.clone().add(v3(0, 2.5, 0)), 0x44ffff, 35, 9, 0.22, 2.0);
    spawnBurst(this.group.position.clone().add(v3(0, 2.5, 0)), 0xffffff, 20, 6, 0.15, 1.5);
    if (this.intelligenceLevel >= 2) this._buildAura();
    // Reassign roles whenever any creature levels up
    if (this.intelligenceLevel >= 3) SharedMind.assignRoles();
  }

  remember(type, pos, value = 1) {
    this.memory.unshift({ type, pos: pos.clone(), time: performance.now() / 1000, value });
    if (this.memory.length > 20) this.memory.pop();
    const xpMap = { miracle: 5, food_appeared: 2, villager_hurt: 4, healed: 3, fireball_hit: 4 };
    if (xpMap[type]) this.gainExperience(xpMap[type]);
    // Broadcast to shared knowledge base
    if (type === 'food_appeared') SharedMind.notifyFood(pos);
    if (type === 'fireball_hit')  SharedMind.notifyThreat(pos);
  }

  witnessEvent(type) {
    // Trait drift from witnessing player actions
    switch(type) {
      case 'fireball':
        this.traits.aggression = clamp(this.traits.aggression+0.03,0,1);
        this.traits.curiosity  = clamp(this.traits.curiosity+0.01,0,1);
        if(!this._fireballWitness) this._fireballWitness=0;
        this._fireballWitness++;
        if(this._fireballWitness>=4) this._traumatized=true;
        break;
      case 'heal':
        this.traits.friendliness=clamp(this.traits.friendliness+0.04,0,1);
        this._loveHeal=true;
        break;
      case 'food':
        this.traits.curiosity=clamp(this.traits.curiosity+0.02,0,1);
        this.traits.friendliness=clamp(this.traits.friendliness+0.01,0,1);
        break;
      case 'wood':
        this.traits.curiosity=clamp(this.traits.curiosity+0.015,0,1);
        break;
    }
  }

  learnMiracle(type) {
    if (!this.learnedMiracles.has(type)) {
      this.learnedMiracles.add(type);
      showMiracleFlash(`Creature learned ${type}!`, '#aaffaa');
      this.gainExperience(15);
    }
  }

  reward() {
    this.traits.friendliness = clamp(this.traits.friendliness + 0.15, 0, 1);
    this.traits.aggression   = clamp(this.traits.aggression   - 0.08, 0, 1);
    this.traits.curiosity    = clamp(this.traits.curiosity    + 0.05, 0, 1);
    this._pulse(0xffee44); playReward();
    showMiracleFlash('Creature Rewarded ✦', '#ffd700');
    changeAlignment(0.03);
    this.gainExperience(10);
    this._updateUI();
  }

  punish() {
    this.traits.aggression   = clamp(this.traits.aggression   + 0.15, 0, 1);
    this.traits.friendliness = clamp(this.traits.friendliness - 0.08, 0, 1);
    this._pulse(0xff2200); playPunish();
    showMiracleFlash('Creature Punished', '#cc4444');
    changeAlignment(-0.03);
    this.gainExperience(3);
    this._updateUI();
  }

  _pulse(hexColor) {
    if (!this.mat) return;
    const orig = this.mat.emissive.clone();
    this.mat.emissive.setHex(hexColor);
    setTimeout(() => { if (this.mat) this.mat.emissive.copy(orig); }, 300);
  }

  _buildAura() {
    if (this._intelligenceAura) this.group.remove(this._intelligenceAura);
    const aura = new THREE.Group();
    const lvl  = this.intelligenceLevel;
    const n    = 4 + lvl * 3;
    const cols = [0x44aaff, 0xaaffaa, 0xffaa44, 0xff88ff, 0xffffff, 0xffff44];
    for (let i = 0; i < n; i++) {
      const col = cols[i % cols.length];
      const mat = new THREE.MeshStandardMaterial({ color: col, emissive: col, emissiveIntensity: 1.4 + lvl * 0.3 });
      const orb = new THREE.Mesh(new THREE.SphereGeometry(0.09 + lvl * 0.02, 4, 4), mat);
      orb.userData.a0  = (i / n) * Math.PI * 2;
      orb.userData.spd = 0.35 + rand(-0.1, 0.1);
      orb.userData.r   = 2.0 + lvl * 0.25;
      orb.userData.yph = rand(0, Math.PI * 2);
      aura.add(orb);
    }
    this.group.add(aura);
    this._intelligenceAura = aura;
  }

  _updateEvolutionVisuals() {
    const lvl = this.intelligenceLevel;
    const targetScale = 1.0 + lvl * 0.14;
    const cs = this.group.scale.x;
    if (Math.abs(cs - targetScale) > 0.001) this.group.scale.setScalar(lerp(cs, targetScale, 0.003));
    this._eyeMats.forEach(m => {
      const ti = 1.6 + lvl * 0.9;
      if (Math.abs(m.emissiveIntensity - ti) > 0.01) m.emissiveIntensity = lerp(m.emissiveIntensity, ti, 0.015);
    });
    if (this._intelligenceAura) {
      const t = performance.now() / 1000;
      this._intelligenceAura.children.forEach(orb => {
        const a = orb.userData.a0 + t * orb.userData.spd;
        orb.position.set(
          Math.cos(a) * orb.userData.r,
          0.8 + Math.sin(t * 0.9 + orb.userData.yph) * 0.55,
          Math.sin(a) * orb.userData.r
        );
      });
    }
  }

  _buildMesh() {
    const mat     = new THREE.MeshStandardMaterial({ color: 0xc8a050, map: TEX.fur, roughness: 0.75, metalness: 0 });
    const darkMat = new THREE.MeshStandardMaterial({ color: 0x8a6030, roughness: 0.85, metalness: 0 });
    const maneMat = new THREE.MeshStandardMaterial({ color: 0x7a4a10, roughness: 0.90, metalness: 0 });

    const body = new THREE.Mesh(new THREE.SphereGeometry(1.35, 11, 9), mat);
    body.scale.set(1.0, 0.82, 1.65); body.castShadow = true;
    this.group.add(body);

    const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.72, 1.0, 8), mat);
    neck.position.set(0, 0.62, 1.1); neck.rotation.x = -0.38;
    this.group.add(neck);

    const head = new THREE.Mesh(new THREE.SphereGeometry(0.92, 10, 9), mat);
    head.scale.set(1.0, 0.88, 1.1); head.position.set(0, 1.15, 1.95); head.castShadow = true;
    this.group.add(head);

    const snout = new THREE.Mesh(new THREE.SphereGeometry(0.4, 8, 6), mat);
    snout.scale.set(0.88, 0.68, 1.28); snout.position.set(0, 0.82, 2.62);
    this.group.add(snout);

    const nostMat = new THREE.MeshBasicMaterial({ color: 0x1a0d00 });
    [-0.14, 0.14].forEach(ox => {
      const n = new THREE.Mesh(new THREE.SphereGeometry(0.07, 5, 5), nostMat);
      n.position.set(ox, 0.79, 2.94); this.group.add(n);
    });

    const eyeHue = 0.12 + Math.random() * 0.12;
    const eyeCol = new THREE.Color().setHSL(eyeHue, 0.9, 0.55);
    [-0.36, 0.36].forEach(ex => {
      const eyeMat = new THREE.MeshStandardMaterial({ color: eyeCol, emissive: eyeCol, emissiveIntensity: 1.6 });
      const eye = new THREE.Mesh(new THREE.SphereGeometry(0.17, 7, 7), eyeMat);
      eye.position.set(ex, 1.3, 2.58); this.group.add(eye);
      this._eyeMats.push(eyeMat);
      const pup = new THREE.Mesh(new THREE.SphereGeometry(0.085, 5, 5), new THREE.MeshBasicMaterial({ color: 0x110000 }));
      pup.position.set(ex, 1.3, 2.73); this.group.add(pup);
    });

    [-0.62, 0.62].forEach(ex => {
      const ear = new THREE.Mesh(new THREE.ConeGeometry(0.27, 0.52, 5), darkMat);
      ear.position.set(ex, 1.98, 1.98); ear.rotation.z = ex > 0 ? 0.38 : -0.38;
      this.group.add(ear);
    });

    for (let m = 0; m < 9; m++) {
      const ma = (m / 9) * Math.PI * 2;
      const mp = new THREE.Mesh(new THREE.SphereGeometry(0.33, 6, 5), maneMat);
      mp.position.set(Math.cos(ma) * 0.82, 0.82 + Math.sin(ma) * 0.14, 1.25);
      mp.scale.y = 1.45; this.group.add(mp);
    }

    this._legUpper = [];
    [[-0.88,-0.78,-0.98],[0.88,-0.78,-0.98],[-0.88,-0.78,0.82],[0.88,-0.78,0.82]].forEach(([lx,ly,lz]) => {
      const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.21, 0.95, 7), mat);
      upper.position.set(lx, ly, lz); upper.rotation.z = lx < 0 ? -0.13 : 0.13; upper.castShadow = true;
      this._legUpper.push(upper); this.group.add(upper);
      const lower = new THREE.Mesh(new THREE.CylinderGeometry(0.17, 0.13, 0.88, 7), darkMat);
      lower.position.set(lx + (lx < 0 ? -0.06 : 0.06), ly - 0.88, lz); this.group.add(lower);
      const paw = new THREE.Mesh(new THREE.SphereGeometry(0.22, 7, 5), darkMat);
      paw.scale.set(1.2, 0.65, 1.32); paw.position.set(lx + (lx < 0 ? -0.1 : 0.1), ly - 1.38, lz + 0.1);
      this.group.add(paw);
    });

    for (let i = 0; i < 4; i++) {
      const ts = new THREE.Mesh(new THREE.SphereGeometry(0.26 - i * 0.04, 6, 5), i < 3 ? mat : maneMat);
      ts.position.set(0, -0.48 + i * 0.28, -1.42 - i * 0.58); ts.scale.y = 1.45;
      this.group.add(ts);
    }
    this.mat = mat;
  }

  _findNearestTree(maxDist = 32) {
    let best = null, bestD = maxDist;
    for (const tree of trees) {
      if (tree.userData.burning) continue;
      const d = this.group.position.distanceTo(tree.position);
      if (d < bestD) { bestD = d; best = tree; }
    }
    return best;
  }

  _findNearestLog(maxDist = 38) {
    let best = null, bestD = maxDist;
    scene.traverse(obj => {
      if (obj.userData.type === 'log' && !obj.userData.carried && !obj.userData.thrown) {
        const d = this.group.position.distanceTo(obj.position);
        if (d < bestD) { bestD = d; best = obj; }
      }
    });
    return best;
  }

  _getSeparationForce() {
    const sep = new THREE.Vector3();
    for (const other of creatures) {
      if (other === this) continue;
      const d = this.group.position.distanceTo(other.group.position);
      if (d < 10 && d > 0.1) {
        const away = this.group.position.clone().sub(other.group.position).normalize();
        sep.addScaledVector(away, (10 - d) / 10 * 2.8);
      }
    }
    return sep;
  }

  _pickMiracle() {
    if (this.learnedMiracles.size === 0) return null;
    const types  = [...this.learnedMiracles];
    const hungry = villagers.filter(v => v.alive && v.hunger > 0.6).length;
    // Prefer types not recently cast by any creature (cooperative diversity)
    const fresh  = types.filter(t => !SharedMind.wasRecentlyCast(t, 20));
    const pool   = fresh.length > 0 ? fresh : types;
    if (hungry > 2 && pool.includes('food')) return 'food';
    if (this._loveHeal && pool.includes('heal') && Math.random()<0.55) return 'heal';
    if (hungry > 0 && pool.includes('heal')) return 'heal';
    return pool[Math.floor(Math.random() * pool.length)];
  }

  _moveTo(tp, speed, dt) {
    // Water fear quirk: steer away from island edge
    if (this._fearWater) {
      const distToEdge = ISLAND_RADIUS - Math.sqrt(tp.x*tp.x+tp.z*tp.z);
      if (distToEdge < 15) {
        const pull = this.group.position.clone().normalize().multiplyScalar(-5);
        tp = tp.clone().add(pull);
      }
    }
    const dx = tp.x - this.group.position.x;
    const dz = tp.z - this.group.position.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist > 0.5) {
      const s = Math.min(speed * dt, dist) / dist;
      this.group.position.x += dx * s;
      this.group.position.z += dz * s;
      this.group.rotation.y = Math.atan2(dx, dz);
      return true;
    }
    return false;
  }

  _wanderNear(center, radius, speed, dt) {
    this._wanderTimer -= dt;
    if (this.group.position.distanceTo(this.target) < 2.0 || this._wanderTimer <= 0) {
      const angle = Math.random() * Math.PI * 2;
      const r = rand(4, radius);
      this.target.set(center.x + Math.cos(angle) * r, 0, center.z + Math.sin(angle) * r);
      this._wanderTimer = rand(4, 10);
    }
    return this._moveTo(this.target, speed * lerp(0.55, 1.5, 1 - this.traits.laziness), dt);
  }

  _doStateBehavior(dt) {
    const lvl = this.intelligenceLevel;

    if (lvl === 0) {
      // Newborn: wander near the god hand, observe
      return this._wanderNear(worldMouse, 30, 1.6, dt);
    }

    if (lvl === 1) {
      // Curious: investigate food piles, explore village
      const food = nearestFood(this.group.position);
      if (food && this.group.position.distanceTo(food.position) < 28) {
        const moved = this._moveTo(food.position, 2.5, dt);
        if (this.group.position.distanceTo(food.position) < 2.5) this.gainExperience(2);
        return moved;
      }
      return this._wanderNear(VILLAGE_POS, 32, 2.0, dt);
    }

    if (lvl === 2) {
      // Learning: replicate observed miracles
      this.autocastTimer -= dt;
      if (this.autocastTimer <= 0 && this.learnedMiracles.size > 0) {
        this.autocastTimer = rand(18, 32);
        const arr = [...this.learnedMiracles];
        const chosen = arr[Math.floor(Math.random() * arr.length)];
        const tgt = this.group.position.clone().add(v3(rand(-10, 10), 0, rand(-10, 10)));
        castMiracleAt(chosen, tgt, false);
        this._pulse(0x88ffaa);
        showMiracleFlash(`Creature: ${chosen}`, '#88ffcc');
        this.gainExperience(7);
      }
      return this._wanderNear(VILLAGE_POS, 24, 2.2, dt);
    }

    // Level 3+: Role-based coordination via SharedMind
    const role = this._role || 'provider';

    // Alert overrides: rush toward threat, signal others
    if (this._alertTimer > 0) {
      this._alertTimer -= dt;
      if (this._alertPos) this._moveTo(this._alertPos, 3.8, dt);
      this._pulse(0xff4400);
      return true;
    }

    // Cooperative miracle casting — avoid duplicating what pack-mates just cast
    this.autocastTimer -= dt;
    if (this.autocastTimer <= 0 && this.learnedMiracles.size > 0) {
      const chosen = this._pickMiracle();
      if (chosen) {
        this.autocastTimer = rand(20, 40);
        const tgt = VILLAGE_POS.clone().add(v3(rand(-14, 14), 0, rand(-14, 14)));
        castMiracleAt(chosen, tgt, false);
        SharedMind.notifyCast(chosen);
        this._pulse(0x44ffff);
        showMiracleFlash(`${role}: ${chosen}`, '#44ffcc');
        this.gainExperience(10);
      }
    }

    // Coordinator: periodically reassigns roles for the whole pack
    if (role === 'coordinator') {
      this._coordTimer -= dt;
      if (this._coordTimer <= 0) {
        SharedMind.assignRoles();
        this._coordTimer = 15;
        // Mentoring boost — pulse teal and boost nearby creatures
        creatures.forEach(c => { if (c !== this) c.gainExperience(5); });
        this._pulse(0x00ffff);
      }
      // Patrol tight circle around village, keeping watch
      const a = this.age * 0.14;
      this.target.set(VILLAGE_POS.x + Math.cos(a) * 14, 0, VILLAGE_POS.z + Math.sin(a) * 14);
      return this._moveTo(this.target, 2.8, dt);
    }

    if (role === 'guardian') {
      // Respond to known threats, patrol perimeter
      const threat = SharedMind.threatLocations[0];
      if (threat) {
        return this._moveTo(threat.pos, 4.0, dt);
      }
      const a = this.age * 0.22;
      const pr = 22 + Math.sin(this.age * 0.08) * 5;
      this.target.set(VILLAGE_POS.x + Math.cos(a) * pr, 0, VILLAGE_POS.z + Math.sin(a) * pr);
      return this._moveTo(this.target, 3.2, dt);
    }

    if (role === 'scout') {
      // Wide exploration; investigate known food for pack
      const knownFood = SharedMind.foodLocations[0];
      if (knownFood && this.group.position.distanceTo(knownFood) > 12) {
        return this._moveTo(knownFood, 3.2, dt);
      }
      this._wanderTimer -= dt;
      if (this.group.position.distanceTo(this.target) < 2.0 || this._wanderTimer <= 0) {
        const a = Math.random() * Math.PI * 2;
        this.target.set(Math.cos(a) * rand(18, 52), 0, Math.sin(a) * rand(18, 52));
        this._wanderTimer = rand(8, 20);
      }
      return this._moveTo(this.target, 3.0 * lerp(0.6, 1.6, 1 - this.traits.laziness), dt);
    }

    // provider: carry log to village if holding one
    if (this._carryLog) {
      if (!this._carryLog.parent) { this._carryLog = null; }
      else {
        this._carryLog.position.copy(this.group.position).add(v3(0, 2.8, 0));
        this._moveTo(VILLAGE_POS, 2.8, dt);
        if (this.group.position.distanceTo(VILLAGE_POS) < 7) {
          scene.remove(this._carryLog);
          this._carryLog.userData.carried = false;
          this._carryLog = null;
          villageLogCount++;
          resWood++; updateResourceUI();
          this.gainExperience(12);
          if (villageLogCount >= 4) { villageLogCount = 0; buildNewVillageHut(); }
        }
        return true;
      }
    }
    // provider: pick up nearby logs (lvl 2+)
    if (this.intelligenceLevel >= 2) {
      const nearLog = this._findNearestLog(28);
      if (nearLog && !nearLog.userData.thrown) {
        this._moveTo(nearLog.position, 2.5, dt);
        if (this.group.position.distanceTo(nearLog.position) < 3.5) {
          this._carryLog = nearLog;
          nearLog.userData.carried = true;
        }
        return true;
      }
    }
    // provider: fell nearby tree for resources (lvl 3+)
    if (this.intelligenceLevel >= 3) {
      if (!this._fellowTree || !this._fellowTree.parent || this._fellowTree.userData.burning)
        this._fellowTree = this._findNearestTree(30);
      if (this._fellowTree) {
        this._moveTo(this._fellowTree.position, 2.5, dt);
        const d = this.group.position.distanceTo(this._fellowTree.position);
        if (d < 4.5) {
          this._fellTimer = (this._fellTimer || 0) + dt;
          this._pulse(0x88ff44);
          if (this._fellTimer > 2.5) {
            this._fellTimer = 0;
            const t = this._fellowTree; this._fellowTree = null;
            felTree(t, true);
            this.gainExperience(15);
          }
        }
        return true;
      }
    }
    // provider (default): hover near village
    return this._wanderNear(VILLAGE_POS, 20, 2.4, dt);
  }

  _updateUI() {
    if (creatures[0] !== this) return;
    const lvlName = this._levelNames[this.intelligenceLevel] || 'Transcendent';
    const levelEl = document.getElementById('creature-level');
    const roleTag = creatures.length > 1 ? ` [${this._role}]` : '';
    if (levelEl) levelEl.textContent = `${lvlName.toUpperCase()} · Gen ${this.generation}${roleTag}`;

    const countEl = document.getElementById('creature-count');
    if (countEl) countEl.textContent = creatures.length > 1 ? `×${creatures.length}` : '';

    const nextXP  = this.xpThresholds[this.intelligenceLevel + 1];
    const prevXP  = this.xpThresholds[this.intelligenceLevel] || 0;
    const pct     = nextXP ? ((this.experience - prevXP) / (nextXP - prevXP) * 100) : 100;
    const iFill   = document.querySelector('#bar-intel .trait-fill');
    if (iFill) iFill.style.width = clamp(pct, 0, 100).toFixed(1) + '%';

    document.querySelector('#bar-friendly .trait-fill').style.width = (this.traits.friendliness * 100).toFixed(1) + '%';
    document.querySelector('#bar-aggress  .trait-fill').style.width = (this.traits.aggression   * 100).toFixed(1) + '%';
    const cFill = document.querySelector('#bar-curious .trait-fill');
    if (cFill) cFill.style.width = ((this.traits.curiosity || 0.5) * 100).toFixed(1) + '%';

    const quirks = [];
    if (this._fearWater)  quirks.push('fears water');
    if (this._traumatized) quirks.push('scarred');
    if (this._loveHeal)   quirks.push('healer');
    const quirkStr = quirks.length ? ` (${quirks.join(', ')})` : '';
    document.getElementById('creature-status').textContent =
      this.learnedMiracles.size > 0
        ? 'Knows: ' + [...this.learnedMiracles].join(', ') + quirkStr
        : (['Discovering…','Watching you…','Learning…','Strategising…','Transcending…'][this.intelligenceLevel]||'Evolving…') + quirkStr;
  }

  applyGLBModel(gltf) {
    while (this.group.children.length) this.group.remove(this.group.children[0]);
    this._eyeMats = []; this._intelligenceAura = null;
    const model = gltf.scene.clone(true);
    model.scale.setScalar(0.062); model.rotation.y = Math.PI;
    model.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
    this.group.add(model);
    this.mixer = new THREE.AnimationMixer(model);
    this._walkClip   = THREE.AnimationClip.findByName(gltf.animations, 'Walk');
    this._surveyClip = THREE.AnimationClip.findByName(gltf.animations, 'Survey');
    this._runClip    = THREE.AnimationClip.findByName(gltf.animations, 'Run');
    if (this._surveyClip) this.mixer.clipAction(this._surveyClip).play();
    this._lastMoving = false; this._hasGLB = true;
    if (this.intelligenceLevel >= 2) this._buildAura();
  }

  _switchAnim(clip) {
    if (!this.mixer || !clip || this._currentClip === clip) return;
    if (this._currentClip) this.mixer.clipAction(this._currentClip).fadeOut(0.25);
    this.mixer.clipAction(clip).reset().fadeIn(0.25).play();
    this._currentClip = clip;
  }

  update(dt) {
    this.age += dt;
    this.gainExperience((0.4 + (this.traits.curiosity || 0.4) * 0.3) * dt);

    const moving = this._doStateBehavior(dt);

    // Flock separation — keep creatures from overlapping
    const sep = this._getSeparationForce();
    this.group.position.addScaledVector(sep, 2 * dt);

    // Transcendent creatures mentor nearby creatures
    if (this.intelligenceLevel >= 4) {
      for (const other of creatures) {
        if (other !== this && this.group.position.distanceTo(other.group.position) < 16)
          other.gainExperience(0.2 * dt);
      }
    }

    // Animation
    if (this._hasGLB && this.mixer) {
      this.mixer.update(dt);
      const isMoving = this.group.position.distanceTo(this.target) > 2.0;
      if (isMoving !== this._lastMoving) {
        this._switchAnim(isMoving ? this._walkClip : this._surveyClip);
        this._lastMoving = isMoving;
      }
    } else if (this._legUpper) {
      if (moving) {
        const phase = this.age * 3.5;
        this._legUpper[0].rotation.x =  Math.sin(phase) * 0.42;
        this._legUpper[1].rotation.x = -Math.sin(phase) * 0.42;
        this._legUpper[2].rotation.x = -Math.sin(phase) * 0.42;
        this._legUpper[3].rotation.x =  Math.sin(phase) * 0.42;
        this.group.position.y += Math.abs(Math.sin(phase * 2)) * 0.08;
      } else {
        this._legUpper.forEach(l => { l.rotation.x = lerp(l.rotation.x, 0, 0.1); });
        this.group.scale.y = 1.0 + Math.sin(this.age * 1.4) * 0.02;
      }
    }

    // Terrain snap
    const h = getTerrainHeight(this.group.position.x, this.group.position.z) + 1.5;
    this.group.position.y = lerp(this.group.position.y, h, 0.12);
    const r2 = Math.sqrt(this.group.position.x ** 2 + this.group.position.z ** 2);
    if (r2 > ISLAND_RADIUS - 8) {
      this.group.position.x *= (ISLAND_RADIUS - 8) / r2;
      this.group.position.z *= (ISLAND_RADIUS - 8) / r2;
    }
    if (r2 > ISLAND_RADIUS - 14) this._fearWater = true;

    this._updateEvolutionVisuals();

    if (this.mat) {
      const f = this.traits.friendliness, e = this.traits.aggression;
      this.mat.color.setRGB(lerp(0.7, 0.95, f), lerp(0.3, 0.72, f * (1 - e)), lerp(0.1, 0.22, f));
      this.mat.emissive.setRGB(e * 0.18, f * 0.04, 0);
    }

    this._updateUI();
  }
}

function spawnCreature(x, z, parentTraits = null) {
  if (creatures.length >= 3) return null;
  const c = new CreatureAgent(x, z, parentTraits);
  creatures.push(c);
  SharedMind.assignRoles();
  spawnBurst(new THREE.Vector3(x, getTerrainHeight(x, z) + 2, z), 0xaaffff, 25, 7, 0.22, 1.8);
  showMiracleFlash(
    parentTraits ? `Gen ${c.generation} Born!` : 'Creature Awakened!',
    '#aaffff'
  );
  return c;
}

// ─── Environment interaction system ──────────────────────────────────────────
function igniteObject(obj) {
  if (!obj || obj.userData.burning) return;
  obj.userData.burning     = true;
  obj.userData.fireTimer   = 0;
  obj.userData.fireMaxTime = rand(6, 11);
  burningObjects.push(obj);
}

function felTree(treeGroup, fromCreature = false) {
  if (!treeGroup || !treeGroup.userData || treeGroup.userData.type !== 'tree') return;
  treeGroup.userData.burning = false;
  const bidx = burningObjects.indexOf(treeGroup);
  if (bidx !== -1) burningObjects.splice(bidx, 1);
  const tidx = trees.indexOf(treeGroup);
  if (tidx !== -1) trees.splice(tidx, 1);

  // Topple animation then remove
  let fallT = 0;
  const fallDir = Math.random() * Math.PI * 2;
  const ud = { ...treeGroup.userData };
  const tick = () => {
    fallT += 0.05;
    treeGroup.rotation.z = Math.sin(fallDir) * Math.min(fallT * 1.4, 1.55);
    treeGroup.rotation.x = Math.cos(fallDir) * Math.min(fallT, 1.0) * 0.6;
    if (fallT < 1.3) requestAnimationFrame(tick);
    else {
      scene.remove(treeGroup);
      placeScorchDecal(new THREE.Vector3(ud.x, 0, ud.z), rand(1.8, 3.8));
      buildStump(ud.x, ud.z, ud.h, ud.treeType, ud.scale || 1.0);
      if (Math.random() < 0.75)
        spawnLog(new THREE.Vector3(ud.x + rand(-2,2), ud.h + 0.5, ud.z + rand(-2,2)));
    }
  };
  requestAnimationFrame(tick);
  if (!fromCreature) changeAlignment(-0.012);
  spawnBurst(treeGroup.position.clone().add(v3(0,2,0)), 0x886644, 10, 4, 0.14, 0.6);
}

function updateFire(dt) {
  for (let i = burningObjects.length - 1; i >= 0; i--) {
    const obj = burningObjects[i];
    if (!obj || !obj.userData || !obj.userData.burning) { burningObjects.splice(i, 1); continue; }
    obj.userData.fireTimer += dt;

    // Fire + smoke particles
    if (Math.random() < 0.5) {
      const bp = obj.position.clone().add(v3(rand(-1.5,1.5), rand(0.5,4.5), rand(-1.5,1.5)));
      particles.push(new Particle(bp, v3(rand(-0.4,0.4), rand(2,7), rand(-0.4,0.4)), 0xff4400, rand(0.3,0.7), 0.13));
    }
    if (Math.random() < 0.2) {
      const bp = obj.position.clone().add(v3(rand(-1,1), rand(1,3), rand(-1,1)));
      particles.push(new Particle(bp, v3(rand(-0.2,0.2), rand(0.8,2.5), rand(-0.2,0.2)), 0x222218, rand(0.5,1.1), 0.20));
    }

    // Spread fire to adjacent trees
    if (obj.userData.fireTimer > 2.0 && Math.random() < 0.004) {
      for (const tree of trees) {
        if (!tree.userData.burning && tree.position.distanceTo(obj.position) < 14) {
          igniteObject(tree);
          SharedMind.notifyThreat(tree.position);
          break;
        }
      }
    }

    if (obj.userData.fireTimer >= obj.userData.fireMaxTime) {
      felTree(obj);
      burningObjects.splice(i, 1);
    }
  }
}

function buildStump(x, z, h, treeType, scale) {
  const mat = new THREE.MeshStandardMaterial({ color: 0x2e1a06, roughness: 0.96, metalness: 0 });
  const stump = new THREE.Mesh(new THREE.CylinderGeometry(0.28*(scale||1), 0.40*(scale||1), 0.55, 7), mat);
  stump.position.set(x, h + 0.28, z);
  stump.userData = { type: 'stump', treeType, scale: scale||1, x, z, h,
                     regrowTimer: 0, regrowMaxTime: rand(50, 90) };
  scene.add(stump);
  stumps.push(stump);
  return stump;
}

function updateStumps(dt) {
  for (let i = stumps.length - 1; i >= 0; i--) {
    const s = stumps[i];
    s.userData.regrowTimer += dt;
    if (s.userData.regrowTimer >= s.userData.regrowMaxTime) {
      const { x, z, h, treeType, scale } = s.userData;
      scene.remove(s); s.geometry.dispose(); s.material.dispose();
      stumps.splice(i, 1);
      const newTree = buildTreeAt(x, z, h, scale * rand(0.88, 1.05), treeType);
      newTree.scale.setScalar(0.05);
      newTree.userData._growing = true;
      spawnBurst(v3(x, h+1.5, z), 0x44ff88, 14, 3, 0.12, 1.0);
    }
  }
}

function placeScorchDecal(pos, radius) {
  const geo = new THREE.CircleGeometry(radius, 10);
  geo.rotateX(-Math.PI / 2);
  const mat = new THREE.MeshBasicMaterial({ color: 0x0e0c05, transparent: true, opacity: 0.60, depthWrite: false });
  const decal = new THREE.Mesh(geo, mat);
  decal.position.set(pos.x, getTerrainHeight(pos.x, pos.z) + 0.06, pos.z);
  decal.userData = { type: 'scorch', life: 100 };
  scene.add(decal);
  scorchDecals.push(decal);
}

function updateScorchDecals(dt) {
  for (let i = scorchDecals.length - 1; i >= 0; i--) {
    const d = scorchDecals[i];
    d.userData.life -= dt;
    d.material.opacity = clamp(d.userData.life / 100 * 0.60, 0, 0.60);
    if (d.userData.life <= 0) {
      scene.remove(d); d.geometry.dispose(); d.material.dispose();
      scorchDecals.splice(i, 1);
    }
  }
}

function updateGrowingTrees(dt) {
  for (const tree of trees) {
    if (!tree.userData._growing) continue;
    tree.scale.multiplyScalar(1 + dt * 0.14);
    if (tree.scale.x >= 1.0) { tree.scale.setScalar(1.0); delete tree.userData._growing; }
  }
}

function buildNewVillageHut() {
  for (let attempt = 0; attempt < 12; attempt++) {
    const angle = Math.random() * Math.PI * 2;
    const r = rand(9, 24);
    const hx = VILLAGE_POS.x + Math.cos(angle) * r;
    const hz = VILLAGE_POS.z + Math.sin(angle) * r;
    const hh = getTerrainHeight(hx, hz);
    if (hh < 0.4 || hh > 13) continue;
    buildHut(hx, hz, hh);
    spawnBurst(v3(hx, hh+3, hz), 0xffcc44, 24, 6, 0.22, 1.8);
    showMiracleFlash('Village Grows!', '#ffcc44');
