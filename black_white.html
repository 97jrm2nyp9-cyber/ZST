    return;
  }
}

function updateEnvironment(dt) {
  updateFire(dt);
  updateStumps(dt);
  updateScorchDecals(dt);
  updateGrowingTrees(dt);
}

// ─── Particles ────────────────────────────────────────────────────────────────
class Particle {
  constructor(pos, vel, color, life, size = 0.3) {
    this.pos  = pos.clone();
    this.vel  = vel.clone();
    this.life = life;
    this.maxLife = life;
    this.size = size;
    const geo = new THREE.SphereGeometry(size, 4, 4);
    const mat = new THREE.MeshStandardMaterial({
      color, emissive: color, emissiveIntensity: 0.6,
      transparent: true, opacity: 1,
    });
    this.mesh = new THREE.Mesh(geo, mat);
    this.mesh.position.copy(pos);
    scene.add(this.mesh);
  }
  update(dt) {
    this.life -= dt;
    this.vel.y -= 4 * dt; // gravity
    this.pos.addScaledVector(this.vel, dt);
    this.mesh.position.copy(this.pos);
    const t = this.life / this.maxLife;
    this.mesh.material.opacity = t;
    this.mesh.scale.setScalar(t * 0.8 + 0.2);
    return this.life > 0;
  }
  dispose() { scene.remove(this.mesh); this.mesh.geometry.dispose(); this.mesh.material.dispose(); }
}

function spawnBurst(pos, color, count = 20, speed = 8, size = 0.25, life = 1.2) {
  for (let i = 0; i < count; i++) {
    const vel = new THREE.Vector3(rand(-1,1), rand(0.5,2), rand(-1,1)).normalize().multiplyScalar(rand(speed*0.4, speed));
    particles.push(new Particle(pos, vel, color, rand(life*0.6, life), size));
  }
}

// ─── Ambient sprites (birds / bats) ──────────────────────────────────────────
function spawnAmbientSprites() {
  for (let i = 0; i < 8; i++) {
    const geo = new THREE.PlaneGeometry(0.8, 0.5);
    const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.7 });
    const m = new THREE.Mesh(geo, mat);
    m.userData.phase = Math.random() * Math.PI * 2;
    m.userData.r = rand(20, 60);
    m.userData.spd = rand(0.4, 0.9);
    m.userData.h = rand(20, 40);
    scene.add(m);
    ambientSprites.push(m);
  }
}

function updateAmbientSprites(t) {
  const goodMode = alignment > 0.25;
  const evilMode = alignment < -0.25;
  if (!goodMode && !evilMode) {
    ambientSprites.forEach(s => { s.visible = false; }); return;
  }
  ambientSprites.forEach((s, i) => {
    s.visible = true;
    const phase = s.userData.phase + t * s.userData.spd;
    s.position.set(
      Math.cos(phase) * s.userData.r,
      s.userData.h + Math.sin(phase * 2) * 3,
      Math.sin(phase) * s.userData.r
    );
    s.rotation.y = phase + Math.PI / 2;
    if (goodMode) s.material.color.setHex(0xfff4cc);
    else          s.material.color.setHex(0x220011);
  });
}

// ─── Prayer system ────────────────────────────────────────────────────────────
function spawnPrayer(villager) {
  if (!villager.alive) return;
  if (activePrayers.some(p=>p.villager===villager)) return;
  const type = villager.hunger>0.7 ? 'food' : villager.fear>0.6 ? 'protect' : 'heal';
  const icons = { food:'🙏🍎', protect:'🙏🛡', heal:'🙏💚' };
  const div = document.createElement('div');
  div.className = 'prayer-bubble';
  div.textContent = icons[type];
  document.body.appendChild(div);
  activePrayers.push({ villager, type, timer: 14, div });
}

function updatePrayers(dt) {
  const rect = renderer.domElement.getBoundingClientRect();
  for (let i=activePrayers.length-1;i>=0;i--) {
    const p = activePrayers[i];
    p.timer -= dt;
    if (p.timer<=0 || !p.villager.alive) { p.div.remove(); activePrayers.splice(i,1); continue; }
    // Project 3D position to screen
    const wp = p.villager.mesh.position.clone().add(v3(0,2.8,0));
    const sv = wp.clone().project(camera);
    const sx = (sv.x*0.5+0.5)*rect.width+rect.left;
    const sy = (-sv.y*0.5+0.5)*rect.height+rect.top;
    const visible = sv.z<1 && sx>0 && sx<window.innerWidth && sy>0 && sy<window.innerHeight;
    if (visible) {
      const bob = Math.sin(clock.getElapsedTime()*2+i)*4;
      p.div.style.left = sx+'px';
      p.div.style.top  = (sy-30+bob)+'px';
      p.div.style.opacity = Math.min(1, p.timer*0.35).toFixed(2);
      p.div.style.display = '';
    } else {
      p.div.style.display = 'none';
    }
  }
}

function checkPrayerAnswers(miracleType, pos) {
  for (let i=activePrayers.length-1;i>=0;i--) {
    const p = activePrayers[i];
    if (!p.villager.alive) continue;
    const dist = p.villager.mesh.position.distanceTo(pos);
    const matches = (p.type==='food'    && miracleType==='food')
                 || (p.type==='heal'    && miracleType==='heal')
                 || (p.type==='protect' && (miracleType==='wood'||miracleType==='fireball'));
    if (matches && dist<28) {
      faithPoints += 28; updateFaithUI();
      changeAlignment(0.05);
      spawnBurst(p.villager.mesh.position.clone().add(v3(0,1.5,0)),0xffee88,22,7,0.2,1.8);
      showMiracleFlash('🙏 Prayer Answered! +Faith','#ffee88');
      p.div.remove(); activePrayers.splice(i,1);
    }
  }
}

function castMiracleAt(type, pos, fromPlayer = true) {
  // ── Combo detection ──────────────────────────────────────────────────────
  if (fromPlayer) {
    const now = performance.now() / 1000;
    const elapsed = now - _lastMiracleTime;
    if (_lastMiracleType && elapsed < COMBO_WINDOW) {
      const key = _lastMiracleType + '+' + type;
      const combo = _COMBOS[key];
      if (combo) {
        _lastMiracleType = null; _lastMiracleTime = -999;
        combo.fn(pos);
        showMiracleFlash('✦ ' + combo.name, combo.color);
        playTone(528,'sine',0.5,0.2); setTimeout(()=>playTone(660,'sine',0.4,0.18),150); setTimeout(()=>playTone(792,'sine',0.3,0.15),300);
        return;
      }
    }
    _lastMiracleType = type;
    _lastMiracleTime = performance.now() / 1000;
  }
  // ── Creature witnessing ──────────────────────────────────────────────────
  if (fromPlayer) {
    creatures.forEach(c => {
      if (c.group.position.distanceTo(pos) < 35) c.witnessEvent(type);
    });
  }
  // Check prayer answers
  if (fromPlayer) checkPrayerAnswers(type, pos);

  if (fromPlayer) {
    miracleCastCount[type] = (miracleCastCount[type] || 0) + 1;
    if (miracleCastCount[type] >= 3) creatures.forEach(c => c.learnMiracle(type));
  }

  if (type === 'fireball') {
    castFireball(pos, fromPlayer);
  } else if (type === 'food') {
    spawnFood(pos);
    if (fromPlayer) changeAlignment(0.05);
    spawnBurst(pos, 0xffcc44, 15, 6, 0.2, 0.8);
    playFood();
    showMiracleFlash('Food', '#ffcc44');
  } else if (type === 'heal') {
    castHeal(pos);
  } else if (type === 'wood') {
    spawnLog(pos);
    if (fromPlayer) changeAlignment(0.03);
    spawnBurst(pos, 0x885522, 12, 5, 0.2, 0.6);
    playWood();
    showMiracleFlash('Wood', '#aa7744');
  }
}

function castFireball(targetPos, fromPlayer) {
  playFireball();
  if (fromPlayer) changeAlignment(-0.12);
  // Damage rival god if targeted near its totem
  if (fromPlayer && rivalGod && !rivalGod.defeated) {
    if (targetPos.distanceTo(RIVAL_POS) < 22) rivalGod.takeDamage(25);
  }
  // Spawn fireball projectile
  const geo = new THREE.SphereGeometry(0.7, 8, 8);
  const mat = new THREE.MeshStandardMaterial({ color: 0xff4400, emissive: 0xff2200, emissiveIntensity: 2.5, roughness: 0.2 });
  const ball = new THREE.Mesh(geo, mat);
  const startPos = worldMouse.clone().add(v3(0, 15, 0));
  ball.position.copy(startPos);
  scene.add(ball);
  const dir = targetPos.clone().sub(startPos).normalize();
  ball.userData.vel   = dir.multiplyScalar(30);
  ball.userData.type  = 'fireball';
  ball.userData.pos   = targetPos;
  projectiles.push(ball);
  showMiracleFlash('Fireball!', '#ff4400');
}

function castHeal(pos) {
  playHeal();
  changeAlignment(0.10);
  spawnBurst(pos, 0x44ff88, 30, 7, 0.2, 1.5);
  creatures.forEach(c => c.remember('healed', pos));
  // Heal nearby villagers
  for (const v of villagers) {
    if (!v.alive) continue;
    if (v.mesh.position.distanceTo(pos) < 18) {
      v.hunger = Math.max(0, v.hunger - 0.6);
      v.fear   = 0;
      spawnBurst(v.mesh.position.clone().add(new THREE.Vector3(0,1,0)), 0x88ffaa, 5, 3, 0.15, 0.6);
    }
  }
  showMiracleFlash('Heal', '#44ff88');
}

// ─── Village buildings ────────────────────────────────────────────────────────
function buildVillageBuildings() {
  const h = getTerrainHeight(VILLAGE_POS.x, VILLAGE_POS.z);

  // Stone well
  const stoneMat = new THREE.MeshStandardMaterial({ color: 0x999080, roughness: 0.82, metalness: 0.02 });
  const well = new THREE.Mesh(new THREE.CylinderGeometry(0.82, 0.9, 1.0, 10), stoneMat);
  well.position.set(VILLAGE_POS.x, h + 0.5, VILLAGE_POS.z - 3.5);
  scene.add(well);
  const crossBar = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 2.1, 6),
    new THREE.MeshStandardMaterial({ color: 0x5c3317, roughness: 0.88, metalness: 0 }));
  crossBar.rotation.z = Math.PI / 2;
  crossBar.position.set(VILLAGE_POS.x, h + 1.85, VILLAGE_POS.z - 3.5);
  scene.add(crossBar);

  // 5 thatched huts in arc
  [-0.95, -0.45, 0.08, 0.58, 1.08].forEach((a, i) => {
    const r  = 11 + (i % 2) * 3.5;
    const hx = VILLAGE_POS.x + Math.cos(a) * r;
    const hz = VILLAGE_POS.z + Math.sin(a) * r;
    buildHut(hx, hz, getTerrainHeight(hx, hz));
  });

  // Campfire near center
  buildCampfire(VILLAGE_POS.x + 4.5, VILLAGE_POS.z + 2.5);

  // Fence posts
  const postMat = new THREE.MeshStandardMaterial({ color: 0x7a5520, roughness: 0.88, metalness: 0 });
  for (let i = 0; i < 18; i++) {
    const fa = (i / 18) * Math.PI * 2;
    const fpx = VILLAGE_POS.x + Math.cos(fa) * 8.8;
    const fpz = VILLAGE_POS.z + Math.sin(fa) * 8.8;
    const fh  = getTerrainHeight(fpx, fpz);
    const post = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, 1.2, 5), postMat);
    post.position.set(fpx, fh + 0.6, fpz);
    scene.add(post);
  }
}

function buildHut(x, z, h) {
  const wallMat = new THREE.MeshStandardMaterial({ color: 0xc8c0ae, map: TEX.stone, roughness: 0.78, metalness: 0.01 });
  const wall = new THREE.Mesh(new THREE.CylinderGeometry(2.0, 2.2, 2.2, 8), wallMat);
  wall.position.set(x, h + 1.1, z);
  wall.castShadow = true; wall.receiveShadow = true;
  scene.add(wall);
  const roofMat = new THREE.MeshStandardMaterial({ color: 0xdcb040, map: TEX.thatch, roughness: 0.90, metalness: 0 });
  const roof = new THREE.Mesh(new THREE.ConeGeometry(2.85, 2.4, 8), roofMat);
  roof.position.set(x, h + 3.4, z);
  roof.rotation.y = Math.random() * 0.4;
  roof.castShadow = true; roof.receiveShadow = true;
  scene.add(roof);
  const doorMat = new THREE.MeshBasicMaterial({ color: 0x2a1a08 });
  const door = new THREE.Mesh(new THREE.PlaneGeometry(0.72, 1.15), doorMat);
  door.position.set(x, h + 0.8, z + 2.15);
  scene.add(door);
}

function buildCampfire(x, z) {
  const h = getTerrainHeight(x, z);
  const logMat = new THREE.MeshStandardMaterial({ color: 0x5c3317, roughness: 0.88, metalness: 0 });
  [-0.38, 0.38].forEach(ox => {
    const log = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 1.1, 6), logMat);
    log.rotation.z = Math.PI / 2;
    log.rotation.y = ox > 0 ? 0.6 : -0.6;
    log.position.set(x + ox*0.3, h + 0.12, z);
    scene.add(log);
  });
  const flameMat = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0xff4400, emissiveIntensity: 2.2, transparent: true, opacity: 0.88 });
  const flame = new THREE.Mesh(new THREE.SphereGeometry(0.36, 7, 7), flameMat);
  flame.scale.y = 1.5;
  flame.position.set(x, h + 0.68, z);
  scene.add(flame);
  window._flames = window._flames || [];
  window._flames.push(flame);
  const fireLight = new THREE.PointLight(0xff6600, 2.8, 14);
  fireLight.position.set(x, h + 1.2, z);
  scene.add(fireLight);
  window._fireLights = window._fireLights || [];
  window._fireLights.push(fireLight);
}

// ─── Clouds ───────────────────────────────────────────────────────────────────
let clouds = [];

function buildClouds() {
  const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.82, roughness: 1.0, metalness: 0 });
  for (let i = 0; i < 14; i++) {
    const grp = new THREE.Group();
    const numPuffs = 4 + Math.floor(Math.random() * 4);
    for (let j = 0; j < numPuffs; j++) {
      const r    = rand(5, 12);
      const puff = new THREE.Mesh(new THREE.SphereGeometry(r, 8, 7), cloudMat);
      puff.position.set(rand(-9, 9), rand(-2, 4), rand(-5, 5));
      puff.scale.y = rand(0.52, 0.72);
      grp.add(puff);
    }
    const angle = Math.random() * Math.PI * 2;
    const dist  = rand(45, 165);
    grp.position.set(Math.cos(angle)*dist, rand(58, 92), Math.sin(angle)*dist);
    grp.userData.speed = rand(0.5, 1.5);
    grp.userData.angle = angle;
    grp.userData.dist  = dist;
    scene.add(grp);
    clouds.push(grp);
  }
}

function updateClouds(dt) {
  for (const c of clouds) {
    c.userData.angle += dt * c.userData.speed * 0.003;
    c.position.x = Math.cos(c.userData.angle) * c.userData.dist;
    c.position.z = Math.sin(c.userData.angle) * c.userData.dist;
  }
}

// ─── Weather system ───────────────────────────────────────────────────────────
function _pickWeatherType() {
  const ev = clamp(-alignment, 0, 1);
  const go = clamp(alignment, 0, 1);
  const w = { clear: 0.3+go*0.3, rain: 0.2+go*0.25, storm: 0.1+ev*0.25, drought: 0.05+ev*0.35 };
  let r = Math.random() * Object.values(w).reduce((a,b)=>a+b,0);
  for (const [t,v] of Object.entries(w)) { r-=v; if(r<=0) return t; }
  return 'clear';
}

function initWeather() {
  const geo = new THREE.BufferGeometry();
  const count = 900;
  const pos = new Float32Array(count * 3);
  for (let i=0;i<count;i++){pos[i*3]=rand(-110,110);pos[i*3+1]=rand(0,65);pos[i*3+2]=rand(-110,110);}
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  const mat = new THREE.PointsMaterial({color:0x99bbff,size:0.22,transparent:true,opacity:0,depthWrite:false});
  window._rainPoints = new THREE.Points(geo, mat);
  scene.add(window._rainPoints);

  const lf = document.createElement('div');
  lf.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:#ddeeff;opacity:0;pointer-events:none;z-index:4;';
  document.body.appendChild(lf);
  window._lightningDiv = lf;
}

function _doLightning() {
  if (!window._lightningDiv) return;
  window._lightningDiv.style.transition='none';
  window._lightningDiv.style.opacity='0.45';
  playTone(55,'sawtooth',0.9,0.28);
  setTimeout(()=>{ window._lightningDiv.style.transition='opacity 0.15s'; window._lightningDiv.style.opacity='0'; },60);
  if (trees.length>0 && Math.random()<0.3) igniteObject(trees[Math.floor(Math.random()*trees.length)]);
  for(const v of villagers){ if(!v.alive) continue; v.fear=Math.min(1,v.fear+0.5); v.state='flee'; }
}

function updateWeather(dt) {
  _weatherTimer += dt;
  if (_weatherTimer >= _weatherNextChange) {
    _weatherTimer = 0; _weatherNextChange = rand(55,200);
    const next = _pickWeatherType();
    if (next !== _weatherType) {
      _weatherType = next;
      const msgs={clear:'Skies clear',rain:'Rain falls…',storm:'Storm rages!',drought:'Drought…'};
      const cols={clear:'#aaccff',rain:'#88aaff',storm:'#cc99ff',drought:'#cc8833'};
      showMiracleFlash(msgs[_weatherType], cols[_weatherType]);
    }
  }
  const targets={clear:0,rain:0.6,storm:1.0,drought:0.15};
  _weatherIntensity = lerp(_weatherIntensity, targets[_weatherType]||0, dt*0.4);

  // Rain points
  if (window._rainPoints) {
    const wet = _weatherType==='rain'||_weatherType==='storm';
    window._rainPoints.visible = wet;
    window._rainPoints.material.opacity = _weatherIntensity*0.55;
    if (wet) {
      const attr = window._rainPoints.geometry.attributes.position;
      const spd = 28 + _weatherIntensity*20;
      for(let i=0;i<attr.count;i++){
        attr.setY(i,attr.getY(i)-spd*dt);
        if(attr.getY(i)<-2){attr.setY(i,rand(40,70));attr.setX(i,rand(-110,110));attr.setZ(i,rand(-110,110));}
      }
      attr.needsUpdate=true;
    }
  }

  // Lightning in storms
  if (_weatherType==='storm') {
    _lightningTimer-=dt;
    if(_lightningTimer<=0){_lightningTimer=rand(3.5,11);_doLightning();}
    if(Math.random()<0.003 && trees.length>0) igniteObject(trees[Math.floor(Math.random()*trees.length)]);
  }

  // Drought: hunger rises faster, food spoils
  if (_weatherType==='drought') {
    for(const v of villagers){if(v.alive) v.hunger=Math.min(1,v.hunger+0.007*dt);}
    for(let i=foodPiles.length-1;i>=0;i--){
      const f=foodPiles[i];
      if(!f.parent){foodPiles.splice(i,1);continue;}
      f.userData.droughtAge=(f.userData.droughtAge||0)+dt;
      if(f.userData.droughtAge>35){scene.remove(f);foodPiles.splice(i,1);}
    }
  }

  // Cloud darkening
  const cloudOpacity={clear:0.82,rain:0.55,storm:0.25,drought:0.70}[_weatherType]||0.82;
  const cloudGray={clear:1.0,rain:0.72,storm:0.42,drought:0.88}[_weatherType]||1.0;
  for(const c of clouds) c.children.forEach(p=>{
    if(p.material){
      p.material.opacity=lerp(p.material.opacity,cloudOpacity,dt*0.25);
      p.material.color.setRGB(cloudGray,cloudGray,cloudGray*1.01);
    }
  });

  // Weather HUD badge
  const badge=document.getElementById('weather-badge');
  if(badge){
    const icons={clear:'',rain:'🌧 Rain',storm:'⛈ Storm',drought:'☀ Drought'};
    badge.textContent=icons[_weatherType]||'';
    badge.style.opacity=_weatherType==='clear'?'0':'1';
  }
}

// ─── Alignment ───────────────────────────────────────────────────────────────
function changeAlignment(delta) {
  alignment = clamp(alignment + delta, -1, 1);
  updateAlignmentUI();
  updateWorldVisuals();
  updateHandColor();
}

function updateAlignmentUI() {
  const pct = ((alignment + 1) / 2 * 100).toFixed(1);
  document.getElementById('align-thumb').style.left = pct + '%';
}

function updateFaithUI() {
  const pct = Math.min(100, (faithPoints / 500) * 100).toFixed(1);
  document.getElementById('faith-fill').style.height = pct + '%';
}

function updateWorldVisuals() {
  // Terrain + grass alignment tints only — sky/lights handled by updateDayNight
  if (terrainMesh) terrainMesh.material.uniforms.uAlignment.value = alignment;
  const t = (alignment + 1) / 2;
  if (window._grassMesh)
    window._grassMesh.material.color.setHSL(lerp(0.07,0.27,t), lerp(0.18,0.65,t), 1.0);
  if (window._skyMesh && window._skyMesh.material.uniforms.uAlign !== undefined)
    window._skyMesh.material.uniforms.uAlign.value = alignment;
}

// ─── Gesture recognition ─────────────────────────────────────────────────────
function initGestureCanvas() {
  gestureCanvas = document.getElementById('gesture-canvas');
  gestureCtx2d  = gestureCanvas.getContext('2d');
  resizeGestureCanvas();
}

function resizeGestureCanvas() {
  gestureCanvas.width  = window.innerWidth;
  gestureCanvas.height = window.innerHeight;
}

function recognizeGesture(path) {
  if (path.length < 8) return null;
  // Normalize path to [0,1]^2
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  path.forEach(p => { minX=Math.min(minX,p.x); maxX=Math.max(maxX,p.x); minY=Math.min(minY,p.y); maxY=Math.max(maxY,p.y); });
  const w = maxX - minX || 1, h = maxY - minY || 1;
  const norm = path.map(p => ({ x: (p.x - minX) / w, y: (p.y - minY) / h }));

  // Circle: start and end are close, path stays near radius from centroid
  const cx = norm.reduce((s,p)=>s+p.x,0)/norm.length;
  const cy = norm.reduce((s,p)=>s+p.y,0)/norm.length;
  const radii = norm.map(p => Math.sqrt((p.x-cx)**2+(p.y-cy)**2));
  const meanR  = radii.reduce((a,b)=>a+b,0)/radii.length;
  const circleScore = 1 - radii.reduce((s,r)=>s+Math.abs(r-meanR),0)/radii.length/meanR;
  const closeEnds = Math.hypot(norm[0].x-norm[norm.length-1].x, norm[0].y-norm[norm.length-1].y) < 0.35;
  if (circleScore > 0.72 && closeEnds && meanR > 0.2) return 'heal';

  // V-shape (fireball): detect sharp turn at the bottom
  const mid = Math.floor(norm.length / 2);
  const startY = norm[0].y, midY = norm[mid].y, endY = norm[norm.length-1].y;
  const midX = norm[mid].x;
  const isVShape = (midY > startY + 0.35) && (midY > endY + 0.35) &&
                   Math.abs(norm[0].x - norm[norm.length-1].x) < 0.5;
  if (isVShape) return 'fireball';

  // Spiral: monotonically increasing angle from centroid
  const angles = norm.map(p => Math.atan2(p.y - cy, p.x - cx));
  let diffs = 0, monotoneCount = 0;
  for (let i = 1; i < angles.length; i++) {
    let d = angles[i] - angles[i-1];
    if (d > Math.PI)  d -= 2*Math.PI;
    if (d < -Math.PI) d += 2*Math.PI;
    diffs += d;
    if (Math.abs(d) < 0.4) monotoneCount++;
  }
  if (Math.abs(diffs) > Math.PI * 2.5 && monotoneCount < norm.length * 0.3) return 'food';

  // Zigzag (wood): multiple left-right direction reversals
  let reversals = 0;
  for (let i = 2; i < norm.length; i++) {
    const d1 = norm[i-1].x - norm[i-2].x;
    const d2 = norm[i].x   - norm[i-1].x;
    if (d1 * d2 < -0.001) reversals++;
  }
  if (reversals >= 3 && w > 0.4 * h) return 'wood';

  return null;
}

function drawGestureTrail() {
  gestureCtx2d.clearRect(0, 0, gestureCanvas.width, gestureCanvas.height);
  if (!gestureActive || gesturePath.length < 2) return;
  gestureCtx2d.beginPath();
  gestureCtx2d.strokeStyle = `rgba(255,255,200,0.85)`;
  gestureCtx2d.lineWidth = 3;
  gestureCtx2d.shadowBlur = 12;
  gestureCtx2d.shadowColor = '#ffffaa';
  gestureCtx2d.moveTo(gesturePath[0].x, gesturePath[0].y);
  for (let i = 1; i < gesturePath.length; i++) {
    gestureCtx2d.lineTo(gesturePath[i].x, gesturePath[i].y);
  }
  gestureCtx2d.stroke();
}

// ─── God-hand picking ─────────────────────────────────────────────────────────
function tryGrab() {
  const pickables = [];
  scene.traverse(obj => {
    if (['villager','food','log','tree','rock'].includes(obj.userData.type)) {
      pickables.push(obj);
    }
  });
  let best = null, bestD = 14;
  for (const obj of pickables) {
    const d = obj.position.distanceTo(worldMouse);
    if (d < bestD) { bestD = d; best = obj; }
  }
  if (best) {
    grabbedObject = best;
    grabOffset.copy(best.position).sub(worldMouse);
    playGrab();
    if (best.userData.type === 'villager' && best.userData.agent) {
      best.userData.agent.state = 'carried';
    }
  }
}

function releaseGrab() {
  if (!grabbedObject) return;
  const throwVel = worldMouse.clone().sub(prevWorldMouse).multiplyScalar(15);
  throwVel.y = Math.max(throwVel.y, 5);
  grabbedObject.userData.vel = throwVel;
  grabbedObject.userData.thrown = true;
  grabbedObject.userData.throwTimer = 0;
  playThrow();

  if (grabbedObject.userData.type === 'villager' && grabbedObject.userData.agent) {
    grabbedObject.userData.agent.state = 'wander';
    grabbedObject.userData.agent.timer = rand(2, 4);
  }
  grabbedObject = null;
}

// ─── Projectile update ────────────────────────────────────────────────────────
function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.userData.vel.y -= 12 * dt;
    p.position.addScaledVector(p.userData.vel, dt);

    // Spin
    p.rotation.x += dt * 3; p.rotation.y += dt * 2;

    // Sparks trail
    if (Math.random() < 0.4) {
      const sp = new Particle(p.position.clone(), v3(rand(-2,2), rand(0,3), rand(-2,2)), 0xff6600, 0.3, 0.12);
      particles.push(sp);
    }

    const h = getTerrainHeight(p.position.x, p.position.z);
    const hitGround = p.position.y <= h + 0.5;
    const hitWater  = p.position.y <= SEA_LEVEL && Math.sqrt(p.position.x**2 + p.position.z**2) > ISLAND_RADIUS * 0.85;
    if (hitGround || hitWater) {
      spawnBurst(p.position, 0xff4400, 40, 12, 0.3, 1.8);
      spawnBurst(p.position, 0xffcc00, 20, 8, 0.18, 1.0);
      // Scare/damage nearby villagers
      for (const vill of villagers) {
        if (!vill.alive) continue;
        const d = vill.mesh.position.distanceTo(p.position);
        if (d < 8) {
          vill.fear = 1;
          vill.state = 'flee';
          if (d < 3 && vill.alive) {
            vill.alive = false;
            vill.mesh.visible = false;
            changeAlignment(-0.05);
          }
        }
      }
      creatures.forEach(c => c.remember('fireball_hit', p.position));
      // Ignite nearby trees
      for (const tree of trees) {
        if (tree.position.distanceTo(p.position) < 11) igniteObject(tree);
      }
      scene.remove(p); p.geometry.dispose(); p.material.dispose();
      projectiles.splice(i, 1);
    }
  }
}

// ─── Thrown-object physics ───────────────────────────────────────────────────
function updateThrownObjects(dt) {
  scene.traverse(obj => {
    if (!obj.userData.thrown) return;
    obj.userData.throwTimer = (obj.userData.throwTimer || 0) + dt;
    obj.userData.vel = obj.userData.vel || new THREE.Vector3();
    obj.userData.vel.y -= 18 * dt;
    obj.position.addScaledVector(obj.userData.vel, dt);

    const h = getTerrainHeight(obj.position.x, obj.position.z);
    if (obj.position.y <= h + 0.5) {
      obj.position.y = h + 0.5;
      obj.userData.vel.multiplyScalar(0.3);
      obj.userData.vel.y = 0;
      if (obj.userData.vel.length() < 0.5) {
        obj.userData.thrown = false;
        obj.userData.vel = new THREE.Vector3();
      }
      if (obj.userData.type === 'villager') { spawnBurst(obj.position, 0xaabbcc, 5, 3, 0.1, 0.3); }
      if (obj.userData.type === 'rock' && obj.position.distanceTo(VILLAGE_POS) < 22) {
        resStone = Math.min(resStone+1, 999);
        updateResourceUI();
      }
    }

    // Villager thrown off island → alignment penalty
    const r = Math.sqrt(obj.position.x**2 + obj.position.z**2);
    if (r > ISLAND_RADIUS + 5 && obj.userData.type === 'villager' && !obj.userData.lostAtSea) {
      obj.userData.lostAtSea = true;
      changeAlignment(-0.15);
      setTimeout(() => { scene.remove(obj); }, 3000);
    }
  });
}

// ─── Faith accumulation ───────────────────────────────────────────────────────
function updateFaith(dt) {
  const alive = villagers.filter(v => v.alive);
  if (alive.length === 0) return;
  const avgHappiness = alive.reduce((s, v) => s + (1 - v.hunger), 0) / alive.length;
  faithPoints += avgHappiness * 2 * dt;
  influenceRadius = clamp(INFLUENCE_BASE + faithPoints * 0.08, INFLUENCE_BASE, INFLUENCE_MAX);
  updateInfluenceRing();
  updateFaithUI();

  // Spawn offspring as faith grows — children inherit parent traits with mutation
  if (faithPoints >= 180 && creatures.length < 2) {
    const a = Math.random() * Math.PI * 2;
    spawnCreature(
      VILLAGE_POS.x + Math.cos(a) * 22,
      VILLAGE_POS.z + Math.sin(a) * 22,
      creatures[0] ? creatures[0].traits : null
    );
  }
  if (faithPoints >= 400 && creatures.length < 3) {
    const a = Math.random() * Math.PI * 2;
    spawnCreature(
      VILLAGE_POS.x + Math.cos(a) * 26,
      VILLAGE_POS.z + Math.sin(a) * 26,
      creatures[0] ? creatures[0].traits : null
    );
  }
}

// ─── Miracle flash ────────────────────────────────────────────────────────────
function showMiracleFlash(text, color) {
  const el = document.getElementById('miracle-flash');
  el.textContent = text;
  el.style.color = color;
  el.style.textShadow = `0 0 20px ${color}`;
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 1400);
}

// ─── Raycasting ───────────────────────────────────────────────────────────────
const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

// ─── Shared pointer→world helper (works for mouse & touch) ───────────────────
function updateWorldFromClient(clientX, clientY) {
  prevWorldMouse.copy(worldMouse);
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.set(
    ((clientX - rect.left) / rect.width)  *  2 - 1,
    ((clientY - rect.top)  / rect.height) * -2 + 1
  );
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObject(terrainMesh, false);
  if (hits.length > 0) {
    worldMouse.copy(hits[0].point);
  } else {
    const t = new THREE.Vector3();
    raycaster.ray.intersectPlane(groundPlane, t);
    if (t) worldMouse.copy(t);
  }
  worldMouse.y = Math.max(worldMouse.y, getTerrainHeight(worldMouse.x, worldMouse.z));
}

// ─── Input handlers ───────────────────────────────────────────────────────────
function initInput() {
  const canvas = renderer.domElement;

  // ── Mouse ──────────────────────────────────────────────────────────────────
  canvas.addEventListener('mousemove', e => {
    const dx = e.clientX - _camLastX;
    const dy = e.clientY - _camLastY;
    _camLastX = e.clientX; _camLastY = e.clientY;

    if (_orbitActive) {
      camTheta -= dx * 0.007;
      camPhi    = clamp(camPhi - dy * 0.006, 0.08, 1.45);
      updateCam();
      return;
    }
    if (_panActive) {
      const fwd = new THREE.Vector3(); camera.getWorldDirection(fwd);
      fwd.y = 0; if (fwd.lengthSq() < 0.001) fwd.set(0, 0, -1); fwd.normalize();
      const right = new THREE.Vector3().crossVectors(fwd, new THREE.Vector3(0,1,0)).normalize();
      const scale = camDist * 0.00065;
      camTarget.addScaledVector(right, -dx * scale);
      camTarget.addScaledVector(fwd,    dy * scale);
      camTarget.x = clamp(camTarget.x, -ISLAND_RADIUS, ISLAND_RADIUS);
      camTarget.z = clamp(camTarget.z, -ISLAND_RADIUS, ISLAND_RADIUS);
      updateCam();
      return;
    }

    updateWorldFromClient(e.clientX, e.clientY);
    if (grabbedObject) grabbedObject.position.copy(worldMouse).add(new THREE.Vector3(0, 2, 0));
    if (gestureActive) gesturePath.push({ x: e.clientX, y: e.clientY });
    if (godHand) godHand.position.set(worldMouse.x, worldMouse.y + 3.5, worldMouse.z);
  });

  canvas.addEventListener('mousedown', e => {
    e.preventDefault();
    _camLastX = e.clientX; _camLastY = e.clientY;
    if (e.button === 1) { _orbitActive = true; }
    else if (e.button === 0 && e.shiftKey) { _panActive = true; }
    else if (e.button === 0) tryGrab();
    else if (e.button === 2) { gestureActive = true; gesturePath = [{ x: e.clientX, y: e.clientY }]; }
  });

  canvas.addEventListener('mouseup', e => {
    e.preventDefault();
    if (e.button === 1) { _orbitActive = false; }
    else if (e.button === 0 && _panActive) { _panActive = false; }
    else if (e.button === 0) { releaseGrab(); }
    else if (e.button === 2) { finishGesture(); }
  });

  canvas.addEventListener('contextmenu', e => e.preventDefault());

  // ── Touch ──────────────────────────────────────────────────────────────────
  let drawMode = false;
  const drawBtn = document.getElementById('draw-btn');
  drawBtn.addEventListener('touchstart', e => {
    e.stopPropagation(); e.preventDefault();
    drawMode = true; drawBtn.classList.add('active');
  }, { passive: false });
  drawBtn.addEventListener('touchend', e => {
    e.stopPropagation(); e.preventDefault();
    drawMode = false; drawBtn.classList.remove('active');
    finishGesture();
  }, { passive: false });

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (e.touches.length === 1) {
      const t = e.touches[0];
      updateWorldFromClient(t.clientX, t.clientY);
      if (godHand) godHand.position.set(worldMouse.x, worldMouse.y + 3.5, worldMouse.z);
      if (drawMode) {
        gestureActive = true;
        gesturePath = [{ x: t.clientX, y: t.clientY }];
      } else {
        tryGrab();
      }
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1) {
      const t = e.touches[0];
      updateWorldFromClient(t.clientX, t.clientY);
      if (godHand) godHand.position.set(worldMouse.x, worldMouse.y + 3.5, worldMouse.z);
      if (grabbedObject) grabbedObject.position.copy(worldMouse).add(new THREE.Vector3(0, 2, 0));
      if (gestureActive) gesturePath.push({ x: t.clientX, y: t.clientY });
    }
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    if (!drawMode) releaseGrab();
  }, { passive: false });

  // ── On-screen miracle buttons ──────────────────────────────────────────────
  function miracleBtn(id, type) {
    const el = document.getElementById(id);
    ['touchstart','mousedown'].forEach(ev => {
      el.addEventListener(ev, e => {
        e.stopPropagation(); e.preventDefault();
        castMiracleAt(type, worldMouse.clone(), true);
      }, { passive: false });
    });
  }
  miracleBtn('mbtn-fireball', 'fireball');
  miracleBtn('mbtn-food',     'food');
  miracleBtn('mbtn-heal',     'heal');
  miracleBtn('mbtn-wood',     'wood');

  // ── Creature buttons ────────────────────────────────────────────────────────
  function creatureAction(id, fn) {
    const el = document.getElementById(id);
    ['touchstart','mousedown'].forEach(ev => {
      el.addEventListener(ev, e => {
        e.stopPropagation(); e.preventDefault();
        if (creatures.length > 0) fn();
        else showMiracleFlash('No creature yet', '#aaa');
      }, { passive: false });
    });
  }
  creatureAction('btn-reward', () => { if (creatures[0]) creatures[0].reward(); });
  creatureAction('btn-punish', () => { if (creatures[0]) creatures[0].punish(); });

  // ── Keyboard (desktop) ─────────────────────────────────────────────────────
  window.addEventListener('keydown', e => {
    const key = e.key.toLowerCase();
    if (key === '1') castMiracleAt('fireball', worldMouse.clone(), true);
    if (key === '2') castMiracleAt('food',     worldMouse.clone(), true);
    if (key === '3') castMiracleAt('heal',     worldMouse.clone(), true);
    if (key === '4') castMiracleAt('wood',     worldMouse.clone(), true);
    if ((key === 'r' || key === 'p') && creatures.length > 0) {
      if (key === 'r') creatures[0].reward(); else creatures[0].punish();
    }
  });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    if (composer) composer.setSize(window.innerWidth, window.innerHeight);
    if (window.updateCam) window.updateCam();
    resizeGestureCanvas();
  });
}

function finishGesture() {
  gestureActive = false;
  gestureCtx2d.clearRect(0, 0, gestureCanvas.width, gestureCanvas.height);
  const type = recognizeGesture(gesturePath);
  if (type) castMiracleAt(type, worldMouse.clone(), true);
  else if (gesturePath.length > 5) showMiracleFlash('?', '#999');
  gesturePath = [];
}

// ─── GLB model loading ───────────────────────────────────────────────────────
function loadModels() {
  if (typeof THREE.GLTFLoader === 'undefined') { console.warn('GLTFLoader not available'); return; }
  const loader = new THREE.GLTFLoader();

  loader.load('./assets/creature.glb',
    gltf => { creatures.forEach(c => c.applyGLBModel(gltf)); },
    null,
    err  => console.warn('Creature GLB failed:', err)
  );

  loader.load('./assets/villager.glb',
    gltf => { for (const v of villagers) v.applyGLBModel(gltf); },
    null,
    err  => console.warn('Villager GLB failed:', err)
  );
}

// ─── Scene setup ─────────────────────────────────────────────────────────────
function initScene() {
  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.05;
  renderer.physicallyCorrectLights = true;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0.42, 0.62, 0.88);
  scene.fog = new THREE.FogExp2(0xb8d4f0, 0.0016);

  camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.3, 800);
  camTarget = new THREE.Vector3(0, 0, 0);

  function updateCam() {
    const cp = Math.cos(camPhi), sp = Math.sin(camPhi);
    const ct = Math.cos(camTheta), st = Math.sin(camTheta);
    camera.position.set(
      camTarget.x + camDist * cp * st,
      camTarget.y + camDist * sp,
      camTarget.z + camDist * cp * ct
    );
    camera.lookAt(camTarget);
  }
  window.updateCam = updateCam;  // expose so resize handler can call it
  updateCam();

  // Scroll wheel zoom (desktop)
  renderer.domElement.addEventListener('wheel', e => {
    camDist = clamp(camDist * (1 + e.deltaY * 0.001), 10, 240);
    updateCam();
  }, { passive: true });

  // Two-finger pinch-to-zoom + two-finger drag to orbit (mobile)
  let _pinch0 = 0, _pinch0X = 0, _pinch0Y = 0;
  window.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      _pinch0 = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      _pinch0X = (e.touches[0].clientX + e.touches[1].clientX) * 0.5;
      _pinch0Y = (e.touches[0].clientY + e.touches[1].clientY) * 0.5;
    }
  }, { passive: true });
  window.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      const mx = (e.touches[0].clientX + e.touches[1].clientX) * 0.5;
      const my = (e.touches[0].clientY + e.touches[1].clientY) * 0.5;
      const d  = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      camDist = clamp(camDist * (_pinch0 / Math.max(d, 1)), 10, 240);
      const dx = mx - _pinch0X, dy = my - _pinch0Y;
      camTheta -= dx * 0.008;
      camPhi    = clamp(camPhi - dy * 0.006, 0.08, 1.45);
      _pinch0 = d; _pinch0X = mx; _pinch0Y = my;
      updateCam();
    }
  }, { passive: true });

  // Sky dome — gradient shader rendered from inside
  const skyGeo = new THREE.SphereGeometry(480, 32, 16);
  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {
      uTop:    { value: new THREE.Color(0.12,0.28,0.72) },
      uMid:    { value: new THREE.Color(0.52,0.72,0.98) },
      uBot:    { value: new THREE.Color(0.72,0.86,0.98) },
      uSunDir: { value: new THREE.Vector3(0.55, 0.85, 0.3).normalize() },
      uAlign:  { value: 0.0 },
    },
    vertexShader: 'varying vec3 vPos; void main(){ vPos=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }',
    fragmentShader: [
      'precision highp float;',
      'uniform vec3  uTop, uMid, uBot, uSunDir;',
      'uniform float uAlign;',
      'varying vec3  vPos;',
      'void main(){',
      '  float ty = clamp(vPos.y / 380.0, 0.0, 1.0);',
      '  vec3  col = mix(uBot, mix(uMid, uTop, ty*ty), ty);',
      // Atmospheric haze thickens near horizon
      '  float haze = pow(1.0 - ty, 4.0) * 0.22;',
      '  col = mix(col, vec3(0.78,0.90,1.0), haze);',
      // Sun
      '  vec3  dir  = normalize(vPos);',
      '  float sun  = max(0.0, dot(dir, normalize(uSunDir)));',
      '  float disc = smoothstep(0.9985,0.9998,sun);',
      '  float halo = pow(sun,18.0)*0.55;',
      '  float atm  = pow(sun,4.5)*0.12;',
      '  col += vec3(1.0,0.97,0.76)*disc + vec3(1.0,0.74,0.28)*halo + vec3(1.0,0.50,0.15)*atm;',
      // Evil tint → purple/red sky
      '  float evil = clamp(-uAlign, 0.0, 1.0);',
      '  col = mix(col, col * vec3(0.6, 0.3, 0.5) + vec3(0.05,0.0,0.08), evil * 0.65);',
      '  gl_FragColor = vec4(col, 1.0);',
      '}'
    ].join('\n'),
  });
  window._skyMat = skyMat;
  window._skyMesh = new THREE.Mesh(skyGeo, skyMat);
  scene.add(window._skyMesh);

  // Lights
  const sun = new THREE.DirectionalLight(0xfff5e0, 3.5);
  sun.position.set(80, 130, 60);
  sun.castShadow = true;
  sun.shadow.mapSize.set(4096, 4096);
  sun.shadow.camera.near   = 2;
  sun.shadow.camera.far    = 420;
  sun.shadow.camera.left   = sun.shadow.camera.bottom = -135;
  sun.shadow.camera.right  = sun.shadow.camera.top    =  135;
  sun.shadow.bias           = -0.0003;
  scene.add(sun);
  window._sun = sun;

  const ambient = new THREE.AmbientLight(0x4466aa, 0.4);
  scene.add(ambient);
  window._ambient = ambient;

  const hemi = new THREE.HemisphereLight(0x8ec8f8, 0x4a7830, 1.3);
  scene.add(hemi);
  window._hemi = hemi;

  // Soft fill from opposite direction (sky bounce / ambient occlusion simulation)
  const fill = new THREE.DirectionalLight(0x8ac8f8, 0.85);
  fill.position.set(-60, 40, -80);
  scene.add(fill);

  // ── Bloom post-processing ─────────────────────────────────────────────────
  composer = null;
  try {
    const rt = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight, {
      minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter,
    });
    composer = new THREE.EffectComposer(renderer, rt);
    composer.addPass(new THREE.RenderPass(scene, camera));
    // SSAO — skip on mobile to avoid doubling draw calls
    const _isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent) || window.innerWidth < 900;
    if (!_isMobile && typeof THREE.SSAOPass !== 'undefined') {
      try {
        const ssao = new THREE.SSAOPass(scene, camera, window.innerWidth, window.innerHeight);
        ssao.kernelRadius = 10;
        ssao.minDistance  = 0.003;
        ssao.maxDistance  = 0.07;
        composer.addPass(ssao);
        window._ssaoPass = ssao;
      } catch(e) { console.warn('SSAO unavailable:', e.message); }
    }
    const bloom = new THREE.UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      0.45,  // strength
      0.5,   // radius
      0.62   // threshold — catch more emissive surfaces
    );
    composer.addPass(bloom);
    window._bloomPass = bloom;
    const copy = new THREE.ShaderPass(THREE.CopyShader);
    copy.renderToScreen = true;
    composer.addPass(copy);
  } catch (e) {
    console.warn('Bloom unavailable:', e.message);
    composer = null;
  }
}

// ─── Day / Night cycle ────────────────────────────────────────────────────────
function updateDayNight(dt) {
  sunAngle += dt * (Math.PI * 2) / 200; // ~3.3-minute day
  if (sunAngle > Math.PI * 2) sunAngle -= Math.PI * 2;

  // sunH: +1=noon, -1=midnight; horizT: peak at sunrise/sunset
  const sunH   = Math.sin(sunAngle - Math.PI * 0.5);
  const horizT = clamp(1.0 - Math.abs(sunH) * 2.8, 0, 1);
  _daylight    = clamp(sunH * 1.4 + 0.5, 0.05, 1.0);

  // Sun position orbits overhead
  const sunX = Math.cos(sunAngle) * 130;
  const sunY = Math.max(8, sunH * 130);
  const sunZ = Math.sin(sunAngle * 0.5 + 0.4) * 70 + 50;

  if (window._sun) {
    window._sun.position.set(sunX, sunY, sunZ);
    window._sun.intensity = Math.max(0.0, sunH) * 3.4;
    // Warm noon → orange sunset → off at night
    window._sun.color.setRGB(
      lerp(0.35, 1.0, _daylight) + horizT * 0.55,
      lerp(0.12, 0.94, _daylight) + horizT * 0.10,
      lerp(0.10, 0.80, _daylight) - horizT * 0.45
    );
    window._sun.shadow.needsUpdate = true;
  }
  if (window._ambient) {
    window._ambient.intensity = lerp(0.10, 0.40, _daylight);
    window._ambient.color.setRGB(lerp(0.08,0.38,_daylight), lerp(0.12,0.52,_daylight), lerp(0.28,0.72,_daylight));
  }
  if (window._hemi) window._hemi.intensity = lerp(0.12, 1.10, _daylight);

  const aT = (alignment + 1) / 2; // alignment: 0=evil 1=good

  // Sky colours: blend night → day → sunset, then alignment tint
  const topDay  = new THREE.Color(0.12 * aT, 0.28 * aT, 0.72);
  const topNight= new THREE.Color(0.01, 0.02, 0.12);
  const topDusk = new THREE.Color(0.18, 0.08, 0.30);
  const botDay  = new THREE.Color(0.46, 0.68 * aT, 0.96);
  const botNight= new THREE.Color(0.02, 0.04, 0.18);
  const botDusk = new THREE.Color(0.80, 0.36, 0.10);

  const skyTop = topNight.clone().lerp(topDay, _daylight).lerp(topDusk, horizT * 0.65);
  const skyBot = botNight.clone().lerp(botDay, _daylight).lerp(botDusk, horizT * 0.80);

  // Evil alignment → purple tint
  if (alignment < -0.25) {
    const e = clamp((-alignment - 0.25) / 0.75, 0, 1);
    skyTop.lerp(new THREE.Color(0.22, 0.04, 0.28), e * 0.6);
    skyBot.lerp(new THREE.Color(0.35, 0.08, 0.22), e * 0.5);
  }

  if (window._skyMesh) {
    const u = window._skyMesh.material.uniforms;
    u.uTop.value.copy(skyTop);
    if (u.uMid) u.uMid.value.lerpColors(skyBot, skyTop, 0.35);
    u.uBot.value.copy(skyBot);
    u.uSunDir.value.set(sunX, sunY, sunZ).normalize();
    if (u.uAlign) u.uAlign.value = alignment;
  }
  scene.background = skyBot;
  scene.fog.color.copy(skyBot);
}

// ─── Civilization ─────────────────────────────────────────────────────────────
function updateCivilization(dt) {
  gameTime += dt;

  // Check era advancement
  const love    = (alignment + 1) / 2;
  const avgLvl  = creatures.length > 0
    ? creatures.reduce((s, c) => s + c.intelligenceLevel, 0) / creatures.length : 0;

  let newEra = 0;
  for (let i = ERAS.length - 1; i >= 0; i--) {
    const e = ERAS[i];
    if (gameTime >= e.minTime && love >= e.minLove && avgLvl >= e.minLevel) {
      newEra = i; break;
    }
  }
  if (newEra > civilizationEra) {
    civilizationEra = newEra;
    showMiracleFlash(`Era: ${ERAS[newEra].name}!`, '#ffdd88');
    spawnBurst(VILLAGE_POS.clone().add(v3(0, 6, 0)), 0xffdd44, 50, 10, 0.28, 3.0);
    playTone(220, 'triangle', 1.2, 0.22);
    playTone(330, 'triangle', 0.8, 0.18);
  }

  // Update HUD
  const eraEl = document.getElementById('civ-era');
  const timeEl = document.getElementById('civ-time');
  if (eraEl) eraEl.textContent = ERAS[civilizationEra].name.toUpperCase();
  if (timeEl) {
    const day  = Math.floor(gameTime / 200) + 1;
    const h    = Math.sin(sunAngle - Math.PI * 0.5);
    const phase= h > 0.6 ? 'Noon' : h > 0.2 ? 'Afternoon' : h > -0.1 ? 'Dusk'
               : h > -0.5 ? 'Night' : h > -0.8 ? 'Dawn' : 'Dawn';
    timeEl.textContent = `Day ${day} · ${phase}`;
  }

  // Creature autonomous building
  nextBuildTimer -= dt;
  if (nextBuildTimer <= 0) {
    nextBuildTimer = rand(25, 55);
    if (creatures.length > 0 && alignment > -0.2) considerBuilding();
  }
}

function tooCloseToBuilding(x, z, minDist) {
  if (Math.hypot(x - VILLAGE_POS.x, z - VILLAGE_POS.z) < minDist * 0.7) return true;
  return eraBuildings.some(b => Math.hypot(b.x - x, b.z - z) < minDist);
}

function considerBuilding() {
  const maxPerEra = [2, 4, 6, 8, 10, 14];
  if (eraBuildings.length >= (maxPerEra[civilizationEra] || 14)) return;

  // Pool of available structure types per era
  const pool = [];
  if (civilizationEra >= 0) pool.push('stoneCircle', 'stoneCircle');
  if (civilizationEra >= 1) pool.push('totemPole', 'palisade');
  if (civilizationEra >= 2) pool.push('well', 'farm', 'granary');
  if (civilizationEra >= 3) pool.push('pyramid', 'obelisk', 'stoneHead');
  if (civilizationEra >= 4) pool.push('temple', 'handMonument');
  if (civilizationEra >= 5) pool.push('observatory', 'grandTower');

  const type = pool[Math.floor(Math.random() * pool.length)];

  for (let attempt = 0; attempt < 20; attempt++) {
    const r = rand(16, 45 + civilizationEra * 8);
    const a = Math.random() * Math.PI * 2;
    const x = VILLAGE_POS.x + Math.cos(a) * r;
    const z = VILLAGE_POS.z + Math.sin(a) * r;
    const h = getTerrainHeight(x, z);
    if (h < 0.6 || h > 14 || tooCloseToBuilding(x, z, 14)) continue;
    eraBuildings.push({ type, x, z });
    scheduleConstruction(type, x, z, h);
    return;
  }
}

// ─── Voxel structure definitions ──────────────────────────────────────────────
function _voxStoneCircle(x, z, h) {
  const blks = [], n=12, r=rand(6,9);
  for (let i=0;i<n;i++) {
    const a=(i/n)*Math.PI*2, cx=x+Math.cos(a)*r, cz=z+Math.sin(a)*r;
    const ch=getTerrainHeight(cx,cz);
    const ht=Math.floor(rand(2,4));
    for (let y=0;y<ht;y++) blks.push([cx,ch+y*1.1+0.5,cz,'cobble',rand(0.8,1.1),1.1,rand(0.7,1.0)]);
    // Lintels every other stone
    if (i%2===0) {
      const la=(i+0.5)/n*Math.PI*2;
      const lx=x+Math.cos(la)*r, lz=z+Math.sin(la)*r;
      blks.push([lx,ch+ht*1.1+0.3,lz,'stone',2.5,0.45,0.7]);
    }
  }
  return blks;
}

function _voxTotemPole(x, z, h) {
  const blks=[];
  const H=12;
  for(let y=0;y<H;y++) blks.push([x,h+y*0.95+0.5,z,'wood',1.0,0.95,1.0]);
  [1.8,4.2,7.0,9.8].forEach((fy,i)=>{
    blks.push([x,h+fy+0.5,z+0.65,'plank',1.8,1.4,0.6]);
    if(i%2===0) blks.push([x,h+fy+0.9,z,'plank',3.2,0.5,0.5]);
  });
  return blks;
}

function _voxPalisade(x, z, h) {
  const blks=[], len=Math.floor(rand(10,18)), posts=Math.floor(len/1.5);
  for(let i=0;i<posts;i++){
    const px=x+(i-posts/2)*1.5, ph=getTerrainHeight(px,z);
    const ht=Math.floor(rand(3,5));
    for(let y=0;y<ht;y++) blks.push([px,ph+y*0.95+0.5,z,'wood',0.7,0.95,0.7]);
    // Pointed top
    blks.push([px,ph+ht*0.95+0.55,z,'wood',0.45,0.7,0.45]);
  }
  return blks;
}

function _voxWell(x, z, h) {
  const blks=[];
  for(let i=0;i<8;i++){
    const a=i/8*Math.PI*2, wx=x+Math.cos(a)*1.3, wz=z+Math.sin(a)*1.3;
    blks.push([wx,h+0.55,wz,'stone',0.7,1.1,0.7]);
    blks.push([wx,h+1.65,wz,'stone',0.7,1.1,0.7]);
  }
  blks.push([x,h+0.1,z,'cobble',2.8,0.2,2.8]); // base
  blks.push([x-1.2,h+2.7,z,'wood',0.2,2.8,0.2]);
  blks.push([x+1.2,h+2.7,z,'wood',0.2,2.8,0.2]);
  blks.push([x,h+3.5,z,'wood',2.8,0.2,0.2]);
  return blks;
}

function _voxFarm(x, z, h) {
  const blks=[];
  // Tilled soil rows (flat brown blocks)
  for(let row=-3;row<=3;row++) for(let col=-4;col<=4;col++)
    blks.push([x+col*1.1, h+0.1, z+row*1.2, 'sandstone', 1.0, 0.2, 1.0]);
  // Crop rows
  for(let row=-3;row<=3;row++) for(let col=-4;col<=4;col+=2)
    blks.push([x+col*1.1+0.5, h+0.55, z+row*1.2, 'plank', 0.25, rand(0.5,1.0), 0.25]);
  return blks;
}

function _voxGranary(x, z, h) {
  const blks=[], W=4, D=3, Hb=5;
  for(let y=0;y<Hb;y++) for(const [dx,dz] of [[-W,D],[W,D],[-W,-D],[W,-D],[-W,0],[W,0],[0,D],[0,-D]])
    blks.push([x+dx*0.5,h+y+0.5,z+dz*0.5,'brick',1.0,1.0,1.0]);
  // Roof (inverted pyramid of thatch)
  for(let r=0;r<3;r++) for(let col=-3+r;col<=3-r;col++) for(const dz2 of [-2+r,2-r])
    blks.push([x+col,h+Hb+r+0.5,z+dz2,'thatch',1.0,1.0,1.0]);
  return blks;
}

function _voxPyramid(x, z, h) {
  const blks=[], levels=7, bs=2.2;
  const mat = alignment > 0.2 ? 'sandstone' : 'cobble';
  for(let L=0;L<levels;L++){
    const size=levels-L;
    for(let dx=-size;dx<=size;dx++) for(let dz=-size;dz<=size;dz++)
      blks.push([x+dx*bs*0.8,h+L*bs*0.9+bs*0.45,z+dz*bs*0.8,mat,bs*0.8,bs*0.9,bs*0.8]);
  }
  blks.push([x,h+levels*bs*0.9+0.6,z,'gold',1.8,1.8,1.8]);
  return blks;
}

function _voxObelisk(x, z, h) {
  const blks=[];
  blks.push([x,h+0.6,z,'marble',2.4,1.2,2.4]);
  for(let y=1;y<16;y++){
    const taper=lerp(0.85,0.35,y/15);
    blks.push([x,h+y*1.1+0.55,z,'marble',taper,1.1,taper]);
  }
  blks.push([x,h+17.5,z,'gold',0.7,1.8,0.7]);
  return blks;
}

function _voxStoneHead(x, z, h) {
  const blks=[];
  // Base/neck
  for(let y=0;y<4;y++) blks.push([x,h+y*1.1+0.55,z,'stone',2.5-y*0.2,1.1,2.5-y*0.2]);
  // Head
  for(let dy=-1;dy<=1;dy++) for(let dx=-2;dx<=2;dx++) for(let dz=-2;dz<=2;dz++)
    if(dx*dx+dy*dy+dz*dz<=7) blks.push([x+dx*0.9,h+4.5+dy*0.9,z+dz*0.9,'stone',0.9,0.9,0.9]);
  // Eyes (emissive)
  blks.push([x-0.85,h+4.9,z+1.8,'crystal',0.55,0.55,0.4]);
  blks.push([x+0.85,h+4.9,z+1.8,'crystal',0.55,0.55,0.4]);
  return blks;
}

function _voxTemple(x, z, h) {
  const blks=[];
  // Steps
  for(let s=0;s<3;s++) blks.push([x,h+s*0.6+0.3,z,'marble',14-s*1.5,0.6,10-s]);
  // Platform
  blks.push([x,h+2.2,z,'marble',12,1.2,8.5]);
  // Columns 2×5
  for(let col=0;col<5;col++){
    const cx=x-5+col*2.5;
    for(const cz of [z-3.5,z+3.5]) for(let y=0;y<8;y++)
      blks.push([cx,h+3.0+y,cz,'marble',0.75,1.0,0.75]);
  }
  // Entablature
  blks.push([x,h+11.0,z,'marble',12,0.9,8.5]);
  // Pediment
  for(let r=0;r<3;r++) blks.push([x,h+12.0+r*0.7,z,'gold',lerp(11,2,r/2),0.7,lerp(8,1.5,r/2)]);
  return blks;
}

function _voxHandMonument(x, z, h) {
  const blks=[];
  // Pillar
  for(let y=0;y<14;y++) blks.push([x,h+y+0.5,z,'marble',lerp(2.2,1.4,y/13),1.0,lerp(2.2,1.4,y/13)]);
  // Palm
  blks.push([x,h+14.5,z,'marble',5.5,1.4,5.0]);
  // Fingers
  [[-1.6,3.0],[-0.55,3.6],[0.55,3.6],[1.6,3.0]].forEach(([fx,fl])=>{
    for(let fy=0;fy<Math.floor(fl);fy++)
      blks.push([x+fx,h+14.5+fy+1.0,z-2.0,'marble',0.6,1.0,0.6]);
  });
  // Thumb
  for(let ty=0;ty<3;ty++) blks.push([x+3.0,h+14.5+ty*0.85,z+0.8,'marble',0.6,0.85,0.6]);
  // Gem in palm
  blks.push([x,h+15.0,z+1.8,'crystal',1.0,1.0,1.0]);
  return blks;
}

function _voxObservatory(x, z, h) {
  const blks=[];
  // Cylindrical base (approximate with blocks)
  for(let i=0;i<10;i++){
    const a=i/10*Math.PI*2, bx=x+Math.cos(a)*5, bz=z+Math.sin(a)*5;
    for(let y=0;y<5;y++) blks.push([bx,h+y*1.0+0.5,bz,'marble',1.2,1.0,1.2]);
  }
  // Glass dome sections
  for(let i=0;i<8;i++){
    const a=i/8*Math.PI*2;
    for(let tier=0;tier<4;tier++){
      const r=Math.cos(tier/4*Math.PI*0.5)*5;
      blks.push([x+Math.cos(a)*r,h+5+tier*1.4+0.7,z+Math.sin(a)*r,'crystal',1.2,1.4,1.2]);
    }
  }
  // Telescope
  for(let ty=0;ty<5;ty++) blks.push([x+1.5+ty*0.3,h+8+ty*0.8,z,'marble',0.6,0.8,0.6]);
  return blks;
}

function _voxGrandTower(x, z, h) {
  const blks=[];
  const matKey = civilizationEra>=5 ? 'darkstone' : 'cobble';
  for(let y=0;y<28;y++){
    const t=lerp(1.0,0.55,y/27);
    const w=Math.round(t*2.5);
    for(let dx=-w;dx<=w;dx++) for(let dz=-w;dz<=w;dz++){
      if(Math.abs(dx)===w||Math.abs(dz)===w) // hollow walls
        blks.push([x+dx,h+y+0.5,z+dz,matKey,1.0,1.0,1.0]);
    }
    // Windows every 4 floors
    if(y%4===2) blks.push([x,h+y+0.5,z+w+0.01,'crystal',1.0,1.5,0.3]);
  }
  // Battlements
  for(let i=0;i<8;i++){
    const a=i/8*Math.PI*2, br=2.2;
    blks.push([x+Math.cos(a)*br,h+28.6,z+Math.sin(a)*br,'cobble',0.8,1.4,0.8]);
  }
  // Beacon
  blks.push([x,h+30.5,z,'gold',1.2,1.2,1.2]);
  blks.push([x,h+31.8,z,'crystal',0.7,0.7,0.7]);
  return blks;
}

// Dispatch table
const STRUCTURES = {
  stoneCircle:  _voxStoneCircle,
  totemPole:    _voxTotemPole,
  palisade:     _voxPalisade,
  well:         _voxWell,
  farm:         _voxFarm,
  granary:      _voxGranary,
  pyramid:      _voxPyramid,
  obelisk:      _voxObelisk,
  stoneHead:    _voxStoneHead,
  temple:       _voxTemple,
  handMonument: _voxHandMonument,
  observatory:  _voxObservatory,
  grandTower:   _voxGrandTower,
};

function scheduleConstruction(type, x, z, h) {
  showMiracleFlash('Building…', '#88aaff');
  spawnBurst(v3(x,h+1,z), 0x88aaff, 14, 4, 0.18, 1.5);
  const delay = rand(2000, 5500);
  setTimeout(()=>{
    const buildFn = STRUCTURES[type];
    if (!buildFn) return;
    const voxels = buildFn(x, z, h);
    if (!voxels || voxels.length===0) return;
    // Sort bottom-to-top so construction goes up
    voxels.sort((a,b)=>a[1]-b[1]);
    // Queue all blocks
    voxels.forEach(([bx,by,bz,matKey,sx=1,sy=1,sz=1])=>{
      queueBlock(bx, by, bz, window.BLK[matKey] || window.BLK.stone, sx, sy, sz);
    });
    // Celebration when last block would be placed
    const celebDelay = voxels.length * BLOCK_INTERVAL * 1000 + 600;
    setTimeout(()=>{
      spawnBurst(v3(x,h+5,z), 0xffcc44, 38, 9, 0.26, 2.5);
      showMiracleFlash(`${type} complete!`, '#ffcc44');
      changeAlignment(0.03);
      creatures.forEach(c=>c.gainExperience(18));
    }, celebDelay);
  }, delay);
}

// ─── Rival God ────────────────────────────────────────────────────────────────
class RivalGod {
  constructor() {
    this.faith       = 75;
    this.attackTimer = rand(50, 80);
    this.defeated    = false;
    this.lastAction  = 'Watching…';
    this._rivalVillagers = [];
    this._buildScene();
    this._buildHUD();
  }

  _buildScene() {
    const h = getTerrainHeight(RIVAL_POS.x, RIVAL_POS.z);
    const dark  = new THREE.MeshStandardMaterial({color:0x1a0008,roughness:0.7,metalness:0.15});
    const skull = new THREE.MeshStandardMaterial({color:0xddddcc,roughness:0.65,metalness:0.05});
    const eyeM  = new THREE.MeshStandardMaterial({color:0xff0000,emissive:0xff0000,emissiveIntensity:3.0,roughness:0.1});
    const orbM  = new THREE.MeshStandardMaterial({color:0x880022,emissive:0xcc0033,emissiveIntensity:2.8,roughness:0.05,metalness:0.5});

    // Dark totem
    this.totem = new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.72,10,8),dark);
    this.totem.position.set(RIVAL_POS.x, h+5, RIVAL_POS.z);
    this.totem.castShadow=true; scene.add(this.totem);

    // Skull cap
    this.skullMesh=new THREE.Mesh(new THREE.SphereGeometry(0.75,8,7),skull);
    this.skullMesh.position.set(RIVAL_POS.x,h+10.8,RIVAL_POS.z); scene.add(this.skullMesh);
    [[-0.4,0],[0.4,0]].forEach(([ox])=>{
      const horn=new THREE.Mesh(new THREE.ConeGeometry(0.14,0.9,5),dark);
      horn.position.set(RIVAL_POS.x+ox,h+11.55,RIVAL_POS.z); horn.rotation.z=ox*0.5; scene.add(horn);
    });
    [-0.28,0.28].forEach(ox=>{
      const e=new THREE.Mesh(new THREE.SphereGeometry(0.1,6,6),eyeM);
      e.position.set(RIVAL_POS.x+ox,h+10.85,RIVAL_POS.z+0.65); scene.add(e);
    });

    // Evil orb
    this.orb=new THREE.Mesh(new THREE.SphereGeometry(0.42,10,10),orbM);
    this.orb.position.set(RIVAL_POS.x,h+7,RIVAL_POS.z); scene.add(this.orb);
    this.orbLight=new THREE.PointLight(0xaa0022,2.2,32);
    this.orbLight.position.copy(this.orb.position); scene.add(this.orbLight);

    // Rival dark creature
    const creatureGroup=new THREE.Group();
    const bodyM=new THREE.MeshStandardMaterial({color:0x1e0033,roughness:0.72,metalness:0.1,emissive:0x0a0015,emissiveIntensity:0.4});
    const body=new THREE.Mesh(new THREE.BoxGeometry(2.8,3.2,2.2),bodyM); body.position.y=1.8; body.castShadow=true; creatureGroup.add(body);
    const headM=new THREE.Mesh(new THREE.SphereGeometry(1.05,8,8),bodyM); headM.position.set(0,4.0,0); creatureGroup.add(headM);
    [-0.45,0.45].forEach(ox=>{
      const horn=new THREE.Mesh(new THREE.ConeGeometry(0.15,0.85,5),dark); horn.position.set(ox,5.0,0); horn.rotation.z=ox*0.3; creatureGroup.add(horn);
      const eye=new THREE.Mesh(new THREE.SphereGeometry(0.13,6,6),eyeM); eye.position.set(ox,4.05,0.9); creatureGroup.add(eye);
    });
    const ch=getTerrainHeight(RIVAL_POS.x+14,RIVAL_POS.z+6);
    creatureGroup.position.set(RIVAL_POS.x+14,ch+1,RIVAL_POS.z+6);
    scene.add(creatureGroup);
    this.rivalCreature=creatureGroup;
    this.creatureTarget=creatureGroup.position.clone();
    this.creatureAge=0;

    // 4 dark rival villagers
    const dVill=new THREE.MeshStandardMaterial({color:0x332211,roughness:0.85,metalness:0});
    for(let i=0;i<4;i++){
      const a=(i/4)*Math.PI*2;
      const rx=RIVAL_POS.x+Math.cos(a)*rand(5,11);
      const rz=RIVAL_POS.z+Math.sin(a)*rand(5,11);
      const rh=getTerrainHeight(rx,rz);
      const m=new THREE.Mesh(new THREE.CapsuleGeometry(0.38,0.75,4,7),dVill);
      m.position.set(rx,rh+0.75,rz); m.castShadow=true; scene.add(m);
      this._rivalVillagers.push({mesh:m,alive:true,wander:new THREE.Vector3(rx,rh,rz),t:rand(0,8)});
    }
  }

  _buildHUD() {
    const panel=document.createElement('div');
    panel.id='rival-panel';
    panel.style.cssText='position:absolute;top:16px;right:16px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,80,80,0.2);border-radius:8px;padding:10px 14px;min-width:145px;pointer-events:none;';
    panel.innerHTML=`<div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#ff6688;margin-bottom:5px;">⚔ Rival God</div>
<div style="width:100%;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;border:1px solid rgba(255,80,80,0.25)"><div id="rival-faith-fill" style="height:100%;width:75%;background:linear-gradient(to right,#660011,#ff2244);transition:width 0.5s;border-radius:3px;"></div></div>
<div id="rival-status" style="font-size:9px;color:rgba(255,160,160,0.65);margin-top:5px;letter-spacing:1px;"></div>`;
    document.getElementById('ui').appendChild(panel);
    this._faithFill=document.getElementById('rival-faith-fill');
    this._statusEl =document.getElementById('rival-status');
  }

  attack() {
    if (this.defeated) return;
    const numBalls = this.faith>60?3:2;
    this.lastAction='Attacking!';
    showMiracleFlash('⚔ Rival God Attacks!','#ff2244');
    playTone(55,'sawtooth',0.6,0.22);
    for(let i=0;i<numBalls;i++){
      setTimeout(()=>{
        const tx=VILLAGE_POS.x+rand(-14,14), tz=VILLAGE_POS.z+rand(-14,14);
        const tgt=new THREE.Vector3(tx,getTerrainHeight(tx,tz),tz);
        const geo=new THREE.SphereGeometry(0.68,8,8);
        const mat=new THREE.MeshStandardMaterial({color:0x550000,emissive:0xaa0022,emissiveIntensity:2.6});
        const ball=new THREE.Mesh(geo,mat);
        const sx=RIVAL_POS.x+rand(-4,4), sz=RIVAL_POS.z+rand(-4,4);
        ball.position.set(sx,getTerrainHeight(sx,sz)+10,sz);
        scene.add(ball);
        const dir=tgt.clone().sub(ball.position).normalize();
        ball.userData.vel=dir.multiplyScalar(24);
        ball.userData.type='fireball';
        ball.userData.fromRival=true;
        projectiles.push(ball);
      },i*700);
    }
  }

  takeDamage(amt) {
    if(this.defeated) return;
    this.faith=Math.max(0,this.faith-amt);
    spawnBurst(this.totem.position.clone(),0x880022,18,8,0.2,1.5);
    playTone(150,'sawtooth',0.3,0.25);
    this.lastAction='Under attack!';
    if(this.faith<=0) this.defeat();
  }

  defeat() {
    if(this.defeated) return;
    this.defeated=true;
    showMiracleFlash('✦ RIVAL GOD DEFEATED! ✦','#ffdd44');
    spawnBurst(this.totem.position.clone(),0xffdd44,80,15,0.35,5.0);
    playTone(110,'triangle',2.0,0.4); setTimeout(()=>playTone(165,'triangle',1.5,0.3),300);
    [this.totem,this.skullMesh,this.orb,this.rivalCreature].forEach(m=>{
      if(m){spawnBurst(m.position.clone(),0x880022,12,7,0.18,1.5);scene.remove(m);}
    });
    this._rivalVillagers.forEach(v=>{if(v.mesh)scene.remove(v.mesh);});
    if(this.orbLight) scene.remove(this.orbLight);
    changeAlignment(0.35);
    faithPoints+=200; updateFaithUI();
    const p=document.getElementById('rival-panel'); if(p) p.style.display='none';
  }

  update(dt) {
    if(this.defeated) return;
    const el=clock.getElapsedTime();

    // Orb spin + pulse
    if(this.orb) this.orb.rotation.y=el*1.8;
    if(this.orbLight) this.orbLight.intensity=2.2+Math.sin(el*2.8)*0.7;

    // Attack countdown
    this.attackTimer-=dt;
    if(this.attackTimer<=0){this.attackTimer=rand(38,72);if(this.faith>8) this.attack();}

    // Creature wanders — aggressive toward player village when faith is high
    this.creatureAge+=dt;
    const goAggro=this.faith>40&&this.creatureAge>25;
    const cBase=goAggro?VILLAGE_POS:RIVAL_POS;
    this.creatureTarget.set(
      cBase.x+Math.cos(this.creatureAge*0.16)*12,0,cBase.z+Math.sin(this.creatureAge*0.13)*12);
    const cp=this.rivalCreature.position;
    const ddx=this.creatureTarget.x-cp.x, ddz=this.creatureTarget.z-cp.z;
    const dd=Math.sqrt(ddx*ddx+ddz*ddz);
    if(dd>1){const ss=Math.min(2.8*dt,dd)/dd;cp.x+=ddx*ss;cp.z+=ddz*ss;this.rivalCreature.rotation.y=Math.atan2(ddx,ddz);}
    cp.y=lerp(cp.y,getTerrainHeight(cp.x,cp.z)+1.5,0.12);
    // Rival creature scares player villagers
    for(const v of villagers){
      if(!v.alive) continue;
      if(v.mesh.position.distanceTo(cp)<14){v.fear=Math.min(1,v.fear+0.35*dt);v.state='flee';}
    }

    // Rival faith grows from its own villagers (slowly)
    const aliveR=this._rivalVillagers.filter(v=>v.alive).length;
    this.faith=Math.min(100,this.faith+aliveR*0.25*dt);

    // Wander rival villagers
    for(const rv of this._rivalVillagers){
      if(!rv.alive) continue;
      rv.t-=dt;
      if(rv.t<=0||rv.mesh.position.distanceTo(rv.wander)<2){
        rv.t=rand(5,14);
        const ra=Math.random()*Math.PI*2, rr=rand(4,13);
        rv.wander.set(RIVAL_POS.x+Math.cos(ra)*rr,0,RIVAL_POS.z+Math.sin(ra)*rr);
      }
      const rdx=rv.wander.x-rv.mesh.position.x, rdz=rv.wander.z-rv.mesh.position.z;
      const rd=Math.sqrt(rdx*rdx+rdz*rdz);
      if(rd>0.5){rv.mesh.position.x+=rdx/rd*1.4*dt;rv.mesh.position.z+=rdz/rd*1.4*dt;}
      rv.mesh.position.y=lerp(rv.mesh.position.y,getTerrainHeight(rv.mesh.position.x,rv.mesh.position.z)+0.75,0.1);
    }

    // HUD
    if(this._faithFill) this._faithFill.style.width=this.faith+'%';
    if(this._statusEl)  this._statusEl.textContent=this.lastAction;
    if(!goAggro) this.lastAction='Watching…';
  }
}

function initRivalGod() {
  rivalGod = new RivalGod();
}

// ─── Tutorial fade ─────────────────────────────────────────────────────────────
function initTutorial() {
  setTimeout(() => {
    document.getElementById('tutorial').style.opacity = '0';
  }, 5000);
}

// ─── Main game loop ──────────────────────────────────────────────────────────
function gameLoop() {
  requestAnimationFrame(gameLoop);
  const dt = Math.min(clock.getDelta(), 0.05);
  const elapsed = clock.getElapsedTime();

  // Water animation
  if (waterMesh) {
    waterMesh.material.uniforms.uTime.value = elapsed;
    waterMesh.material.uniforms.uAlignment.value = alignment;
  }

  // Day/night + civilization advancement
  updateDayNight(dt);
  updateCivilization(dt);
  updateBlockQueue(dt);

  // Totem orb pulse
  if (window._totemOrb)   window._totemOrb.rotation.y = elapsed * 0.8;
  if (window._totemLight) window._totemLight.intensity = 3.0 + Math.sin(elapsed * 2.2) * 0.8;

  // Campfire flicker
  if (window._flames) window._flames.forEach((f, i) => {
    f.scale.y = 1.3 + Math.sin(elapsed * 5.5 + i * 1.7) * 0.45;
    f.scale.x = 0.8 + Math.sin(elapsed * 4.2 + i * 2.3) * 0.22;
  });
  if (window._fireLights) window._fireLights.forEach((l, i) => {
    l.intensity = 2.4 + Math.sin(elapsed * 6.1 + i * 1.9) * 0.9;
  });

  // Clouds drift
  updateClouds(dt);

  // Villager updates
  for (const v of villagers) v.update(dt);

  // Collective mind maintenance
  SharedMind.update(dt);

  // Environment (fire, regrowth, scorch marks)
  updateEnvironment(dt);

  // Creatures
  for (const c of creatures) c.update(dt);

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    if (!particles[i].update(dt)) {
      particles[i].dispose();
      particles.splice(i, 1);
    }
  }

  // Projectiles
  updateProjectiles(dt);

  // Thrown objects
  updateThrownObjects(dt);

  // Faith
  updateFaith(dt);

  // Ambient sprites
  updateAmbientSprites(elapsed);
  // Weather
  updateWeather(dt);
  // Prayers
  updatePrayers(dt);
  // Rival god
  if (rivalGod) rivalGod.update(dt);

  // Hand bobbing
  if (godHand && !grabbedObject) {
    godHand.position.y = worldMouse.y + 3.5 + Math.sin(elapsed * 2.5) * 0.3;
    godHand.rotation.z = Math.sin(elapsed * 1.2) * 0.05;
  }

  // Gesture trail
  drawGestureTrail();

  if (composer) composer.render();
  else renderer.render(scene, camera);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
function init() {
  initTextures();
  initBlockMats();
  initScene();
  buildTerrain();
  buildWater();
  buildTrees();
  buildGrass();
  buildHand();
  buildVillage();
  buildVillageBuildings();
  buildClouds();
  spawnCreature(VILLAGE_POS.x + 25, VILLAGE_POS.z + 5);
  loadModels();
  spawnAmbientSprites();
  initWeather();
  initRivalGod();
  initGestureCanvas();
  initInput();
  initTutorial();
  updateAlignmentUI();
  updateFaithUI();
  updateHandColor();

  // Initial food so villagers don't starve immediately
  spawnFood(new THREE.Vector3(VILLAGE_POS.x + 5, 0, VILLAGE_POS.z - 4));
  spawnFood(new THREE.Vector3(VILLAGE_POS.x - 6, 0, VILLAGE_POS.z + 3));

  gameLoop();
}

// ─── Diagnostics ─────────────────────────────────────────────────────────────
function showError(msg) {
  const d = document.createElement('div');
  d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#c00;color:#fff;padding:12px;font-size:14px;z-index:9999;word-break:break-all;';
  d.textContent = msg;
  document.body.appendChild(d);
}

if (typeof THREE === 'undefined') {
  showError('ERROR: Three.js failed to load. Check that lib/three.min.js is present.');
} else {
  try {
    init();
  } catch(e) {
    showError('ERROR: ' + e.message + ' — ' + e.stack);
  }
}
