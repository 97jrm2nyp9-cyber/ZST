<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black &amp; White</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Georgia', serif; touch-action: none; }
canvas { display: block; }
@media (pointer: fine) { canvas { cursor: none; } }

#ui {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 10;
}

/* Touch miracle buttons */
#miracle-grid {
  position: absolute; bottom: 90px; right: 12px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  pointer-events: auto;
}
.mbtn {
  width: 64px; height: 64px; border-radius: 12px;
  border: 1.5px solid rgba(255,255,255,0.3);
  background: rgba(0,0,0,0.55); color: #fff;
  font-size: 11px; letter-spacing: 0.5px; text-transform: uppercase;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; cursor: pointer; user-select: none; -webkit-user-select: none;
  transition: background 0.1s, transform 0.1s;
}
.mbtn:active { background: rgba(255,255,255,0.2); transform: scale(0.93); }
.mbtn span { font-size: 22px; }

/* Creature buttons */
#creature-btns {
  position: absolute; bottom: 90px; left: 12px;
  display: flex; flex-direction: column; gap: 8px;
  pointer-events: auto;
}
.cbtn {
  width: 64px; height: 64px; border-radius: 12px;
  border: 1.5px solid rgba(255,255,255,0.3);
  background: rgba(0,0,0,0.55); color: #fff;
  font-size: 10px; letter-spacing: 0.5px; text-transform: uppercase;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; cursor: pointer; user-select: none; -webkit-user-select: none;
  transition: background 0.1s, transform 0.1s;
}
.cbtn:active { transform: scale(0.93); }
#btn-reward { border-color: rgba(255,220,0,0.5); }
#btn-reward:active { background: rgba(255,200,0,0.3); }
#btn-punish { border-color: rgba(255,60,60,0.5); }
#btn-punish:active { background: rgba(255,60,60,0.3); }

/* Draw spell button */
#draw-btn {
  position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
  width: 100px; height: 44px; border-radius: 22px;
  border: 1.5px solid rgba(255,255,200,0.4);
  background: rgba(0,0,0,0.55); color: rgba(255,255,200,0.85);
  font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; user-select: none; -webkit-user-select: none;
  pointer-events: auto; transition: background 0.1s;
}
#draw-btn.active { background: rgba(255,255,150,0.25); border-color: rgba(255,255,150,0.8); }

/* Alignment bar */
#align-bar {
  position: absolute; bottom: 148px; left: 50%; transform: translateX(-50%);
  width: 220px; text-align: center;
}
#align-label {
  color: rgba(255,255,255,0.7); font-size: 11px; letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 6px; text-shadow: 0 0 8px #000;
}
#align-track {
  width: 100%; height: 10px; border-radius: 5px;
  background: linear-gradient(to right, #8B0000, #555, #FFD700);
  position: relative; border: 1px solid rgba(255,255,255,0.2);
}
#align-thumb {
  position: absolute; top: -4px; width: 18px; height: 18px;
  border-radius: 50%; background: #fff;
  border: 2px solid rgba(0,0,0,0.5);
  transform: translateX(-50%);
  transition: left 0.3s ease;
  box-shadow: 0 0 8px rgba(255,255,255,0.8);
  left: 50%;
}

/* Faith meter */
#faith-bar {
  position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
  width: 16px; height: 180px;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
#faith-label {
  color: rgba(255,255,255,0.6); font-size: 10px; letter-spacing: 1px;
  writing-mode: vertical-rl; text-transform: uppercase; margin-bottom: 4px;
  text-shadow: 0 0 6px #000;
}
#faith-track {
  flex: 1; width: 8px; border-radius: 4px;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  position: relative; overflow: hidden;
}
#faith-fill {
  position: absolute; bottom: 0; width: 100%;
  background: linear-gradient(to top, #4488ff, #aaccff);
  border-radius: 4px; transition: height 0.5s ease;
  height: 10%;
}

/* Creature panel */
#creature-panel {
  position: absolute; left: 16px; top: 16px;
  background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px; padding: 10px 14px; min-width: 140px;
}
#creature-panel h3 {
  color: rgba(255,255,255,0.8); font-size: 11px; letter-spacing: 1px;
  text-transform: uppercase; margin-bottom: 8px;
}
.trait-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
.trait-name { color: rgba(255,255,255,0.5); font-size: 10px; width: 70px; }
.trait-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
.trait-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
#bar-friendly .trait-fill { background: #44cc88; width: 50%; }
#bar-aggress  .trait-fill { background: #cc4444; width: 30%; }
#bar-lazy     .trait-fill { background: #aaaaaa; width: 60%; }

/* Controls hint */
#controls {
  position: absolute; bottom: 60px; right: 16px;
  background: rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px; padding: 8px 12px;
  color: rgba(255,255,255,0.5); font-size: 10px; line-height: 1.7;
}

/* Tutorial overlay */
#tutorial {
  position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
  text-align: center; color: rgba(255,255,255,0.85);
  text-shadow: 0 2px 12px rgba(0,0,0,0.9);
  pointer-events: none;
  transition: opacity 2s ease;
}
#tutorial h1 {
  font-size: 42px; letter-spacing: 6px; text-transform: uppercase;
  margin-bottom: 12px; font-weight: 300;
}
#tutorial p { font-size: 14px; letter-spacing: 1px; opacity: 0.7; }

/* Miracle feedback */
#miracle-flash {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 18px; letter-spacing: 3px; text-transform: uppercase;
  color: #fff; text-shadow: 0 0 20px currentColor;
  opacity: 0; transition: opacity 0.15s;
  pointer-events: none;
}

/* Gesture canvas overlay */
#gesture-canvas {
  position: absolute; top: 0; left: 0; pointer-events: none;
}
</style>
</head>
<body>

<div id="ui">
  <div id="tutorial">
    <h1>Black &amp; White</h1>
    <p>Move your hand across the land &mdash; you are a god</p>
  </div>

  <div id="creature-panel">
    <h3>Your Creature</h3>
    <div class="trait-row">
      <span class="trait-name">Friendly</span>

    </div>

  <div id="align-bar">
    <div id="align-label">Alignment</div>
    <div id="align-track">
      <div id="align-thumb"></div>

  <div id="faith-bar">
    <div id="faith-label">Faith</div>
    <div id="faith-track"><div id="faith-fill"></div></div>
  </div>

  <!-- Touch miracle buttons -->
  <div id="miracle-grid">
    <button class="mbtn" id="mbtn-fireball"><span>🔥</span>Fireball</button>
    <button class="mbtn" id="mbtn-food"><span>🍎</span>Food</button>
    <button class="mbtn" id="mbtn-heal"><span>💚</span>Heal</button>

  </div>

  <!-- Creature buttons -->
  <div id="creature-btns">

  <button id="draw-btn">✦ Draw Spell</button>

</div>

<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>

<script>

// ─── Noise ───────────────────────────────────────────────────────────────────
function noise2D(x, z) {
  let v = 0, amp = 1, freq = 1, max = 0;
  const offsets = [[1.7,0.5],[0.4,1.2],[2.1,0.8],[0.9,1.5]];
  const freqs   = [0.28, 0.57, 1.13, 2.27];
  for (let i = 0; i < 4; i++) {
    const f = freqs[i] * freq;
    v   += Math.sin(x * f + offsets[i][0]) * Math.cos(z * f * 1.01 + offsets[i][1]) * amp;
    max += amp;
    amp *= 0.5;
  }
  return v / max;
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * Math.max(0, Math.min(1, t)); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function rand(lo, hi) { return lo + Math.random() * (hi - lo); }
function v3(x, y, z) { return new THREE.Vector3(x, y, z); }

// ─── Procedural canvas textures ──────────────────────────────────────────────
const TEX = {};

function makeTex(w, h, fn) {
  const c = Object.assign(document.createElement('canvas'), { width: w, height: h });
  fn(c.getContext('2d'), w, h);
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  return t;
}

function initTextures() {
  // Stone wall — irregular blocks with mortar lines
  TEX.stone = makeTex(256, 256, (ctx, w, h) => {
    ctx.fillStyle = '#8a8070'; ctx.fillRect(0, 0, w, h);
    const bw = 48, bh = 26;
    for (let row = 0; row <= h/bh + 1; row++) {
      const off = (row & 1) ? bw*0.5 : 0;
      for (let col = -1; col <= w/bw + 1; col++) {
        const v = 108 + Math.random()*50 | 0;
        ctx.fillStyle = `rgb(${v},${v-7},${v-17})`;
        ctx.fillRect(col*bw + off + 1, row*bh + 1, bw - 2, bh - 2);
      }
    }
    ctx.strokeStyle = '#524838'; ctx.lineWidth = 1.5;
    for (let row = 0; row <= h/bh + 1; row++) {
      const off = (row & 1) ? bw*0.5 : 0;
      for (let col = -1; col <= w/bw + 1; col++)
        ctx.strokeRect(col*bw + off, row*bh, bw, bh);
    }
    for (let i = 0; i < 3000; i++) {
      ctx.fillStyle = `rgba(0,0,0,${Math.random()*0.06})`;
      ctx.fillRect(Math.random()*w|0, Math.random()*h|0, 2, 1);
    }
  });

  // Thatched roof — diagonal straw strands
  TEX.thatch = makeTex(256, 256, (ctx, w, h) => {
    ctx.fillStyle = '#b08820'; ctx.fillRect(0, 0, w, h);
    for (let y = -h; y < h*2; y += 5) {
      const v = 138 + Math.random()*45 | 0;
      ctx.strokeStyle = `rgb(${v},${v*0.73|0},${v*0.24|0})`;
      ctx.lineWidth = 1 + Math.random();
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y + w*0.58); ctx.stroke();
    }
    for (let i = 0; i < 1500; i++) {
      ctx.fillStyle = `rgba(0,0,0,${Math.random()*0.07})`;
      ctx.fillRect(Math.random()*w|0, Math.random()*h|0, 1, 3);
    }
  });

  // Tree bark — horizontal grain
  TEX.bark = makeTex(64, 256, (ctx, w, h) => {
    ctx.fillStyle = '#4a2e12'; ctx.fillRect(0, 0, w, h);
    for (let y = 0; y < h; y += 5) {
      ctx.strokeStyle = `rgba(0,0,0,${0.18 + Math.random()*0.3})`;
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(0, y + Math.random()*3);
      for (let x = 0; x <= w; x += 8)
        ctx.lineTo(x, y + Math.random()*5);
      ctx.stroke();
    }
    for (let i = 0; i < 800; i++) {
      ctx.fillStyle = `rgba(220,160,60,${Math.random()*0.04})`;
      ctx.fillRect(Math.random()*w|0, Math.random()*h|0, 1, 1);
    }
  });

  // Creature fur — short directional strokes
  TEX.fur = makeTex(128, 128, (ctx, w, h) => {
    ctx.fillStyle = '#c8a050'; ctx.fillRect(0, 0, w, h);
    for (let i = 0; i < 800; i++) {
      const x = Math.random()*w, y = Math.random()*h;
      const v = 150 + Math.random()*70 | 0;
      ctx.strokeStyle = `rgba(${v},${v*0.68|0},${v*0.28|0},0.55)`;
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + rand(-2,2), y + rand(2,5)); ctx.stroke();
    }
  });
}

// ─── Constants ───────────────────────────────────────────────────────────────
const ISLAND_RADIUS  = 90;
const TERRAIN_SEGS   = 128;
const TERRAIN_SIZE   = 200;
const SEA_LEVEL      = 0;
const INFLUENCE_BASE = 45;
const INFLUENCE_MAX  = 120;
const VILLAGE_POS    = new THREE.Vector3(18, 0, 10);

// ─── Globals ─────────────────────────────────────────────────────────────────
let renderer, scene, camera, composer;
let camDist = 150;
let clock = new THREE.Clock();
let terrainMesh, waterMesh;
let godHand, handGroup;
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();
let worldMouse = new THREE.Vector3();
let prevWorldMouse = new THREE.Vector3();
let grabbedObject = null;
let grabOffset = new THREE.Vector3();

let alignment = 0;       // -1 evil … +1 good
let faithPoints = 0;
let influenceRadius = INFLUENCE_BASE;
let influenceRing;

let villagers = [];
let foodPiles = [];
let projectiles = [];
let particles = [];
let ambientSprites = [];
let creature;
let audioCtx;

// Gesture
let gestureActive = false;
let gesturePath = [];
let gestureCanvas, gestureCtx2d;
let gestureObjects = [];

// Miracle cast count for creature learning
let miracleCastCount = { fireball: 0, food: 0, heal: 0, wood: 0 };

// ─── Audio ───────────────────────────────────────────────────────────────────
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playTone(freq, type = 'sine', duration = 0.15, gain = 0.18) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const g   = audioCtx.createGain();
  osc.connect(g); g.connect(audioCtx.destination);
  osc.type = type; osc.frequency.value = freq;
  g.gain.setValueAtTime(gain, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.start(); osc.stop(audioCtx.currentTime + duration);
}
function playGrab()    { playTone(440, 'sine', 0.08, 0.12); }
function playThrow()   { playTone(300, 'triangle', 0.12, 0.15); }
function playHeal()    { playTone(660, 'sine', 0.4, 0.2); setTimeout(()=>playTone(880,'sine',0.3,0.15), 120); }
function playFireball(){ playTone(110, 'sawtooth', 0.3, 0.25); }
function playFood()    { playTone(528, 'sine', 0.25, 0.18); }
function playWood()    { playTone(220, 'triangle', 0.2, 0.2); }
function playReward()  { [528,660,784].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.2,0.15),i*80)); }
function playPunish()  { playTone(120, 'sawtooth', 0.25, 0.3); }

// ─── Terrain heightmap ───────────────────────────────────────────────────────
let terrainHeightData = [];
function buildTerrain() {
  const geo = new THREE.PlaneGeometry(TERRAIN_SIZE, TERRAIN_SIZE, TERRAIN_SEGS, TERRAIN_SEGS);
  geo.rotateX(-Math.PI / 2);
  const pos = geo.attributes.position;
  const segs1 = TERRAIN_SEGS + 1;
  terrainHeightData = new Float32Array(segs1 * segs1);
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i);
    const z = pos.getZ(i);
    const r = Math.sqrt(x * x + z * z) / ISLAND_RADIUS;
    const fade = Math.max(0, 1 - r * r * 1.4);
    const h = (noise2D(x * 0.04, z * 0.04) * 0.5 + noise2D(x * 0.09, z * 0.09) * 0.3 + noise2D(x * 0.18, z * 0.18) * 0.2);
    const height = Math.max(SEA_LEVEL - 2, h * 22 * fade);
    pos.setY(i, height);
    terrainHeightData[i] = height;
  }
  geo.computeVertexNormals();

  const mat = new THREE.ShaderMaterial({
    uniforms: { uAlignment: { value: 0.0 } },
    vertexShader: [
      'varying float vHeight;',
      'varying vec3  vNormal;',
      'varying vec2  vXZ;',
      'void main(){',
      '  vHeight = position.y;',
      '  vNormal = normalize(normalMatrix * normal);',
      '  vXZ    = vec2(position.x, position.z);',
      '  gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);',
      '}'
    ].join('\n'),
    fragmentShader: [
      'precision mediump float;',
      'uniform float uAlignment;',
      'varying float vHeight;',
      'varying vec3  vNormal;',
      'varying vec2  vXZ;',
      'float h21(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}',
      'float ns(vec2 p){',
      '  vec2 i=floor(p);vec2 f=fract(p);f=f*f*(3.0-2.0*f);',
      '  return mix(mix(h21(i),h21(i+vec2(1,0)),f.x),mix(h21(i+vec2(0,1)),h21(i+vec2(1,1)),f.x),f.y);',
      '}',
      'float fbm(vec2 p){return ns(p)*0.5+ns(p*2.1)*0.25+ns(p*4.4)*0.125+ns(p*9.1)*0.0625;}',
      'void main(){',
      '  vec3 beach = vec3(0.82,0.74,0.53);',
      '  vec3 grass = vec3(0.30,0.58,0.20);',
      '  vec3 dark  = vec3(0.22,0.44,0.14);',
      '  vec3 rock  = vec3(0.48,0.45,0.40);',
      '  vec3 snow  = vec3(0.93,0.95,0.97);',
      '  vec3 col;',
      '  if(vHeight<0.6)       col=beach;',
      '  else if(vHeight<4.0)  col=mix(beach,grass,(vHeight-0.6)/3.4);',
      '  else if(vHeight<12.0) col=mix(grass,dark,(vHeight-4.0)/8.0);',
      '  else if(vHeight<18.0) col=mix(dark,rock,(vHeight-12.0)/6.0);',
      '  else                  col=mix(rock,snow,clamp((vHeight-18.0)/4.0,0.0,1.0));',
      '  float det=fbm(vXZ*0.35);',
      '  col*=0.88+det*0.24;',
      '  float evil=clamp(-uAlignment,0.0,1.0);',
      '  col=mix(col,col*vec3(0.62,0.42,0.42),evil*0.55);',
      '  vec3 sunDir=normalize(vec3(0.55,1.0,0.4));',
      '  float diff=max(dot(vNormal,sunDir),0.0);',
      '  float light=0.30+0.70*diff;',
      '  gl_FragColor=vec4(col*light,1.0);',
      '}'
    ].join('\n'),
  });

  terrainMesh = new THREE.Mesh(geo, mat);
  terrainMesh.receiveShadow = true;
  terrainMesh.name = 'terrain';
  scene.add(terrainMesh);
}

function getTerrainHeight(x, z) {
  // Bilinear sample from height data
  const half = TERRAIN_SIZE / 2;
  const nx = (x + half) / TERRAIN_SIZE * TERRAIN_SEGS;
  const nz = (z + half) / TERRAIN_SIZE * TERRAIN_SEGS;
  const ix = Math.floor(clamp(nx, 0, TERRAIN_SEGS - 1));
  const iz = Math.floor(clamp(nz, 0, TERRAIN_SEGS - 1));
  const fx = nx - ix, fz = nz - iz;
  const stride = TERRAIN_SEGS + 1;
  const h00 = terrainHeightData[iz * stride + ix]       || 0;
  const h10 = terrainHeightData[iz * stride + ix + 1]   || 0;
  const h01 = terrainHeightData[(iz+1)*stride + ix]     || 0;
  const h11 = terrainHeightData[(iz+1)*stride + ix + 1] || 0;
  return lerp(lerp(h00, h10, fx), lerp(h01, h11, fx), fz);
}

function snapToTerrain(obj, yOffset = 0) {
  obj.position.y = getTerrainHeight(obj.position.x, obj.position.z) + yOffset;
}

// ─── Water ───────────────────────────────────────────────────────────────────
function buildWater() {
  const geo = new THREE.PlaneGeometry(400, 400, 48, 48);
  geo.rotateX(-Math.PI / 2);
  const mat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uAlignment: { value: 0 } },
    transparent: true, depthWrite: false,
    vertexShader: [
      'uniform float uTime;',
      'varying float vWave;',
      'varying vec2  vUV;',
      'void main(){',
      '  vec3 p=position;',
      '  float w=sin(p.x*0.22+uTime*1.1)*cos(p.z*0.19+uTime*0.85)*0.55',
      '         +sin(p.x*0.47+uTime*1.6)*0.22',
      '         +sin(p.x*0.88+p.z*0.72+uTime*2.3)*0.10;',
      '  p.y+=w; vWave=w; vUV=vec2(p.x,p.z);',
      '  gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.0);',
      '}'
    ].join('\n'),
    fragmentShader: [
      'precision mediump float;',
      'uniform float uAlignment;',
      'uniform float uTime;',
      'varying float vWave;',
      'varying vec2  vUV;',
      'void main(){',
      '  float evil=clamp(-uAlignment,0.0,1.0);',
      '  vec3 deep =mix(vec3(0.04,0.16,0.44),vec3(0.18,0.04,0.06),evil*0.7);',
      '  vec3 crest=mix(vec3(0.38,0.68,0.96),vec3(0.55,0.15,0.15),evil*0.6);',
      '  float foam=smoothstep(0.20,0.52,vWave);',
      '  vec3 col=mix(deep,crest,foam*0.55);',
      '  float band=sin(vUV.x*0.14+uTime*0.55)*sin(vUV.y*0.11+uTime*0.48)*0.5+0.5;',
      '  col+=mix(vec3(0.22,0.48,0.88),vec3(0.5,0.1,0.08),evil)*band*0.07;',
      '  float sp=pow(clamp(sin(vUV.x*0.82+uTime*2.2)*sin(vUV.y*0.71+uTime*1.9),0.0,1.0),14.0)*0.28;',
      '  col+=mix(vec3(0.85,0.92,1.0),vec3(0.9,0.4,0.3),evil)*sp;',
      '  gl_FragColor=vec4(col,0.86+foam*0.08);',
      '}'
    ].join('\n'),
  });
  waterMesh = new THREE.Mesh(geo, mat);
  waterMesh.position.y = SEA_LEVEL - 0.4;
  scene.add(waterMesh);
}

// ─── Trees ───────────────────────────────────────────────────────────────────
function buildTrees() {
  for (let i = 0; i < 95; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist  = rand(12, 76);
    const x = Math.cos(angle) * dist, z = Math.sin(angle) * dist;
    const h = getTerrainHeight(x, z);
    if (h < 1.2 || h > 17) continue;
    const scale = rand(0.8, 1.5);
    if (h > 11)       buildPineTree(x, z, h, scale);
    else if (h < 3.0) buildPalmTree(x, z, h, scale);
    else              Math.random() < 0.55 ? buildOakTree(x, z, h, scale) : buildPineTree(x, z, h, scale);
  }
  const rockMat = new THREE.MeshPhongMaterial({ color: 0x888070, shininess: 18 });
  for (let i = 0; i < 42; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist  = rand(8, 82);
    const x = Math.cos(angle) * dist, z = Math.sin(angle) * dist;
    const h = getTerrainHeight(x, z);
    if (h < 0.3 || h > 20) continue;
    const s = rand(0.4, 1.2);
    const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(s, 0), rockMat);
    rock.position.set(x, h + s*0.5, z);
    rock.rotation.set(rand(0,Math.PI), rand(0,Math.PI), rand(0,Math.PI));
    scene.add(rock);
  }
}

function buildOakTree(x, z, h, scale) {
  const tMat = new THREE.MeshPhongMaterial({ color: 0x5a3815, map: TEX.bark, shininess: 5 });
  tMat.map.repeat.set(1, scale * 2);
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.22*scale, 0.40*scale, 3.5*scale, 7), tMat);
  trunk.castShadow = true;
  trunk.position.set(x, h + 1.75*scale, z);
  scene.add(trunk);
  const lH = 0.27 + rand(-0.04, 0.04), lL = 0.22 + rand(0, 0.10);
  const lMat  = new THREE.MeshPhongMaterial({ color: new THREE.Color().setHSL(lH, 0.72, lL), shininess: 3 });
  const lMat2 = new THREE.MeshPhongMaterial({ color: new THREE.Color().setHSL(lH, 0.65, lL - 0.06), shininess: 2 });
  const mainR = rand(2.2, 3.0) * scale;
  const main  = new THREE.Mesh(new THREE.SphereGeometry(mainR, 7, 6), lMat);
  main.scale.y = rand(0.72, 0.92);
  main.position.set(x, h + (3.6 + mainR*0.55)*scale, z);
  scene.add(main);
  const numA = 2 + Math.floor(Math.random() * 3);
  for (let j = 0; j < numA; j++) {
    const a2 = (j / numA) * Math.PI * 2 + rand(0, 0.8);
    const ar  = rand(1.3, 1.9) * scale;
    const ao  = rand(mainR * 0.5, mainR * 0.82);
    const acc = new THREE.Mesh(new THREE.SphereGeometry(ar, 6, 5), lMat2);
    acc.position.set(x + Math.cos(a2)*ao, h + (3.3 + rand(0,1.4))*scale, z + Math.sin(a2)*ao);
    acc.scale.y = rand(0.78, 1.08);
    scene.add(acc);
  }
}

function buildPineTree(x, z, h, scale) {
  const tMat = new THREE.MeshPhongMaterial({ color: 0x4a2a0a, map: TEX.bark, shininess: 4 });
  tMat.map.repeat.set(1, scale * 2);
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15*scale, 0.28*scale, 4.5*scale, 6), tMat);
  trunk.castShadow = true;
  trunk.position.set(x, h + 2.25*scale, z);
  scene.add(trunk);
  const lH = rand(0.30, 0.38);
  const lMat = new THREE.MeshPhongMaterial({ color: new THREE.Color().setHSL(lH, 0.62, 0.17 + rand(0,0.08)), shininess: 2 });
  [0, 1, 2].forEach(tier => {
    const r = (2.3 - tier*0.52) * scale;
    const cone = new THREE.Mesh(new THREE.ConeGeometry(r, 3.6*scale, 8), lMat);
    cone.position.set(x, h + (4.0 + tier*2.6)*scale, z);
    cone.rotation.y = Math.random() * Math.PI;
    scene.add(cone);
  });
}

function buildPalmTree(x, z, h, scale) {
  const tMat = new THREE.MeshPhongMaterial({ color: 0x8B6910, shininess: 8 });
  const leanDir = Math.random() * Math.PI * 2;
  const lean    = 0.14 + Math.random() * 0.12;
  for (let seg = 0; seg < 3; seg++) {
    const sx = x + Math.cos(leanDir) * seg * lean * 1.6 * scale;
    const sz = z + Math.sin(leanDir) * seg * lean * 1.6 * scale;
    const sy = h + seg * 1.9 * scale;
    const s = new THREE.Mesh(new THREE.CylinderGeometry(0.17*scale*(1-seg*0.04), 0.22*scale*(1-seg*0.04), 1.9*scale, 7), tMat);
    s.position.set(sx, sy + 0.95*scale, sz);
    s.rotation.z = Math.sin(leanDir) * lean * 0.6;
    s.rotation.x = Math.cos(leanDir) * lean * 0.6;
    scene.add(s);
  }
  const tipX = x + Math.cos(leanDir)*3*lean*1.6*scale;
  const tipZ = z + Math.sin(leanDir)*3*lean*1.6*scale;
  const tipY = h + 3*1.9*scale;
  const fMat = new THREE.MeshPhongMaterial({ color: new THREE.Color().setHSL(0.32, 0.7, 0.26), side: THREE.DoubleSide });
  for (let f = 0; f < 7; f++) {
    const fa = (f / 7) * Math.PI * 2;
    const frond = new THREE.Mesh(new THREE.PlaneGeometry(0.55*scale, 2.8*scale), fMat);
    frond.position.set(tipX, tipY, tipZ);
    frond.rotation.y = fa;
    frond.rotation.x = -0.55;
    scene.add(frond);
  }
}

// ─── God Hand ────────────────────────────────────────────────────────────────
function buildHand() {
  handGroup = new THREE.Group();

  // Palm
  const palmGeo  = new THREE.BoxGeometry(1.8, 0.5, 2.2);
  const palmMat  = new THREE.MeshPhongMaterial({ color: 0xf5c88a, shininess: 50, specular: 0xffeedd });
  const palm     = new THREE.Mesh(palmGeo, palmMat);
  palm.castShadow = true;
  handGroup.add(palm);

  // Fingers (4)
  const fingerMat = new THREE.MeshPhongMaterial({ color: 0xf5c88a, shininess: 50, specular: 0xffeedd });
  [-0.6, -0.2, 0.2, 0.6].forEach((fx, i) => {
    const len = [1.5, 1.8, 1.7, 1.4][i];
    const fg  = new THREE.CapsuleGeometry(0.18, len, 4, 8);
    const fm  = new THREE.Mesh(fg, fingerMat);
    fm.rotation.x = -Math.PI / 2;
    fm.position.set(fx, 0, -1.1 - len / 2);
    handGroup.add(fm);
  });
  // Thumb
  const thumbG = new THREE.CapsuleGeometry(0.2, 1.0, 4, 8);
  const thumb  = new THREE.Mesh(thumbG, fingerMat);
  thumb.rotation.z = Math.PI / 4;
  thumb.position.set(1.1, 0, -0.3);
  handGroup.add(thumb);

  scene.add(handGroup);
  godHand = handGroup;
}

function updateHandColor() {
  const t = (alignment + 1) / 2; // 0=evil, 1=good
  const evilColor  = new THREE.Color(0.6, 0.1, 0.1);
  const goodColor  = new THREE.Color(1.0, 0.85, 0.6);
  const color = evilColor.clone().lerp(goodColor, t);
  godHand.children.forEach(c => {
    if (c.material) c.material.color.copy(color);
  });

  const emissive = new THREE.Color(lerp(0.25,0.12,t), lerp(0.0,0.08,t), 0);
  godHand.children.forEach(c => {
    if (c.material && c.material.emissive) c.material.emissive.copy(emissive);
  });
}

// ─── Villagers ───────────────────────────────────────────────────────────────
class VillagerAgent {
  constructor(x, z) {
    this.mesh = new THREE.Group();
    this.mesh.userData.type = 'villager';
    this.mesh.userData.agent = this;

    const robeColor = new THREE.Color().setHSL(Math.random(), 0.48, 0.42 + Math.random() * 0.18);
    const robeMat = new THREE.MeshPhongMaterial({ color: robeColor, shininess: 14 });
    const skinMat = new THREE.MeshPhongMaterial({ color: 0xf0c898, shininess: 20 });
    const hatMat  = new THREE.MeshPhongMaterial({ color: robeColor.clone().multiplyScalar(0.7) });

    const robe = new THREE.Mesh(new THREE.CylinderGeometry(0.27, 0.46, 1.3, 7), robeMat);
    robe.castShadow = true;
    this.mesh.add(robe);

    const head = new THREE.Mesh(new THREE.SphereGeometry(0.27, 8, 8), skinMat);
    head.position.set(0, 0.93, 0);
    head.castShadow = true;
    this.mesh.add(head);

    const hat = new THREE.Mesh(new THREE.ConeGeometry(0.21, 0.38, 7), hatMat);
    hat.position.set(0, 1.27, 0);
    this.mesh.add(hat);

    [-0.36, 0.36].forEach(ax => {
      const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.09, 0.65, 5), robeMat);
      arm.position.set(ax, 0.18, 0);
      arm.rotation.z = ax > 0 ? 0.5 : -0.5;
      this.mesh.add(arm);
    });

    const h = getTerrainHeight(x, z);
    this.mesh.position.set(x, h + 0.65, z);
    scene.add(this.mesh);

    this.state  = 'wander';
    this.target = null;
    this.hunger = Math.random() * 0.3;
    this.fear   = 0;
    this.timer  = rand(0, 3);
    this.velocity = new THREE.Vector3();
    this.alive  = true;
  }

  update(dt) {
    if (!this.alive) return;
    this.timer -= dt;
    this.hunger = Math.min(1, this.hunger + dt * 0.012);
    this.fear   = Math.max(0, this.fear - dt * 0.3);

    // State transitions
    if (this.fear > 0.5) {
      this.state = 'flee';
    } else if (this.hunger > 0.65) {
      const fp = nearestFood(this.mesh.position);
      if (fp) { this.target = fp; this.state = 'seek_food'; }
      else     this.state = 'worship';
    } else if (this.timer <= 0) {
      this.state = Math.random() < 0.4 ? 'worship' : 'wander';
      this.timer = rand(3, 8);
    }

    const speed = this.state === 'flee' ? 6 : (this.state === 'seek_food' ? 3.5 : 2);

    if (this.state === 'wander') {
      if (!this.target || this.mesh.position.distanceTo(this.target) < 1.5 || this.timer <= 0) {
        const angle = Math.random() * Math.PI * 2;
        const r = rand(3, 12);
        const tx = VILLAGE_POS.x + Math.cos(angle) * r;
        const tz = VILLAGE_POS.z + Math.sin(angle) * r;
        this.target = new THREE.Vector3(tx, 0, tz);
        this.timer = rand(4, 10);
      }
    } else if (this.state === 'worship') {
      this.target = VILLAGE_POS.clone();
    } else if (this.state === 'flee') {
      // Flee away from nearest threat (fireball / evil zone)
      const away = this.mesh.position.clone().sub(VILLAGE_POS).normalize().multiplyScalar(20);
      this.target = this.mesh.position.clone().add(away);
    } else if (this.state === 'seek_food') {
      if (this.target && this.mesh.position.distanceTo(this.target.position || this.target) < 1.5) {
        // Eat
        this.hunger = Math.max(0, this.hunger - 0.5);
        if (this.target.userData) {
          this.target.userData.bites = (this.target.userData.bites || 0) + 1;
          if (this.target.userData.bites > 4) { consumeFood(this.target); this.target = null; }
        }
        this.state = 'wander';
        this.timer = rand(3, 6);
      }
    }

    // Move toward target
    if (this.target) {
      const tp = (this.target.position || this.target);
      const dir = new THREE.Vector3(tp.x - this.mesh.position.x, 0, tp.z - this.mesh.position.z);
      const dist = dir.length();
      if (dist > 0.3) {
        dir.normalize();
        this.mesh.position.x += dir.x * speed * dt;
        this.mesh.position.z += dir.z * speed * dt;
        this.mesh.rotation.y = Math.atan2(dir.x, dir.z);
      }
    }

    // Clamp inside island
    const px = this.mesh.position.x, pz = this.mesh.position.z;
    const r2 = Math.sqrt(px*px + pz*pz);
    if (r2 > ISLAND_RADIUS - 5) {
      this.mesh.position.x *= (ISLAND_RADIUS - 5) / r2;
      this.mesh.position.z *= (ISLAND_RADIUS - 5) / r2;
    }

    snapToTerrain(this.mesh, 0.65);

    // Walk bob
    if (this.state !== 'wander' || this.target) {
      const phase = performance.now() * 0.006 + this.timer;
      this.mesh.position.y += Math.abs(Math.sin(phase)) * 0.06;
      this.mesh.rotation.z  = Math.sin(phase * 0.5) * 0.04;
    }
  }
}

function nearestFood(pos) {
  let best = null, bestD = 999;
  for (const f of foodPiles) {
    if (!f.parent) continue;
    const d = pos.distanceTo(f.position);
    if (d < bestD) { bestD = d; best = f; }
  }
  return best;
}

function consumeFood(mesh) {
  const idx = foodPiles.indexOf(mesh);
  if (idx !== -1) foodPiles.splice(idx, 1);
  scene.remove(mesh);
}

// ─── Village totem + influence ring ─────────────────────────────────────────
function buildVillage() {
  // Totem pole
  const tGeo = new THREE.CylinderGeometry(0.4, 0.6, 6, 8);
  const tMat = new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.9 });
  const totem = new THREE.Mesh(tGeo, tMat);
  totem.castShadow = true;
  const h = getTerrainHeight(VILLAGE_POS.x, VILLAGE_POS.z);
  totem.position.set(VILLAGE_POS.x, h + 3, VILLAGE_POS.z);
  scene.add(totem);

  // Totem orb
  const orbGeo = new THREE.SphereGeometry(0.85, 16, 16);
  const orbMat = new THREE.MeshStandardMaterial({ color: 0xffffcc, emissive: 0xffcc44, emissiveIntensity: 2.5, roughness: 0.1, metalness: 0.3 });
  const orb = new THREE.Mesh(orbGeo, orbMat);
  orb.position.set(VILLAGE_POS.x, h + 7.2, VILLAGE_POS.z);
  scene.add(orb);
  window._totemOrb = orb;

  // Point light at orb — warm village glow
  const totemLight = new THREE.PointLight(0xffcc55, 3.5, 40);
  totemLight.position.set(VILLAGE_POS.x, h + 7.5, VILLAGE_POS.z);
  scene.add(totemLight);
  window._totemLight = totemLight;

  // Influence ring
  const rGeo = new THREE.RingGeometry(influenceRadius - 0.4, influenceRadius + 0.4, 64);
  rGeo.rotateX(-Math.PI / 2);
  const rMat = new THREE.MeshBasicMaterial({
    color: 0x4499ff, side: THREE.DoubleSide, transparent: true, opacity: 0.35,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  influenceRing = new THREE.Mesh(rGeo, rMat);
  influenceRing.position.set(0, h + 0.15, 0);
  scene.add(influenceRing);

  // Spawn villagers
  for (let i = 0; i < 10; i++) {
    const angle = (i / 10) * Math.PI * 2;
    const r = rand(6, 18);
    villagers.push(new VillagerAgent(
      VILLAGE_POS.x + Math.cos(angle) * r,
      VILLAGE_POS.z + Math.sin(angle) * r
    ));
  }
}

function updateInfluenceRing() {
  if (!influenceRing) return;
  // Rebuild ring geometry when radius changes
  influenceRing.geometry.dispose();
  const r = influenceRadius;
  const ng = new THREE.RingGeometry(r - 0.4, r + 0.4, 64);
  ng.rotateX(-Math.PI / 2);
  influenceRing.geometry = ng;

  // Color based on alignment
  const t = (alignment + 1) / 2;
  influenceRing.material.color.setRGB(
    lerp(0.8, 0.2, t),
    lerp(0.1, 0.6, t),
    lerp(0.1, 1.0, t)
  );
}

// ─── Creature ─────────────────────────────────────────────────────────────────
class CreatureAgent {
  constructor() {
    this.traits = { friendliness: 0.5, aggression: 0.3, laziness: 0.6 };
    this.learnedMiracles = new Set();
    this.autocastTimer = 0;
    this.state = 'wander';
    this.target = new THREE.Vector3(VILLAGE_POS.x + 20, 0, VILLAGE_POS.z + 5);
    this.group = new THREE.Group();
    this._buildMesh();
    scene.add(this.group);

    this.group.position.set(
      VILLAGE_POS.x + 25,
      getTerrainHeight(VILLAGE_POS.x + 25, VILLAGE_POS.z + 5) + 1.5,
      VILLAGE_POS.z + 5
    );
  }

  _buildMesh() {
    const mat     = new THREE.MeshPhongMaterial({ color: 0xc8a050, map: TEX.fur, shininess: 10, specular: 0x332211 });
    const darkMat = new THREE.MeshPhongMaterial({ color: 0x8a6030, shininess: 6 });
    const maneMat = new THREE.MeshPhongMaterial({ color: 0x7a4a10, shininess: 3 });

    // Body — elongated sphere like a lion torso
    const body = new THREE.Mesh(new THREE.SphereGeometry(1.35, 11, 9), mat);
    body.scale.set(1.0, 0.82, 1.65);
    body.castShadow = true;
    this.group.add(body);

    // Neck
    const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.72, 1.0, 8), mat);
    neck.position.set(0, 0.62, 1.1);
    neck.rotation.x = -0.38;
    this.group.add(neck);

    // Head
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.92, 10, 9), mat);
    head.scale.set(1.0, 0.88, 1.1);
    head.position.set(0, 1.15, 1.95);
    head.castShadow = true;
    this.group.add(head);

    // Snout
    const snout = new THREE.Mesh(new THREE.SphereGeometry(0.4, 8, 6), mat);
    snout.scale.set(0.88, 0.68, 1.28);
    snout.position.set(0, 0.82, 2.62);
    this.group.add(snout);

    // Nostrils
    const nostMat = new THREE.MeshBasicMaterial({ color: 0x1a0d00 });
    [-0.14, 0.14].forEach(ox => {
      const n = new THREE.Mesh(new THREE.SphereGeometry(0.07, 5, 5), nostMat);
      n.position.set(ox, 0.79, 2.94);
      this.group.add(n);
    });

    // Eyes
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, emissive: 0xffaa00, emissiveIntensity: 1.8 });
    const pupMat = new THREE.MeshBasicMaterial({ color: 0x110000 });
    [-0.36, 0.36].forEach(ex => {
      const eye = new THREE.Mesh(new THREE.SphereGeometry(0.17, 7, 7), eyeMat);
      eye.position.set(ex, 1.3, 2.58);
      this.group.add(eye);
      const pup = new THREE.Mesh(new THREE.SphereGeometry(0.085, 5, 5), pupMat);
      pup.position.set(ex, 1.3, 2.73);
      this.group.add(pup);
    });

    // Ears
    [-0.62, 0.62].forEach(ex => {
      const ear = new THREE.Mesh(new THREE.ConeGeometry(0.27, 0.52, 5), darkMat);
      ear.position.set(ex, 1.98, 1.98);
      ear.rotation.z = ex > 0 ? 0.38 : -0.38;
      this.group.add(ear);
    });

    // Mane ring
    for (let m = 0; m < 9; m++) {
      const ma = (m / 9) * Math.PI * 2;
      const mp = new THREE.Mesh(new THREE.SphereGeometry(0.33, 6, 5), maneMat);
      mp.position.set(Math.cos(ma) * 0.82, 0.82 + Math.sin(ma) * 0.14, 1.25);
      mp.scale.y = 1.45;
      this.group.add(mp);
    }

    // Legs — upper + lower + paw
    this._legUpper = [];
    [[-0.88,-0.78,-0.98],[0.88,-0.78,-0.98],[-0.88,-0.78,0.82],[0.88,-0.78,0.82]].forEach(([lx,ly,lz]) => {
      const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.21, 0.95, 7), mat);
      upper.position.set(lx, ly, lz);
      upper.rotation.z = lx < 0 ? -0.13 : 0.13;
      upper.castShadow = true;
      this._legUpper.push(upper);
      this.group.add(upper);
      const lower = new THREE.Mesh(new THREE.CylinderGeometry(0.17, 0.13, 0.88, 7), darkMat);
      lower.position.set(lx + (lx<0?-0.06:0.06), ly - 0.88, lz);
      this.group.add(lower);
      const paw = new THREE.Mesh(new THREE.SphereGeometry(0.22, 7, 5), darkMat);
      paw.scale.set(1.2, 0.65, 1.32);
      paw.position.set(lx + (lx<0?-0.1:0.1), ly - 1.38, lz + 0.1);
      this.group.add(paw);
    });

    // Tail
    for (let i = 0; i < 4; i++) {
      const ts = new THREE.Mesh(new THREE.SphereGeometry(0.26 - i*0.04, 6, 5), i < 3 ? mat : maneMat);
      ts.position.set(0, -0.48 + i*0.28, -1.42 - i*0.58);
      ts.scale.y = 1.45;
      this.group.add(ts);
    }

    this.mat = mat;
  }

  reward() {
    this.traits.friendliness = clamp(this.traits.friendliness + 0.15, 0, 1);
    this.traits.aggression   = clamp(this.traits.aggression   - 0.08, 0, 1);
    this.traits.laziness     = clamp(this.traits.laziness     - 0.05, 0, 1);
    this._pulse(0xffee44); playReward();
    showMiracleFlash('Creature Rewarded ✦', '#ffd700');
    changeAlignment(0.03);
    this._updateUI();
  }

  punish() {
    this.traits.aggression   = clamp(this.traits.aggression   + 0.15, 0, 1);
    this.traits.friendliness = clamp(this.traits.friendliness - 0.08, 0, 1);
    this._pulse(0xff2200); playPunish();
    showMiracleFlash('Creature Punished', '#cc4444');
    changeAlignment(-0.03);
    this._updateUI();
  }

  _pulse(color) {
    const orig = this.mat.emissive.clone();
    this.mat.emissive.setHex(color);
    setTimeout(() => this.mat.emissive.copy(orig), 300);
  }

  _updateUI() {
    document.querySelector('#bar-friendly .trait-fill').style.width = (this.traits.friendliness * 100) + '%';
    document.querySelector('#bar-aggress  .trait-fill').style.width = (this.traits.aggression   * 100) + '%';
    document.querySelector('#bar-lazy     .trait-fill').style.width = (this.traits.laziness     * 100) + '%';
  }

  learnMiracle(type) {
    if (!this.learnedMiracles.has(type)) {
      this.learnedMiracles.add(type);
      showMiracleFlash(`Creature learned ${type}!`, '#aaffaa');
    }
  }

  update(dt) {
    // Wander / follow player
    const toHand = worldMouse.clone().sub(this.group.position);
    const distToHand = toHand.length();

    if (this.state === 'wander') {
      const tp = this.target;
      const dir = new THREE.Vector3(tp.x - this.group.position.x, 0, tp.z - this.group.position.z);
      const dist = dir.length();
      const lazySlow = lerp(1.0, 2.5, 1 - this.traits.laziness);
      if (dist > 1.5) {
        dir.normalize();
        this.group.position.x += dir.x * lazySlow * dt;
        this.group.position.z += dir.z * lazySlow * dt;
        this.group.rotation.y = Math.atan2(dir.x, dir.z);
      } else {
        // New wander target inside influence radius
        const angle = Math.random() * Math.PI * 2;
        const r = rand(5, Math.min(influenceRadius, 50));
        this.target.set(Math.cos(angle) * r, 0, Math.sin(angle) * r);
      }
    }

    // Auto-cast learned miracles
    if (this.learnedMiracles.size > 0 && this.traits.laziness < 0.8) {
      this.autocastTimer -= dt;
      if (this.autocastTimer <= 0) {
        this.autocastTimer = rand(20, 35);
        const arr = [...this.learnedMiracles];
        const chosen = arr[Math.floor(Math.random() * arr.length)];
        castMiracleAt(chosen, this.group.position.clone().add(v3(rand(-5,5), 0, rand(-5,5))), false);
        this._pulse(0x88ffaa);
        showMiracleFlash(`Creature casts ${chosen}!`, '#88ffcc');
      }
    }

    // Terrain snap
    const h = getTerrainHeight(this.group.position.x, this.group.position.z) + 1.5;
    this.group.position.y = lerp(this.group.position.y, h, 0.15);

    // Walk / breathe animation
    const now = performance.now() * 0.001;
    const distToTarget = this.group.position.distanceTo(this.target);
    const moving = distToTarget > 2.0;
    if (this._legUpper) {
      const swing = moving ? 0.42 : 0.0;
      const phase = now * 3.6;
      this._legUpper[0].rotation.x =  Math.sin(phase) * swing;
      this._legUpper[1].rotation.x = -Math.sin(phase) * swing;
      this._legUpper[2].rotation.x = -Math.sin(phase) * swing;
      this._legUpper[3].rotation.x =  Math.sin(phase) * swing;
      if (moving) this.group.position.y += Math.abs(Math.sin(phase * 2)) * 0.12;
    }
    if (!moving) {
      this.group.scale.y = 1.0 + Math.sin(now * 1.4) * 0.022;
    } else {
      this.group.scale.y = lerp(this.group.scale.y, 1.0, 0.1);
    }

    // Colour by trait
    const t = this.traits.friendliness;
    const evil = this.traits.aggression;
    this.mat.color.setRGB(lerp(0.7, 0.9, t), lerp(0.3, 0.7, t * (1-evil)), lerp(0.1, 0.2, t));
    this.mat.emissive.setRGB(evil * 0.3, t * 0.05, 0);

    document.getElementById('creature-status').textContent =
      this.learnedMiracles.size > 0
        ? 'Knows: ' + [...this.learnedMiracles].join(', ')
        : 'Watching and learning…';
  }
}

// ─── Particles ────────────────────────────────────────────────────────────────
class Particle {
  constructor(pos, vel, color, life, size = 0.3) {
    this.pos  = pos.clone();
    this.vel  = vel.clone();
    this.life = life;
    this.maxLife = life;
    this.size = size;
    const geo = new THREE.SphereGeometry(size, 4, 4);
    const mat = new THREE.MeshStandardMaterial({
      color, emissive: color, emissiveIntensity: 1.5,
      transparent: true, opacity: 1,
    });
    this.mesh = new THREE.Mesh(geo, mat);
    this.mesh.position.copy(pos);
    scene.add(this.mesh);
  }
  update(dt) {
    this.life -= dt;
    this.vel.y -= 4 * dt; // gravity
    this.pos.addScaledVector(this.vel, dt);
    this.mesh.position.copy(this.pos);
    const t = this.life / this.maxLife;
    this.mesh.material.opacity = t;
    this.mesh.scale.setScalar(t * 0.8 + 0.2);
    return this.life > 0;
  }
  dispose() { scene.remove(this.mesh); this.mesh.geometry.dispose(); this.mesh.material.dispose(); }
}

function spawnBurst(pos, color, count = 20, speed = 8, size = 0.25, life = 1.2) {
  for (let i = 0; i < count; i++) {
    const vel = new THREE.Vector3(rand(-1,1), rand(0.5,2), rand(-1,1)).normalize().multiplyScalar(rand(speed*0.4, speed));
    particles.push(new Particle(pos, vel, color, rand(life*0.6, life), size));
  }
}

// ─── Ambient sprites (birds / bats) ──────────────────────────────────────────
function spawnAmbientSprites() {
  for (let i = 0; i < 8; i++) {
    const geo = new THREE.PlaneGeometry(0.8, 0.5);
    const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.7 });
    const m = new THREE.Mesh(geo, mat);
    m.userData.phase = Math.random() * Math.PI * 2;
    m.userData.r = rand(20, 60);
    m.userData.spd = rand(0.4, 0.9);
    m.userData.h = rand(20, 40);
    scene.add(m);
    ambientSprites.push(m);
  }
}

function updateAmbientSprites(t) {
  const goodMode = alignment > 0.25;
  const evilMode = alignment < -0.25;
  if (!goodMode && !evilMode) {
    ambientSprites.forEach(s => { s.visible = false; }); return;
  }
  ambientSprites.forEach((s, i) => {
    s.visible = true;
    const phase = s.userData.phase + t * s.userData.spd;
    s.position.set(
      Math.cos(phase) * s.userData.r,
      s.userData.h + Math.sin(phase * 2) * 3,
      Math.sin(phase) * s.userData.r
    );
    s.rotation.y = phase + Math.PI / 2;
    if (goodMode) s.material.color.setHex(0xfff4cc);
    else          s.material.color.setHex(0x220011);
  });
}

// ─── Miracles ────────────────────────────────────────────────────────────────
function castMiracleAt(type, pos, fromPlayer = true) {
  if (fromPlayer) {
    miracleCastCount[type] = (miracleCastCount[type] || 0) + 1;
    if (miracleCastCount[type] >= 3 && creature) creature.learnMiracle(type);
  }

  if (type === 'fireball') {
    castFireball(pos, fromPlayer);
  } else if (type === 'food') {
    spawnFood(pos);
    if (fromPlayer) changeAlignment(0.05);
    spawnBurst(pos, 0xffcc44, 15, 6, 0.2, 0.8);
    playFood();
    showMiracleFlash('Food', '#ffcc44');
  } else if (type === 'heal') {
    castHeal(pos);
  } else if (type === 'wood') {
    spawnLog(pos);
    if (fromPlayer) changeAlignment(0.03);
    spawnBurst(pos, 0x885522, 12, 5, 0.2, 0.6);
    playWood();
    showMiracleFlash('Wood', '#aa7744');
  }
}

function castFireball(targetPos, fromPlayer) {
  playFireball();
  if (fromPlayer) changeAlignment(-0.12);
  // Spawn fireball projectile
  const geo = new THREE.SphereGeometry(0.7, 8, 8);
  const mat = new THREE.MeshStandardMaterial({ color: 0xff4400, emissive: 0xff2200, emissiveIntensity: 3, roughness: 0.2 });
  const ball = new THREE.Mesh(geo, mat);
  const startPos = worldMouse.clone().add(v3(0, 15, 0));
  ball.position.copy(startPos);
  scene.add(ball);
  const dir = targetPos.clone().sub(startPos).normalize();
  ball.userData.vel   = dir.multiplyScalar(30);
  ball.userData.type  = 'fireball';
  ball.userData.pos   = targetPos;
  projectiles.push(ball);
  showMiracleFlash('Fireball!', '#ff4400');
}

function castHeal(pos) {
  playHeal();
  changeAlignment(0.10);
  spawnBurst(pos, 0x44ff88, 30, 7, 0.2, 1.5);
  // Heal nearby villagers
  for (const v of villagers) {
    if (!v.alive) continue;
    if (v.mesh.position.distanceTo(pos) < 18) {
      v.hunger = Math.max(0, v.hunger - 0.6);
      v.fear   = 0;
      spawnBurst(v.mesh.position.clone().add(new THREE.Vector3(0,1,0)), 0x88ffaa, 5, 3, 0.15, 0.6);
    }
  }
  showMiracleFlash('Heal', '#44ff88');
}

function spawnFood(pos) {
  const h = getTerrainHeight(pos.x, pos.z);
  const geo = new THREE.CylinderGeometry(0.6, 0.8, 0.6, 8);
  const mat = new THREE.MeshStandardMaterial({ color: 0xcc8833, roughness: 0.9 });
  const food = new THREE.Mesh(geo, mat);
  food.position.set(pos.x, h + 0.3, pos.z);
  food.castShadow = true;
  food.userData.type = 'food';
  food.userData.bites = 0;
  scene.add(food);
  foodPiles.push(food);
}

function spawnLog(pos) {
  const h = getTerrainHeight(pos.x, pos.z);
  const geo = new THREE.CylinderGeometry(0.3, 0.3, 2.5, 6);
  const mat = new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.9 });
  const log = new THREE.Mesh(geo, mat);
  log.rotation.z = Math.PI / 2;
  log.position.set(pos.x, h + 0.4, pos.z);
  log.castShadow = true;
  log.userData.type = 'log';
  log.userData.vel  = new THREE.Vector3();
  scene.add(log);
}

// ─── Village buildings ────────────────────────────────────────────────────────
function buildVillageBuildings() {
  const h = getTerrainHeight(VILLAGE_POS.x, VILLAGE_POS.z);

  // Stone well
  const stoneMat = new THREE.MeshPhongMaterial({ color: 0x999080, shininess: 12 });
  const well = new THREE.Mesh(new THREE.CylinderGeometry(0.82, 0.9, 1.0, 10), stoneMat);
  well.position.set(VILLAGE_POS.x, h + 0.5, VILLAGE_POS.z - 3.5);
  scene.add(well);
  const crossBar = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 2.1, 6),
    new THREE.MeshPhongMaterial({ color: 0x5c3317 }));
  crossBar.rotation.z = Math.PI / 2;
  crossBar.position.set(VILLAGE_POS.x, h + 1.85, VILLAGE_POS.z - 3.5);
  scene.add(crossBar);

  // 5 thatched huts in arc
  [-0.95, -0.45, 0.08, 0.58, 1.08].forEach((a, i) => {
    const r  = 11 + (i % 2) * 3.5;
    const hx = VILLAGE_POS.x + Math.cos(a) * r;
    const hz = VILLAGE_POS.z + Math.sin(a) * r;
    buildHut(hx, hz, getTerrainHeight(hx, hz));
  });

  // Campfire near center
  buildCampfire(VILLAGE_POS.x + 4.5, VILLAGE_POS.z + 2.5);

  // Fence posts
  const postMat = new THREE.MeshPhongMaterial({ color: 0x7a5520 });
  for (let i = 0; i < 18; i++) {
    const fa = (i / 18) * Math.PI * 2;
    const fpx = VILLAGE_POS.x + Math.cos(fa) * 8.8;
    const fpz = VILLAGE_POS.z + Math.sin(fa) * 8.8;
    const fh  = getTerrainHeight(fpx, fpz);
    const post = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, 1.2, 5), postMat);
    post.position.set(fpx, fh + 0.6, fpz);
    scene.add(post);
  }
}

function buildHut(x, z, h) {
  const wallMat = new THREE.MeshPhongMaterial({ color: 0xbcb4a4, map: TEX.stone, shininess: 12 });
  const wall = new THREE.Mesh(new THREE.CylinderGeometry(2.0, 2.2, 2.2, 8), wallMat);
  wall.position.set(x, h + 1.1, z);
  wall.castShadow = true; wall.receiveShadow = true;
  scene.add(wall);
  const roofMat = new THREE.MeshPhongMaterial({ color: 0xd4a838, map: TEX.thatch, shininess: 4 });
  const roof = new THREE.Mesh(new THREE.ConeGeometry(2.85, 2.4, 8), roofMat);
  roof.position.set(x, h + 3.4, z);
  roof.rotation.y = Math.random() * 0.4;
  roof.castShadow = true; roof.receiveShadow = true;
  scene.add(roof);
  const doorMat = new THREE.MeshBasicMaterial({ color: 0x2a1a08 });
  const door = new THREE.Mesh(new THREE.PlaneGeometry(0.72, 1.15), doorMat);
  door.position.set(x, h + 0.8, z + 2.15);
  scene.add(door);
}

function buildCampfire(x, z) {
  const h = getTerrainHeight(x, z);
  const logMat = new THREE.MeshPhongMaterial({ color: 0x5c3317 });
  [-0.38, 0.38].forEach(ox => {
    const log = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 1.1, 6), logMat);
    log.rotation.z = Math.PI / 2;
    log.rotation.y = ox > 0 ? 0.6 : -0.6;
    log.position.set(x + ox*0.3, h + 0.12, z);
    scene.add(log);
  });
  const flameMat = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0xff3300, emissiveIntensity: 3.8, transparent: true, opacity: 0.85 });
  const flame = new THREE.Mesh(new THREE.SphereGeometry(0.36, 7, 7), flameMat);
  flame.scale.y = 1.5;
  flame.position.set(x, h + 0.68, z);
  scene.add(flame);
  window._flames = window._flames || [];
  window._flames.push(flame);
  const fireLight = new THREE.PointLight(0xff6600, 2.8, 14);
  fireLight.position.set(x, h + 1.2, z);
  scene.add(fireLight);
  window._fireLights = window._fireLights || [];
  window._fireLights.push(fireLight);
}

// ─── Clouds ───────────────────────────────────────────────────────────────────
let clouds = [];

function buildClouds() {
  const cloudMat = new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.82, shininess: 0 });
  for (let i = 0; i < 14; i++) {
    const grp = new THREE.Group();
    const numPuffs = 4 + Math.floor(Math.random() * 4);
    for (let j = 0; j < numPuffs; j++) {
      const r    = rand(5, 12);
      const puff = new THREE.Mesh(new THREE.SphereGeometry(r, 8, 7), cloudMat);
      puff.position.set(rand(-9, 9), rand(-2, 4), rand(-5, 5));
      puff.scale.y = rand(0.52, 0.72);
      grp.add(puff);
    }
    const angle = Math.random() * Math.PI * 2;
    const dist  = rand(45, 165);
    grp.position.set(Math.cos(angle)*dist, rand(58, 92), Math.sin(angle)*dist);
    grp.userData.speed = rand(0.5, 1.5);
    grp.userData.angle = angle;
    grp.userData.dist  = dist;
    scene.add(grp);
    clouds.push(grp);
  }
}

function updateClouds(dt) {
  for (const c of clouds) {
    c.userData.angle += dt * c.userData.speed * 0.003;
    c.position.x = Math.cos(c.userData.angle) * c.userData.dist;
    c.position.z = Math.sin(c.userData.angle) * c.userData.dist;
  }
}

// ─── Gesture recognition ─────────────────────────────────────────────────────
function initGestureCanvas() {
  gestureCanvas = document.getElementById('gesture-canvas');
  gestureCtx2d  = gestureCanvas.getContext('2d');
  resizeGestureCanvas();
}

function resizeGestureCanvas() {
  gestureCanvas.width  = window.innerWidth;
  gestureCanvas.height = window.innerHeight;
}

function recognizeGesture(path) {
  if (path.length < 8) return null;
  // Normalize path to [0,1]^2
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  path.forEach(p => { minX=Math.min(minX,p.x); maxX=Math.max(maxX,p.x); minY=Math.min(minY,p.y); maxY=Math.max(maxY,p.y); });
  const w = maxX - minX || 1, h = maxY - minY || 1;
  const norm = path.map(p => ({ x: (p.x - minX) / w, y: (p.y - minY) / h }));

  // Circle: start and end are close, path stays near radius from centroid
  const cx = norm.reduce((s,p)=>s+p.x,0)/norm.length;
  const cy = norm.reduce((s,p)=>s+p.y,0)/norm.length;
  const radii = norm.map(p => Math.sqrt((p.x-cx)**2+(p.y-cy)**2));
  const meanR  = radii.reduce((a,b)=>a+b,0)/radii.length;
  const circleScore = 1 - radii.reduce((s,r)=>s+Math.abs(r-meanR),0)/radii.length/meanR;
  const closeEnds = Math.hypot(norm[0].x-norm[norm.length-1].x, norm[0].y-norm[norm.length-1].y) < 0.35;
  if (circleScore > 0.72 && closeEnds && meanR > 0.2) return 'heal';

  // V-shape (fireball): detect sharp turn at the bottom
  const mid = Math.floor(norm.length / 2);
  const startY = norm[0].y, midY = norm[mid].y, endY = norm[norm.length-1].y;
  const midX = norm[mid].x;
  const isVShape = (midY > startY + 0.35) && (midY > endY + 0.35) &&
                   Math.abs(norm[0].x - norm[norm.length-1].x) < 0.5;
  if (isVShape) return 'fireball';

  // Spiral: monotonically increasing angle from centroid
  const angles = norm.map(p => Math.atan2(p.y - cy, p.x - cx));
  let diffs = 0, monotoneCount = 0;
  for (let i = 1; i < angles.length; i++) {
    let d = angles[i] - angles[i-1];
    if (d > Math.PI)  d -= 2*Math.PI;
    if (d < -Math.PI) d += 2*Math.PI;
    diffs += d;
    if (Math.abs(d) < 0.4) monotoneCount++;
  }
  if (Math.abs(diffs) > Math.PI * 2.5 && monotoneCount < norm.length * 0.3) return 'food';

  // Zigzag (wood): multiple left-right direction reversals
  let reversals = 0;
  for (let i = 2; i < norm.length; i++) {
    const d1 = norm[i-1].x - norm[i-2].x;
    const d2 = norm[i].x   - norm[i-1].x;
    if (d1 * d2 < -0.001) reversals++;
  }
  if (reversals >= 3 && w > 0.4 * h) return 'wood';

  return null;
}

function drawGestureTrail() {
  gestureCtx2d.clearRect(0, 0, gestureCanvas.width, gestureCanvas.height);
  if (!gestureActive || gesturePath.length < 2) return;
  gestureCtx2d.beginPath();
  gestureCtx2d.strokeStyle = `rgba(255,255,200,0.85)`;
  gestureCtx2d.lineWidth = 3;
  gestureCtx2d.shadowBlur = 12;
  gestureCtx2d.shadowColor = '#ffffaa';
  gestureCtx2d.moveTo(gesturePath[0].x, gesturePath[0].y);
  for (let i = 1; i < gesturePath.length; i++) {
    gestureCtx2d.lineTo(gesturePath[i].x, gesturePath[i].y);
  }
  gestureCtx2d.stroke();
}

// ─── God-hand picking ─────────────────────────────────────────────────────────
function tryGrab() {
  const pickables = [];
  scene.traverse(obj => {
    if (obj.userData.type === 'villager' || obj.userData.type === 'food' || obj.userData.type === 'log') {
      pickables.push(obj);
    }
  });
  let best = null, bestD = 14;
  for (const obj of pickables) {
    const d = obj.position.distanceTo(worldMouse);
    if (d < bestD) { bestD = d; best = obj; }
  }
  if (best) {
    grabbedObject = best;
    grabOffset.copy(best.position).sub(worldMouse);
    playGrab();
    if (best.userData.type === 'villager' && best.userData.agent) {
      best.userData.agent.state = 'carried';
    }
  }
}

function releaseGrab() {
  if (!grabbedObject) return;
  const throwVel = worldMouse.clone().sub(prevWorldMouse).multiplyScalar(15);
  throwVel.y = Math.max(throwVel.y, 5);
  grabbedObject.userData.vel = throwVel;
  grabbedObject.userData.thrown = true;
  grabbedObject.userData.throwTimer = 0;
  playThrow();

  if (grabbedObject.userData.type === 'villager' && grabbedObject.userData.agent) {
    grabbedObject.userData.agent.state = 'wander';
    grabbedObject.userData.agent.timer = rand(2, 4);
  }
  grabbedObject = null;
}

// ─── Projectile update ────────────────────────────────────────────────────────
function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.userData.vel.y -= 12 * dt;
    p.position.addScaledVector(p.userData.vel, dt);

    // Spin
    p.rotation.x += dt * 3; p.rotation.y += dt * 2;

    // Sparks trail
    if (Math.random() < 0.4) {
      const sp = new Particle(p.position.clone(), v3(rand(-2,2), rand(0,3), rand(-2,2)), 0xff6600, 0.3, 0.12);
      particles.push(sp);
    }

    const h = getTerrainHeight(p.position.x, p.position.z);
    const hitGround = p.position.y <= h + 0.5;
    const hitWater  = p.position.y <= SEA_LEVEL && Math.sqrt(p.position.x**2 + p.position.z**2) > ISLAND_RADIUS * 0.85;
    if (hitGround || hitWater) {
      spawnBurst(p.position, 0xff4400, 40, 12, 0.3, 1.8);
      spawnBurst(p.position, 0xffcc00, 20, 8, 0.18, 1.0);
      // Scare/damage nearby villagers
      for (const vill of villagers) {
        if (!vill.alive) continue;
        const d = vill.mesh.position.distanceTo(p.position);
        if (d < 8) {
          vill.fear = 1;
          vill.state = 'flee';
          if (d < 3 && vill.alive) {
            vill.alive = false;
            vill.mesh.visible = false;
            changeAlignment(-0.05);
          }
        }
      }
      scene.remove(p); p.geometry.dispose(); p.material.dispose();
      projectiles.splice(i, 1);
    }
  }
}

// ─── Thrown-object physics ───────────────────────────────────────────────────
function updateThrownObjects(dt) {
  scene.traverse(obj => {
    if (!obj.userData.thrown) return;
    obj.userData.throwTimer = (obj.userData.throwTimer || 0) + dt;
    obj.userData.vel = obj.userData.vel || new THREE.Vector3();
    obj.userData.vel.y -= 18 * dt;
    obj.position.addScaledVector(obj.userData.vel, dt);

    const h = getTerrainHeight(obj.position.x, obj.position.z);
    if (obj.position.y <= h + 0.5) {
      obj.position.y = h + 0.5;
      obj.userData.vel.multiplyScalar(0.3);
      obj.userData.vel.y = 0;
      if (obj.userData.vel.length() < 0.5) {
        obj.userData.thrown = false;
        obj.userData.vel = new THREE.Vector3();
      }
      if (obj.userData.type === 'villager') { spawnBurst(obj.position, 0xaabbcc, 5, 3, 0.1, 0.3); }
    }

    // Villager thrown off island → alignment penalty
    const r = Math.sqrt(obj.position.x**2 + obj.position.z**2);
    if (r > ISLAND_RADIUS + 5 && obj.userData.type === 'villager' && !obj.userData.lostAtSea) {
      obj.userData.lostAtSea = true;
      changeAlignment(-0.15);
      setTimeout(() => { scene.remove(obj); }, 3000);
    }
  });
}

// ─── Faith accumulation ───────────────────────────────────────────────────────
function updateFaith(dt) {
  const alive = villagers.filter(v => v.alive);
  if (alive.length === 0) return;
  const avgHappiness = alive.reduce((s, v) => s + (1 - v.hunger), 0) / alive.length;
  faithPoints += avgHappiness * 2 * dt;
  influenceRadius = clamp(INFLUENCE_BASE + faithPoints * 0.08, INFLUENCE_BASE, INFLUENCE_MAX);
  updateInfluenceRing();
  updateFaithUI();
}

// ─── Miracle flash ────────────────────────────────────────────────────────────
function showMiracleFlash(text, color) {
  const el = document.getElementById('miracle-flash');
  el.textContent = text;
  el.style.color = color;
  el.style.textShadow = `0 0 20px ${color}`;
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 1400);
}

// ─── Raycasting ───────────────────────────────────────────────────────────────
const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

// ─── Shared pointer→world helper (works for mouse & touch) ───────────────────
function updateWorldFromClient(clientX, clientY) {
  prevWorldMouse.copy(worldMouse);
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.set(
    ((clientX - rect.left) / rect.width)  *  2 - 1,
    ((clientY - rect.top)  / rect.height) * -2 + 1
  );
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObject(terrainMesh, false);
  if (hits.length > 0) {
    worldMouse.copy(hits[0].point);
  } else {
    const t = new THREE.Vector3();
    raycaster.ray.intersectPlane(groundPlane, t);
    if (t) worldMouse.copy(t);
  }
  worldMouse.y = Math.max(worldMouse.y, getTerrainHeight(worldMouse.x, worldMouse.z));
}

// ─── Input handlers ───────────────────────────────────────────────────────────
function initInput() {
  const canvas = renderer.domElement;

  // ── Mouse ──────────────────────────────────────────────────────────────────
  canvas.addEventListener('mousemove', e => {
    updateWorldFromClient(e.clientX, e.clientY);
    if (grabbedObject) grabbedObject.position.copy(worldMouse).add(new THREE.Vector3(0, 2, 0));
    if (gestureActive) gesturePath.push({ x: e.clientX, y: e.clientY });
    if (godHand) godHand.position.set(worldMouse.x, worldMouse.y + 3.5, worldMouse.z);
  });

  canvas.addEventListener('mousedown', e => {
    e.preventDefault();
    if (e.button === 0) tryGrab();
    else if (e.button === 2) { gestureActive = true; gesturePath = [{ x: e.clientX, y: e.clientY }]; }
  });

  canvas.addEventListener('mouseup', e => {
    e.preventDefault();
    if (e.button === 0) { releaseGrab(); }
    else if (e.button === 2) { finishGesture(); }
  });

  canvas.addEventListener('contextmenu', e => e.preventDefault());

  // ── Touch ──────────────────────────────────────────────────────────────────
  let drawMode = false;
  const drawBtn = document.getElementById('draw-btn');
  drawBtn.addEventListener('touchstart', e => {
    e.stopPropagation(); e.preventDefault();
    drawMode = true; drawBtn.classList.add('active');
  }, { passive: false });
  drawBtn.addEventListener('touchend', e => {
    e.stopPropagation(); e.preventDefault();
    drawMode = false; drawBtn.classList.remove('active');
    finishGesture();
  }, { passive: false });

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (e.touches.length === 1) {
      const t = e.touches[0];
      updateWorldFromClient(t.clientX, t.clientY);
      if (godHand) godHand.position.set(worldMouse.x, worldMouse.y + 3.5, worldMouse.z);
      if (drawMode) {
        gestureActive = true;
        gesturePath = [{ x: t.clientX, y: t.clientY }];
      } else {
        tryGrab();
      }
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1) {
      const t = e.touches[0];
      updateWorldFromClient(t.clientX, t.clientY);
      if (godHand) godHand.position.set(worldMouse.x, worldMouse.y + 3.5, worldMouse.z);
      if (grabbedObject) grabbedObject.position.copy(worldMouse).add(new THREE.Vector3(0, 2, 0));
      if (gestureActive) gesturePath.push({ x: t.clientX, y: t.clientY });
    }
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    if (!drawMode) releaseGrab();
  }, { passive: false });

  // ── On-screen miracle buttons ──────────────────────────────────────────────
  function miracleBtn(id, type) {
    const el = document.getElementById(id);
    ['touchstart','mousedown'].forEach(ev => {
      el.addEventListener(ev, e => {
        e.stopPropagation(); e.preventDefault();
        castMiracleAt(type, worldMouse.clone(), true);
      }, { passive: false });
    });
  }
  miracleBtn('mbtn-fireball', 'fireball');
  miracleBtn('mbtn-food',     'food');
  miracleBtn('mbtn-heal',     'heal');
  miracleBtn('mbtn-wood',     'wood');

  // ── Creature buttons ────────────────────────────────────────────────────────
  function creatureAction(id, fn) {
    const el = document.getElementById(id);
    ['touchstart','mousedown'].forEach(ev => {
      el.addEventListener(ev, e => {
        e.stopPropagation(); e.preventDefault();
        if (creature) fn();
        else showMiracleFlash('No creature yet', '#aaa');
      }, { passive: false });
    });
  }
  creatureAction('btn-reward', () => creature.reward());
  creatureAction('btn-punish', () => creature.punish());

  // ── Keyboard (desktop) ─────────────────────────────────────────────────────
  window.addEventListener('keydown', e => {
    const key = e.key.toLowerCase();
    if (key === '1') castMiracleAt('fireball', worldMouse.clone(), true);
    if (key === '2') castMiracleAt('food',     worldMouse.clone(), true);
    if (key === '3') castMiracleAt('heal',     worldMouse.clone(), true);
    if (key === '4') castMiracleAt('wood',     worldMouse.clone(), true);
    if ((key === 'r' || key === 'p') && creature) {
      if (key === 'r') creature.reward(); else creature.punish();
    }
  });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    resizeGestureCanvas();
  });
}

function finishGesture() {
  gestureActive = false;
  gestureCtx2d.clearRect(0, 0, gestureCanvas.width, gestureCanvas.height);
  const type = recognizeGesture(gesturePath);
  if (type) castMiracleAt(type, worldMouse.clone(), true);
  else if (gesturePath.length > 5) showMiracleFlash('?', '#999');
  gesturePath = [];
}

// ─── Scene setup ─────────────────────────────────────────────────────────────
function initScene() {
  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0.42, 0.62, 0.88);
  scene.fog = new THREE.FogExp2(0x88bbdd, 0.0055);

  camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.5, 600);
  camera.position.set(0, 85, 130);
  camera.lookAt(0, 0, 0);

  // Simple zoom — scroll wheel on desktop, pinch on mobile
  function updateCam() {
    camera.position.set(0, camDist * 0.62, camDist * 0.88);
    camera.lookAt(0, 0, 0);
  }
  renderer.domElement.addEventListener('wheel', e => {
    camDist = clamp(camDist + e.deltaY * 0.25, 45, 240);
    updateCam();
  }, { passive: true });
  let _pinch0 = 0;
  window.addEventListener('touchstart', e => {
    if (e.touches.length === 2)
      _pinch0 = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  }, { passive: true });
  window.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      camDist = clamp(camDist - (d - _pinch0) * 0.4, 45, 240);
      _pinch0 = d;
      updateCam();
    }
  }, { passive: true });

  // Sky dome — gradient shader rendered from inside
  const skyGeo = new THREE.SphereGeometry(480, 32, 16);
  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {
      uTop:    { value: new THREE.Color(0.18,0.35,0.75) },
      uBot:    { value: new THREE.Color(0.62,0.80,0.98) },
      uSunDir: { value: new THREE.Vector3(0.55, 0.85, 0.3).normalize() }
    },
    vertexShader: 'varying vec3 vPos; void main(){ vPos=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }',
    fragmentShader: [
      'precision mediump float;',
      'uniform vec3 uTop,uBot,uSunDir;',
      'varying vec3 vPos;',
      'void main(){',
      '  float t=clamp(vPos.y/320.0,0.0,1.0);',
      '  vec3 col=mix(uBot,uTop,t*t);',
      '  vec3 dir=normalize(vPos);',
      '  float sun=max(0.0,dot(dir,normalize(uSunDir)));',
      '  float disc=smoothstep(0.9984,0.9999,sun);',
      '  float halo=pow(sun,22.0)*0.45;',
      '  float atm =pow(sun,5.0)*0.09;',
      '  col+=vec3(1.0,0.97,0.72)*disc+vec3(1.0,0.76,0.32)*halo+vec3(1.0,0.52,0.18)*atm;',
      '  gl_FragColor=vec4(col,1.0);',
      '}'
    ].join('\n'),
  });
  window._skyMesh = new THREE.Mesh(skyGeo, skyMat);
  scene.add(window._skyMesh);

  // Lights
  const sun = new THREE.DirectionalLight(0xfff0cc, 2.0);
  sun.position.set(80, 120, 60);
  sun.castShadow = true;
  sun.shadow.mapSize.set(512, 512);
  sun.shadow.camera.near   = 5;
  sun.shadow.camera.far    = 360;
  sun.shadow.camera.left   = sun.shadow.camera.bottom = -95;
  sun.shadow.camera.right  = sun.shadow.camera.top    =  95;
  scene.add(sun);
  window._sun = sun;

  const ambient = new THREE.AmbientLight(0x6688bb, 0.55);
  scene.add(ambient);
  window._ambient = ambient;

  const hemi = new THREE.HemisphereLight(0x88bbff, 0x336622, 0.7);
  scene.add(hemi);

  composer = null; // no post-processing — direct render
}

// ─── Tutorial fade ─────────────────────────────────────────────────────────────
function initTutorial() {
  setTimeout(() => {
    document.getElementById('tutorial').style.opacity = '0';
  }, 5000);
}

// ─── Main game loop ──────────────────────────────────────────────────────────
function gameLoop() {
  requestAnimationFrame(gameLoop);
  const dt = Math.min(clock.getDelta(), 0.05);
  const elapsed = clock.getElapsedTime();

  // Water animation
  if (waterMesh) {
    waterMesh.material.uniforms.uTime.value = elapsed;
    waterMesh.material.uniforms.uAlignment.value = alignment;
  }

  // Totem orb pulse
  if (window._totemOrb)   window._totemOrb.rotation.y = elapsed * 0.8;
  if (window._totemLight) window._totemLight.intensity = 3.0 + Math.sin(elapsed * 2.2) * 0.8;

  // Campfire flicker
  if (window._flames) window._flames.forEach((f, i) => {
    f.scale.y = 1.3 + Math.sin(elapsed * 5.5 + i * 1.7) * 0.45;
    f.scale.x = 0.8 + Math.sin(elapsed * 4.2 + i * 2.3) * 0.22;
  });
  if (window._fireLights) window._fireLights.forEach((l, i) => {
    l.intensity = 2.4 + Math.sin(elapsed * 6.1 + i * 1.9) * 0.9;
  });

  // Clouds drift
  updateClouds(dt);

  // Villager updates
  for (const v of villagers) v.update(dt);

  // Creature
  if (creature) creature.update(dt);

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    if (!particles[i].update(dt)) {
      particles[i].dispose();
      particles.splice(i, 1);
    }
  }

  // Projectiles
  updateProjectiles(dt);

  // Thrown objects
  updateThrownObjects(dt);

  // Faith
  updateFaith(dt);

  // Ambient sprites
  updateAmbientSprites(elapsed);

  // Hand bobbing
  if (godHand && !grabbedObject) {
    godHand.position.y = worldMouse.y + 3.5 + Math.sin(elapsed * 2.5) * 0.3;
    godHand.rotation.z = Math.sin(elapsed * 1.2) * 0.05;
  }

  // Gesture trail
  drawGestureTrail();

  renderer.render(scene, camera);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
function init() {
  initTextures();
  initScene();
  buildTerrain();
  buildWater();
  buildTrees();
  buildHand();
  buildVillage();
  buildVillageBuildings();
  buildClouds();
  creature = new CreatureAgent();
  spawnAmbientSprites();
  initGestureCanvas();
  initInput();
  initTutorial();
  updateAlignmentUI();
  updateFaithUI();
  updateHandColor();

  // Initial food so villagers don't starve immediately
  spawnFood(new THREE.Vector3(VILLAGE_POS.x + 5, 0, VILLAGE_POS.z - 4));
  spawnFood(new THREE.Vector3(VILLAGE_POS.x - 6, 0, VILLAGE_POS.z + 3));

  gameLoop();
}

// ─── Diagnostics ─────────────────────────────────────────────────────────────
function showError(msg) {
  const d = document.createElement('div');
  d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#c00;color:#fff;padding:12px;font-size:14px;z-index:9999;word-break:break-all;';
  d.textContent = msg;
  document.body.appendChild(d);
}

if (typeof THREE === 'undefined') {
  showError('ERROR: Three.js failed to load from CDN. Try the GitHub Pages URL instead.');
} else {
  try {
    init();
  } catch(e) {
    showError('ERROR: ' + e.message + ' — ' + e.stack);
  }
}
